<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时光相册 · 交错年轮</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 边缘畸变模拟层 */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 20px 20px 20px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(200%);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
            /* 确保位移层不超出圆角边界 */
        }

        /* 位移畸变层（模拟玻璃厚度导致的边缘偏转） */
        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            /* 位移影响区域高度 */
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.15) 0%,
                    rgba(255, 255, 255, 0.2) 30%,
                    transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
            /* 只影响底部边缘 */
        }

        /* 左右两侧边缘畸变（模拟垂直边缘的位移） */
        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        }

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
            /* 模拟光线弯曲造成的边缘轻微缩放 */
        }

        /* 按钮样式（圆形玻璃质感） */
        .back-btn-inline,
        .home-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .home-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .home-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        /* 中间标题区域 */
        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        /* 滚动内容区域（铺满屏幕） */
        .timeline-content {
            padding: 20px 20px 40px 20px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 中轴线 */
        .timeline-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.05));
            transform: translateX(-50%);
            z-index: 0;
        }

        /* 时间线条目 */
        .timeline-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            z-index: 1;
        }

        /* 照片容器 */
        .photo-card {
            width: 45%;
            padding: 0;
            background: transparent;
        }

        .photo-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .photo-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 文字信息容器 */
        .info-card {
            width: 40%;
            padding: 0;
            background: transparent;
        }

        .info-date {
            font-size: 1rem;
            font-weight: 500;
            color: #2c2c2e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .info-location {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-date svg,
        .info-location svg {
            width: 16px;
            height: 16px;
            stroke: #888;
        }

        /* 左右交替 */
        .timeline-item.left {
            flex-direction: row;
        }

        .timeline-item.left .photo-card {
            margin-right: auto;
        }

        .timeline-item.left .info-card {
            margin-left: auto;
        }

        .timeline-item.right {
            flex-direction: row-reverse;
        }

        .timeline-item.right .photo-card {
            margin-left: auto;
        }

        .timeline-item.right .info-card {
            margin-right: auto;
        }

        /* 全屏预览层 */
        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .photo-viewer img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .timeline-header {
                top: 12px;
                margin: 0 12px 12px 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .back-btn-inline,
            .home-btn {
                width: 40px;
                height: 40px;
            }

            .photo-card {
                width: 42%;
            }

            .info-card {
                width: 45%;
            }

            .info-date {
                font-size: 0.85rem;
            }

            .info-location {
                font-size: 0.75rem;
            }

            .timeline-item {
                margin-bottom: 32px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }

            .timeline-content {
                padding: 16px 16px 32px 16px;
            }
        }

        /* 滚动条 */
        .timeline-content::-webkit-scrollbar {
            width: 4px;
        }

        .timeline-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .timeline-content::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <!-- 悬浮导航栏（增强液态玻璃 + 动态阴影） -->
    <div class="timeline-header" id="timelineHeader">
        <button class="back-btn-inline" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>
        <div class="header-title">
            <h1>🌳 交错年轮</h1>
            <span class="sub">中轴两侧 · 照片与文字交替</span>
        </div>
        <a href="index.html" class="home-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z" />
            </svg>
        </a>
        <div class="displacement-layer"></div>
    </div>

    <!-- 滚动内容 -->
    <div class="timeline-content" id="timelineContent"></div>

    <!-- 全屏预览 -->
    <div id="photoViewer" class="photo-viewer" onclick="closeViewer()">
        <img id="viewerImg" src="" alt="">
    </div>

    <script>
        const timelineData = [
            {
                date: "2025-04-12",
                location: "浙江 · 莫干山",
                imageUrl: "https://picsum.photos/id/104/800/600",
                alt: "莫干山晨雾"
            },
            {
                date: "2025-04-08",
                location: "上海 · 外滩",
                imageUrl: "https://picsum.photos/id/96/800/600",
                alt: "外滩落日"
            },
            {
                date: "2025-04-01",
                location: "厦门 · 沙坡尾",
                imageUrl: "https://picsum.photos/id/20/800/600",
                alt: "沙坡尾旧书店"
            },
            {
                date: "2025-03-27",
                location: "青岛 · 小麦岛",
                imageUrl: "https://picsum.photos/id/26/800/600",
                alt: "小麦岛灯塔"
            },
            {
                date: "2025-03-18",
                location: "南京 · 鸡鸣寺路",
                imageUrl: "https://picsum.photos/id/15/800/600",
                alt: "樱花大道"
            },
            {
                date: "2025-03-10",
                location: "大理 · 喜洲古镇",
                imageUrl: "https://picsum.photos/id/29/800/600",
                alt: "喜洲稻田"
            }
        ];

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${parseInt(month)}月${parseInt(day)}日`;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            if (!container) return;
            let html = '';
            timelineData.forEach((item, index) => {
                const direction = index % 2 === 0 ? 'left' : 'right';
                html += `
                    <div class="timeline-item ${direction}">
                        <div class="photo-card">
                            <div class="photo-wrapper" onclick="openViewer('${item.imageUrl}')">
                                <img class="photo" src="${item.imageUrl}" alt="${item.alt}" loading="lazy">
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-date">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${formatDate(item.date)}
                            </div>
                            <div class="info-location">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c-2 0-8-5.5-8-11a8 8 0 0 1 16 0c0 5.5-6 11-8 11z"/><circle cx="12" cy="11" r="3"/></svg>
                                ${item.location}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openViewer(imageUrl) {
            const viewer = document.getElementById('photoViewer');
            const img = document.getElementById('viewerImg');
            img.src = imageUrl;
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            const viewer = document.getElementById('photoViewer');
            viewer.style.display = 'none';
            document.body.style.overflow = '';
        }

        // 动态液体流动阴影效果
        const header = document.getElementById('timelineHeader');
        let ticking = false;

        function updateHeaderShadow() {
            if (!header) return;
            // 获取滚动位置（相对于文档顶部）
            const scrollY = window.scrollY;
            // 产生流动感：阴影模糊半径在 12px 到 28px 之间波动，偏移量在 0 到 8px 之间波动
            // 使用正弦函数根据滚动位置产生连续变化
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5; // 0-1 之间
            const blur = 12 + wave * 16;          // 12 ~ 28
            const spread = wave * 6;               // 0 ~ 6
            const yOffset = 4 + wave * 8;          // 4 ~ 12
            // 内阴影高光随滚动轻微变化
            const highlight = 0.7 + wave * 0.3;     // 0.7 ~ 1.0
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
            const blurIntensity = 18 + Math.sin(scrollY * 0.03) * 4;  // 16~22 之间波动
            header.style.backdropFilter = `blur(${blurIntensity}px) saturate(180%) brightness(110%) contrast(120%)`;
        }

        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(updateHeaderShadow);
                ticking = true;
            }
        }

        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', () => updateHeaderShadow());
        // 初始化一次
        updateHeaderShadow();

        window.onload = () => {
            renderTimeline();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        function initEdgeDistortion() {
            const header = document.querySelector('.timeline-header');
            const displacementLayer = document.querySelector('.displacement-layer');
            if (!header || !displacementLayer) return;

            let ticking = false;
            function updateDisplacement() {
                // 获取滚动位置（相对于文档顶部）
                const scrollY = window.scrollY;
                // 获取导航栏底部相对于视口的位置
                const headerRect = header.getBoundingClientRect();
                const headerBottom = headerRect.bottom;

                // 计算畸变强度：当内容滚动到导航栏附近时（底部边缘附近）位移增大
                // 强度范围 0 ~ 1
                let intensity = 0;
                if (scrollY > 0) {
                    // 简单正弦波动，产生流动感
                    intensity = (Math.sin(scrollY * 0.03) + 1) / 2; // 0~1 之间
                }
                // 位移量 2px ~ 5px
                const translateY = 2 + intensity * 3;
                // 应用到位移层，向下偏移模拟内容被吸入
                displacementLayer.style.transform = `translateY(${translateY}px)`;

                // 可选：左右边缘畸变幅度（轻微水平偏移）
                const leftShift = intensity * 1.5;
                const rightShift = intensity * 1.5;
                displacementLayer.style.setProperty('--left-shift', `${leftShift}px`);
                displacementLayer.style.setProperty('--right-shift', `${-rightShift}px`);

                ticking = false;
            }

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(updateDisplacement);
                    ticking = true;
                }
            });
            updateDisplacement(); // 初始调用
        }

        // 页面加载时初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initEdgeDistortion);
        } else {
            initEdgeDistortion();
        }
    </script>
</body>

</html>
