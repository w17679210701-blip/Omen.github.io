    <script>
        const supabaseUrl = 'https://hmsovwceyinvwgplgywr.supabase.co';
        const supabaseKey = 'sb_publishable_n4PuuvoT5HLgcKbPM41BkQ_XbKctJtS';
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        // 复制到剪贴板
        async function copyToClipboard(text, event) {
            event.stopPropagation();
            try {
                await navigator.clipboard.writeText(text);
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            } catch (err) {
                console.error('复制失败', err);
                alert('复制失败，请手动复制');
            }
        }

        // 三筒云按钮点击处理（密码验证）
        function handleCloudClick(type) {
            const password = prompt('请输入访问密码：');
            if (password === null) return; // 用户取消
            if (password !== 'yt990701') {
                alert('密码错误，拒绝访问！');
                return;
            }
            // 密码正确，跳转
            if (type === 'private') {
                window.location.href = 'https://hiomen.cn/photo.html';
            } else if (type === 'omen') {
                window.location.href = 'https://47.82.6.57:2096/sub/%CE%A9men-Cloud';
            }
        }

        // 更新网站运行时长（只更新系统状态卡片）
        function updateRuntime() {
            const start = new Date(2026, 2, 24, 13, 30, 0);
            const diff = new Date() - start;
            const d = Math.floor(diff / 864e5);
            const h = Math.floor((diff % 864e5) / 36e5);
            const m = Math.floor((diff % 36e5) / 6e4);
            const s = Math.floor((diff % 6e4) / 1e3);
            const runtimeStr = `${d}天 ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            const statusRuntimeEl = document.getElementById('status-runtime');
            if (statusRuntimeEl) statusRuntimeEl.innerText = runtimeStr;
        }

        // 相对时间（朋友圈用）
        function timeAgo(date) {
            const sec = (new Date() - date) / 1000;
            if (sec < 60) return `${Math.floor(sec)}秒前`;
            const min = Math.floor(sec / 60);
            if (min < 60) return `${min}分钟前`;
            const hour = Math.floor(min / 60);
            if (hour < 24) return `${hour}小时前`;
            const day = Math.floor(hour / 24);
            return `${day}天前`;
        }

        // 加载最新朋友圈
        async function loadLatestMoment() {
            if (!window.db) return;
            try {
                const { data } = await window.db.from('moments').select('*').order('created_at', { ascending: false }).limit(1).single();
                if (data) {
                    document.getElementById('moment-text-pc').innerText = data.content || '暂无动态';
                    document.getElementById('moment-time-pc').innerText = timeAgo(new Date(data.created_at));
                    const media = document.getElementById('moment-media-pc');
                    if (data.video_url) media.innerHTML = `<video src="${data.video_url}" controls style="max-width:100%; max-height:200px;"></video>`;
                    else if (data.images?.length) media.innerHTML = `<img src="${data.images[0]}" alt="moment">`;
                    else if (data.image_url) media.innerHTML = `<img src="${data.image_url}" alt="moment">`;
                    else media.innerHTML = '';
                }
            } catch (e) { }
        }

        // 更新访问量（只更新系统状态卡片）
        async function updateVisitCount() {
            if (!window.db) return;
            try {
                const { data } = await window.db.rpc('increment_pv');
                const statusVisitEl = document.getElementById('status-visit-count');
                if (statusVisitEl) statusVisitEl.innerText = data;
            } catch {
                try {
                    const { data: cur } = await window.db.from('site_stats').select('pv').eq('id', 1).single();
                    const newPv = (cur?.pv || 0) + 1;
                    await window.db.from('site_stats').update({ pv: newPv }).eq('id', 1);
                    const statusVisitEl = document.getElementById('status-visit-count');
                    if (statusVisitEl) statusVisitEl.innerText = newPv;
                } catch (e) { }
            }
        }

        // 加载站点配置
        async function loadSiteConfig() {
            if (!window.db) return;
            const { data } = await window.db.from('site_config').select('key,value');
            if (!data) return;
            const cfg = {};
            data.forEach(i => cfg[i.key] = i.value);
            const avatar = document.getElementById('avatar-img');
            if (avatar) avatar.src = cfg.home_avatar || 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/avatar.jpg';
            const name = document.getElementById('profile-name');
            if (name) name.innerText = cfg.home_name || 'Omen';
        }

        // 测量服务器延迟
        async function measureLatency() {
            const start = performance.now();
            try {
                await window.db.from('site_config').select('key', { count: 'exact', head: true });
                const end = performance.now();
                const latency = Math.round(end - start);
                document.getElementById('server-latency').innerText = `${latency} ms`;
            } catch (err) {
                document.getElementById('server-latency').innerText = '测量失败';
                console.warn('延迟测量失败', err);
            }
        }

        // 计算本次页面加载用时
        function calcLoadTime() {
            if (window.performance && window.performance.timing) {
                const timing = window.performance.timing;
                const loadTime = timing.loadEventEnd - timing.navigationStart;
                if (loadTime > 0 && loadTime < 60000) {
                    document.getElementById('load-time').innerText = `${loadTime} ms`;
                } else {
                    const perfNow = performance.now();
                    document.getElementById('load-time').innerText = `${Math.round(perfNow)} ms`;
                }
            } else if (performance.now) {
                document.getElementById('load-time').innerText = `${Math.round(performance.now())} ms`;
            } else {
                document.getElementById('load-time').innerText = '-- ms';
            }
        }

        // 启动所有功能
        window.onload = async () => {
            await loadSiteConfig();
            lucide.createIcons();
            await updateVisitCount();
            setInterval(updateRuntime, 1000);
            await loadLatestMoment();

            const statusClockEl = document.getElementById('status-live-clock');
            function liveClock() {
                const now = new Date();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                if (statusClockEl) statusClockEl.textContent = timeStr;
                requestAnimationFrame(liveClock);
            }
            liveClock();
            updateRuntime();

            await measureLatency();
            calcLoadTime();

            const loader = document.getElementById('loader');
            if (loader) {
                loader.classList.add('fade-out');
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };
    </script>
</body>

</html>
