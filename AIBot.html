<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>二筒 · AI 对话助手</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 全局基础样式（浅色背景，与其他页面一致）--- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* --- 导航栏（普通块级）--- */
        .timeline-header {
            flex-shrink: 0;
            margin: 16px 16px 0 16px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        /* .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        } */

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        /* 带文字的导航按钮（更宽） */
        .nav-btn-text {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            padding: 0 16px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-btn-text:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        .nav-group {
            min-width: 88px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .timeline-header {
                margin: 12px 12px 0 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .nav-btn-text {
                padding: 0 12px;
                height: 40px;
                font-size: 0.75rem;
            }

            .back-btn-inline,
            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }

            .nav-group {
                min-width: 92px;
            }
        }

        /* 下拉菜单 */
        .dropdown-menu {
            display: none;
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 80px);
            left: calc(env(safe-area-inset-left, 20px) + 20px);
            width: 150px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        /* 模型选择栏（毛玻璃自定义下拉框） */
        .model-bar {
            flex-shrink: 0;
            margin: 12px 16px 0 16px;
            display: flex;
            justify-content: center;
        }

        .custom-select {
            position: relative;
            display: inline-block;
            min-width: 200px;
        }

        .custom-select-trigger {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            padding: 6px 30px 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1a1a1a;
            white-space: nowrap;
            position: relative;
        }

        .custom-select-trigger::after {
            content: '▼';
            font-size: 8px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .custom-select-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 6px 0;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .custom-select.open .custom-select-dropdown {
            opacity: 1;
            visibility: visible;
        }

        .custom-select-option {
            padding: 8px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #1a1a1a;
        }

        .custom-select-option:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .hidden-native {
            display: none;
        }

        @media (max-width: 640px) {
            .custom-select {
                min-width: 160px;
            }

            .custom-select-trigger {
                font-size: 0.75rem;
                padding: 4px 24px 4px 12px;
            }
        }

        /* 主容器 — 占据剩余高度，内部 flex 列 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 12px 16px 16px 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 消息区域 — 可滚动 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* 气泡样式 */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: rgba(230, 160, 23, 0.2);
        }

        .message.assistant .avatar {
            background: rgba(0, 0, 0, 0.05);
        }

        .bubble {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .message.user .bubble {
            background: #e6f4ff;
            border-color: rgba(230, 160, 23, 0.2);
        }

        .message.assistant .bubble {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .bubble-text {
            flex: 1;
            word-break: break-word;
            color: #1a1a1a;
        }

        .copy-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .copy-btn svg {
            width: 16px;
            height: 16px;
            stroke: #e6a017;
        }

        /* 输入区域 */
        .input-area {
            flex-shrink: 0;
            padding: 16px 24px 24px 24px;
            background: rgba(0, 0, 0, 0.02);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .input-wrapper {
            background: #ffffff;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 36px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #e6a017;
            box-shadow: 0 0 0 2px rgba(230, 160, 23, 0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #1a1a1a;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            padding: 12px 0;
        }

        textarea::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            background: #e6a017;
            border: none;
            border-radius: 36px;
            padding: 8px 24px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #cc8b0e;
            transform: scale(0.96);
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #e6a017;
        }

        /* 滚动控制按钮 — 水平居中，位于输入框上方 */
        .scroll-control-btn {
            position: fixed;
            bottom: 120px;          /* 输入框顶部位置，可微调 */
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            color: #e6a017;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .scroll-control-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-control-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(-50%) scale(1.05);
        }

        @media (max-width: 640px) {
            .chat-container {
                margin: 8px 12px 12px 12px;
            }

            .message {
                max-width: 95%;
            }

            .input-area {
                padding: 12px 16px 20px;
            }

            .bubble {
                font-size: 0.85rem;
            }

            .scroll-control-btn {
                bottom: 120px;      /* 手机端输入框上方位置 */
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

    <script>
        // 导航栏动态阴影
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        window.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(updateHeaderShadow); ticking = true; } });
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const layer = document.querySelector('.displacement-layer');
            if (!headerEl || !layer) return;
            let tick = false;
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(() => {
                        const i = (Math.sin(window.scrollY * 0.03) + 1) / 2;
                        layer.style.transform = `translateY(${2 + i * 3}px)`;
                        tick = false;
                    });
                    tick = true;
                }
            });
        }
        initEdgeDistortion();

        // 菜单切换
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dropdown-menu').classList.toggle('active');
        }
        window.onclick = (e) => {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if (menu && trigger && !trigger.contains(e.target)) {
                menu.classList.remove('active');
            }
        };

        // ====================== 多 API 配置 ======================
        // 硅基流动配置
        const SILICONFLOW_API_KEY = 'sk-iahhchqxzvphecyejdjbaglhvoopfrzreuuvrnqeqtlwbmxm';
        const SILICONFLOW_API_URL = 'https://api.siliconflow.cn/v1/chat/completions';
        // 火山引擎（豆包）配置
        const VOLC_ACCESS_KEY = 'ark-9e858f30-24eb-4bd2-a47b-96e89b29628b-d8fa4';
        const VOLC_API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
        // OpenAI（GPT-OSS）配置
        const OPENAI_API_KEY = 'sk-hydatekprncyuofqalkianywtcxpdburwypswtensmvslkrn';
        const OPENAI_API_URL = 'https://api.openai.com/v1/chat/completions';

        const messagesArea = document.getElementById('messagesArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const hiddenModelSelect = document.getElementById('modelSelect');

        // 自定义下拉框初始化
        function initCustomSelects() {
            document.querySelectorAll('.custom-select').forEach(customSelect => {
                const trigger = customSelect.querySelector('.custom-select-trigger');
                const dropdown = customSelect.querySelector('.custom-select-dropdown');
                const hiddenSelectId = customSelect.getAttribute('data-select-id');
                const hiddenSelect = document.getElementById(hiddenSelectId);
                if (!hiddenSelect) return;
                const selectedOption = hiddenSelect.options[hiddenSelect.selectedIndex];
                if (selectedOption) trigger.innerText = selectedOption.text;

                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.custom-select.open').forEach(el => {
                        if (el !== customSelect) el.classList.remove('open');
                    });
                    customSelect.classList.toggle('open');
                });
                dropdown.querySelectorAll('.custom-select-option').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const value = opt.getAttribute('data-value');
                        const text = opt.innerText;
                        for (let i = 0; i < hiddenSelect.options.length; i++) {
                            if (hiddenSelect.options[i].value === value) {
                                hiddenSelect.selectedIndex = i;
                                break;
                            }
                        }
                        trigger.innerText = text;
                        const changeEvent = new Event('change', { bubbles: true });
                        hiddenSelect.dispatchEvent(changeEvent);
                        customSelect.classList.remove('open');
                    });
                });
            });
        }
        document.addEventListener('click', () => {
            document.querySelectorAll('.custom-select.open').forEach(el => el.classList.remove('open'));
        });
        initCustomSelects();

        // ====================== 自动滚动控制 ======================
        let autoScrollEnabled = true;
        const scrollControlBtn = document.getElementById('scrollControlBtn');

        function scrollToBottom() {
            if (autoScrollEnabled) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }

        // 监听用户滚动
        messagesArea.addEventListener('scroll', () => {
            const isNearBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 50;
            if (isNearBottom) {
                // 用户滚到底部，恢复自动滚动
                autoScrollEnabled = true;
                scrollControlBtn.classList.remove('show');
            } else {
                // 用户离开底部，禁用自动滚动
                if (autoScrollEnabled) {
                    autoScrollEnabled = false;
                    scrollControlBtn.classList.add('show');
                }
            }
        });

        // 点击按钮滚动到底部并恢复自动滚动
        scrollControlBtn.addEventListener('click', () => {
            messagesArea.scrollTo({ top: messagesArea.scrollHeight, behavior: 'smooth' });
            autoScrollEnabled = true;
            scrollControlBtn.classList.remove('show');
        });

        // ====================== 原有消息与流式函数（修改滚动调用） ======================
        function addMessage(role, content, isStreamingPlaceholder = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            const img = document.createElement('img');
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '50%';
            img.src = role === 'user'
                ? 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/avatar.jpg'
                : 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png';
            avatar.appendChild(img);
            messageDiv.appendChild(avatar);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const textSpan = document.createElement('div');
            textSpan.className = 'bubble-text';
            textSpan.innerHTML = content.replace(/\n/g, '<br>');
            bubble.appendChild(textSpan);

            if (role === 'assistant' && !isStreamingPlaceholder) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.title = '复制回答';
                copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(content);
                });
                bubble.appendChild(copyBtn);
            }
            messageDiv.appendChild(bubble);
            messagesArea.appendChild(messageDiv);
            scrollToBottom(); // 替换原来的直接赋值
            return { messageDiv, textSpan, bubble };
        }

        // 统一的流式调用，根据模型选择不同的 API
        async function callModelStream(userPrompt, modelValue) {
            let apiUrl, apiKey, requestBody;

            // 判断模型来源
            const isVolcanic = modelValue === 'doubao-seed-2-0-pro-260215';
            const isOpenAI = modelValue === 'openai/gpt-oss-120b';

            if (isVolcanic) {
                apiUrl = VOLC_API_URL;
                apiKey = VOLC_ACCESS_KEY;
                requestBody = {
                    model: modelValue,
                    messages: [{ role: 'user', content: userPrompt }],
                    temperature: 0.7,
                    max_tokens: 4096,
                    stream: true
                };
            } else if (isOpenAI) {
                apiUrl = OPENAI_API_URL;
                apiKey = OPENAI_API_KEY;
                requestBody = {
                    model: 'gpt-oss-120b',  // 实际模型 ID，可能不同于显示名称
                    messages: [{ role: 'user', content: userPrompt }],
                    temperature: 0.7,
                    max_tokens: 4096,
                    stream: true
                };
            } else {
                // 硅基流动模型
                apiUrl = SILICONFLOW_API_URL;
                apiKey = SILICONFLOW_API_KEY;
                requestBody = {
                    model: modelValue,
                    messages: [{ role: 'user', content: userPrompt }],
                    temperature: 0.7,
                    max_tokens: 4096,
                    stream: true
                };
            }

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }
            if (!response.body) throw new Error('当前浏览器不支持流式响应');
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullContent = '';
            const { textSpan, messageDiv } = addMessage('assistant', '⏳ 生成中...', true);
            if (thinkingMsg) {
                thinkingMsg.remove();
                thinkingMsg = null;
            }
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta?.content;
                            if (delta) {
                                fullContent += delta;
                                textSpan.innerHTML = fullContent.replace(/\n/g, '<br>');
                                scrollToBottom(); // 替换原来的直接赋值
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }
            }
            if (fullContent) {
                messageDiv.remove();
                addMessage('assistant', fullContent, false);
            } else {
                messageDiv.remove();
                addMessage('assistant', '抱歉，没有收到有效回复。', false);
            }
        }

        let thinkingMsg = null;
        function showThinking() {
            if (thinkingMsg) thinkingMsg.remove();
            const tempDiv = document.createElement('div');
            tempDiv.className = 'message assistant';
            // 创建头像容器和图片
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            const img = document.createElement('img');
            img.src = 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '50%';
            avatarDiv.appendChild(img);
            // 创建气泡
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.style.opacity = '0.7';
            bubbleDiv.innerText = '⏳ AI 思考中...';
            tempDiv.appendChild(avatarDiv);
            tempDiv.appendChild(bubbleDiv);
            messagesArea.appendChild(tempDiv);
            scrollToBottom(); // 替换原来的直接赋值
            thinkingMsg = tempDiv;
        }
        function hideThinking() {
            if (thinkingMsg) { thinkingMsg.remove(); thinkingMsg = null; }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            const selectedModel = hiddenModelSelect.value;
            showThinking();
            try {
                await callModelStream(text, selectedModel);
                hideThinking();
            } catch (err) {
                hideThinking();
                console.error(err);
                let errorMsg = '对话失败：';
                if (err.message.includes('401')) errorMsg += 'API Key 无效，请检查';
                else if (err.message.includes('429')) errorMsg += '请求过于频繁，请稍后再试';
                else if (err.message.includes('fetch')) errorMsg += '网络请求失败，请检查网络';
                else errorMsg += err.message;
                addMessage('assistant', errorMsg);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 1500);
            }).catch(() => alert('复制失败，请手动复制'));
        }

        // 初始化 Lucide 图标
        lucide.createIcons();
    </script>
</body>

</html>
