<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时光相册 · 年轮光影</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 导航栏（毛玻璃效果） */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 20px 20px 20px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        }

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .home-btn,
        .scroll-down-btn,
        .scroll-up-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .home-btn:hover,
        .scroll-up-btn,
        .scroll-down-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .home-btn svg,
        .scroll-up-btn,
        .scroll-down-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        .timeline-content {
            padding: 20px 20px 40px 20px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.05));
            transform: translateX(-50%);
            z-index: 0;
        }

        .timeline-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            z-index: 1;
        }

        .photo-card {
            width: 45%;
            padding: 0;
            background: transparent;
        }

        .photo-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .photo-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-date svg,
        .info-location svg {
            width: 16px;
            height: 16px;
            stroke: #888;
        }

        .timeline-item.right {
            flex-direction: row-reverse;
        }

        .info-card {
            width: 40%;
            padding: 0;
            background: transparent;
            text-align: center;
        }

        .info-date {
            font-size: 1rem;
            font-weight: 500;
            color: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .info-location {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 下载按钮样式 */
        .photo-viewer .download-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: auto;
            /* 自动宽度 */
            height: 44px;
            /* 固定高度 */
            padding: 0 16px;
            /* 左右内边距 */
            border-radius: 40px;
            /* 椭圆效果 */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            /* 图标与文字间距 */
            cursor: pointer;
            color: white;
            /* 文字和图标颜色 */
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .photo-viewer .download-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.02);
        }

        .photo-viewer .download-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
        }

        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: previewFadeIn 0.3s ease-out;
        }

        .photo-viewer img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            animation: previewFadeIn 0.3s ease-out;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            transform: scale(1);
        }

        @keyframes previewFadeIn {
            0% {
                opacity: 0;
                backdrop-filter: blur(0);
            }

            100% {
                opacity: 1;
                backdrop-filter: blur(20px);
            }
        }

        @keyframes previewImageScale {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ========= 手机端专属样式（只改对齐，其他不变） ========= */
        @media (max-width: 768px) {
            .timeline-header {
                top: 12px;
                margin: 0 12px 12px 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .back-btn-inline,
            .home-btn,
            .scroll-up-btn,
            .scroll-down-btn {
                width: 40px;
                height: 40px;
            }

            .photo-card {
                width: 42%;
            }

            .info-card {
                width: 45%;
            }

            .info-date {
                font-size: 0.85rem;
            }

            .info-location {
                font-size: 0.75rem;
                margin-bottom: 0;
            }

            .timeline-item {
                margin-bottom: 32px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }

            .timeline-content {
                padding: 16px 16px 32px 16px;
            }

            /* ----- 核心对齐修改 ----- */
            /* 所有行整体居中，图标通过 flex-direction 靠近中轴线 */
            .timeline-item.left .info-date,
            .timeline-item.left .info-location {
                flex-direction: row-reverse;
                /* 图标移到右边（靠近中轴线） */
                justify-content: center;
                /* 整体居中 */
            }

            .timeline-item.right .info-date,
            .timeline-item.right .info-location {
                flex-direction: row;
                /* 图标在左边（靠近中轴线） */
                justify-content: center;
                /* 整体居中 */
            }

            /* 确保卡片内容也居中（无左右偏移） */
            .timeline-item.left .info-card,
            .timeline-item.right .info-card {
                text-align: center;
            }
        }

        .timeline-content::-webkit-scrollbar {
            width: 4px;
        }

        .timeline-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .timeline-content::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }
    </style>
</head>

            { date: "", location: "", imageUrl: `${BASE_URL}11.JPEG`, alt: "老照片 11" },
            { date: "", location: "", imageUrl: `${BASE_URL}10.JPEG`, alt: "老照片 10" },
            { date: "", location: "", imageUrl: `${BASE_URL}9.JPEG`, alt: "老照片 9" },

            { date: "", location: "", imageUrl: `${BASE_URL}1.JPEG`, alt: "老照片 1" }
        ];

        function formatDate(dateStr) {
            const [year, month] = dateStr.split('-');
            return `${year}年${parseInt(month)}月`;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            if (!container) return;
            let html = '';
            timelineData.forEach((item, index) => {
                const direction = index % 2 === 0 ? 'left' : 'right';
                html += `
                    <div class="timeline-item ${direction}">
                        <div class="photo-card">
                            <div class="photo-wrapper" onclick="openViewer('${item.imageUrl}')">
                                <img class="photo" src="${item.imageUrl}" alt="${item.alt}" loading="lazy">
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-date">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${formatDate(item.date)}
                            </div>
                            <div class="info-location">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c-2 0-8-5.5-8-11a8 8 0 0 1 16 0c0 5.5-6 11-8 11z"/><circle cx="12" cy="11" r="3"/></svg>
                                ${item.location}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function downloadCurrentPhoto() {
            const img = document.getElementById('viewerImg');
            const imageUrl = img.src;
            if (!imageUrl) return;

            // 弹出确认框
            const userConfirmed = confirm('是否保存此照片到相册？');
            if (!userConfirmed) return;

            try {
                // 获取图片数据（支持跨域）
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                // 创建隐藏链接触发下载
                const link = document.createElement('a');
                link.href = blobUrl;
                // 从原URL提取文件名，如果没有则用默认名
                const fileName = imageUrl.substring(imageUrl.lastIndexOf('/') + 1) || 'photo.jpg';
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // 释放对象URL
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error('下载失败', error);
                alert('下载失败，请长按图片保存');
            }
        }

        function openViewer(imageUrl) {
            const viewer = document.getElementById('photoViewer');
            const img = document.getElementById('viewerImg');
            img.src = imageUrl;
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            const viewer = document.getElementById('photoViewer');
            viewer.style.display = 'none';
            document.body.style.overflow = '';
        }

        // 动态导航栏阴影效果
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(updateHeaderShadow);
                ticking = true;
            }
        }
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', () => updateHeaderShadow());
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const displacementLayer = document.querySelector('.displacement-layer');
            if (!headerEl || !displacementLayer) return;
            let tick = false;
            function updateDisplacement() {
                const scrollY = window.scrollY;
                let intensity = 0;
                if (scrollY > 0) intensity = (Math.sin(scrollY * 0.03) + 1) / 2;
                const translateY = 2 + intensity * 3;
                displacementLayer.style.transform = `translateY(${translateY}px)`;
                tick = false;
            }
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(updateDisplacement);
                    tick = true;
                }
            });
            updateDisplacement();
        }

        window.onload = () => {
            renderTimeline();
            if (typeof lucide !== 'undefined') lucide.createIcons();
            initEdgeDistortion();

            const scrollDownBtn = document.getElementById('scrollDownBtn');
            if (scrollDownBtn) {
                scrollDownBtn.addEventListener('click', function () {
                    window.scrollTo({
                        top: document.documentElement.scrollHeight,
                        behavior: 'smooth'
                    });
                });
            }
            const scrollUpBtn = document.getElementById('scrollUpBtn');
            if (scrollUpBtn) {
                scrollUpBtn.addEventListener('click', function () {
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
            }
            const downloadBtn = document.getElementById('downloadPhotoBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', downloadCurrentPhoto);
            }
            let initialDistance = 0;
            let currentScale = 1;
            let isZooming = false;
            const viewerImg = document.getElementById('viewerImg');
            const photoViewer = document.getElementById('photoViewer');

            function getDistance(touches) {
                if (touches.length < 2) return 0;
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                return Math.hypot(dx, dy);
            }

            function onTouchStart(e) {
                if (e.touches.length === 2) {
                    e.preventDefault(); // 阻止页面滚动
                    initialDistance = getDistance(e.touches);
                    isZooming = true;
                }
            }
            function onTouchMove(e) {
                if (!isZooming || e.touches.length !== 2) return;
                e.preventDefault();
                const newDistance = getDistance(e.touches);
                if (initialDistance === 0) return;
                let scaleChange = newDistance / initialDistance;
                let newScale = currentScale * scaleChange;
                // 限制最小为1（原始大小），最大为3（可自定义）
                newScale = Math.min(3, Math.max(1, newScale));
                if (newScale !== currentScale) {
                    viewerImg.style.transform = `scale(${newScale})`;
                }
            }
            function onTouchEnd(e) {
                if (isZooming) {
                    // 更新当前缩放值，以便下次继续缩放
                    const computedScale = parseFloat(viewerImg.style.transform.replace(/[^0-9.]/g, '')) || 1;
                    currentScale = Math.min(3, Math.max(1, computedScale));
                    isZooming = false;
                    initialDistance = 0;
                }
            }
            function openViewer(imageUrl) {
                // ... 原有代码 ...
                viewerImg.src = imageUrl;
                // 重置缩放
                currentScale = 1;
                viewerImg.style.transform = 'scale(1)';
                // ... 原有代码 ...
            }
            photoViewer.addEventListener('touchstart', onTouchStart, { passive: false });
            photoViewer.addEventListener('touchmove', onTouchMove, { passive: false });
            photoViewer.addEventListener('touchend', onTouchEnd);
        };

    </script>
