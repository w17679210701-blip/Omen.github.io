<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>该页面为测试页面</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 导航栏（毛玻璃效果） */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 20px 20px 20px;
            background: rgba(0, 0, 0, 0.15);
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0,0,0,0.15) 0%, rgba(255,255,255,0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before { left: 0; border-radius: 34px 0 0 0; }
        .displacement-layer::after { right: 0; border-radius: 0 34px 0 0; }

        .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        }

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .home-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .home-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .home-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        .timeline-content {
            padding: 20px 20px 40px 20px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.15), rgba(0,0,0,0.05));
            transform: translateX(-50%);
            z-index: 0;
        }

        .timeline-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            z-index: 1;
        }

        .photo-card {
            width: 45%;
            padding: 0;
            background: transparent;
        }

        .photo-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .photo-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-card {
            width: 40%;
            padding: 0;
            background: transparent;
        }

        .info-date {
            font-size: 1rem;
            font-weight: 500;
            color: #2c2c2e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .info-location {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-date svg,
        .info-location svg {
            width: 16px;
            height: 16px;
            stroke: #888;
        }

        .timeline-item.left {
            flex-direction: row;
        }

        .timeline-item.left .photo-card {
            margin-right: auto;
        }

        .timeline-item.left .info-card {
            margin-left: auto;
        }

        .timeline-item.right {
            flex-direction: row-reverse;
        }

        .timeline-item.right .photo-card {
            margin-left: auto;
        }

        .timeline-item.right .info-card {
            margin-right: auto;
        }

        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .photo-viewer img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .timeline-header {
                top: 12px;
                margin: 0 12px 12px 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }
            .back-btn-inline,
            .home-btn {
                width: 40px;
                height: 40px;
            }
            .photo-card {
                width: 42%;
            }
            .info-card {
                width: 45%;
            }
            .info-date {
                font-size: 0.85rem;
            }
            .info-location {
                font-size: 0.75rem;
            }
            .timeline-item {
                margin-bottom: 32px;
            }
            .header-title h1 {
                font-size: 1.2rem;
            }
            .timeline-content {
                padding: 16px 16px 32px 16px;
            }
        }

        .timeline-content::-webkit-scrollbar {
            width: 4px;
        }
        .timeline-content::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .timeline-content::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="timeline-header" id="timelineHeader">
        <button class="back-btn-inline" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="header-title">
            <h1>年轮光影</h1>
            <span class="sub">老街坊 · 小弄堂</span>
        </div>
        <a href="index.html" class="home-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z"/></svg>
        </a>
        <div class="displacement-layer"></div>
    </div>

    <div class="timeline-content" id="timelineContent"></div>

    <div id="photoViewer" class="photo-viewer" onclick="closeViewer()">
        <img id="viewerImg" src="" alt="">
    </div>

    <script>
        // 照片基础 URL（使用默认域名，广州地域）
        const BASE_URL = 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/timeline/';
        
        // 随机生成日期 (2020-2025)
        function randomDate() {
            const start = new Date(2020, 0, 1);
            const end = new Date(2025, 11, 31);
            const rand = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
            const year = rand.getFullYear();
            const month = String(rand.getMonth() + 1).padStart(2, '0');
            const day = String(rand.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 随机地点库
        const locations = [
            "北京 · 胡同", "上海 · 外滩", "广州 · 西关", "深圳 · 南头古城",
            "杭州 · 西湖", "南京 · 夫子庙", "成都 · 宽窄巷子", "重庆 · 山城步道",
            "武汉 · 江汉路", "西安 · 回民街", "苏州 · 平江路", "长沙 · 太平街",
            "青岛 · 八大关", "厦门 · 鼓浪屿", "大理 · 古城", "丽江 · 四方街",
            "绍兴 · 仓桥直街", "徽州 · 宏村", "凤凰 · 沱江", "平遥 · 南大街"
        ];
        function randomLocation() {
            return locations[Math.floor(Math.random() * locations.length)];
        }
        
        // 生成 99 张照片的数据（倒序 99 → 1）
        const timelineData = [];
        for (let i = 99; i >= 1; i--) {
            timelineData.push({
                date: randomDate(),
                location: randomLocation(),
                imageUrl: `${BASE_URL}${i}.JPEG`,
                alt: `老照片 ${i}`
            });
        }
        
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${parseInt(month)}月${parseInt(day)}日 · ${year}`;
        }
        
        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            if (!container) return;
            let html = '';
            timelineData.forEach((item, index) => {
                const direction = index % 2 === 0 ? 'left' : 'right';
                html += `
                    <div class="timeline-item ${direction}">
                        <div class="photo-card">
                            <div class="photo-wrapper" onclick="openViewer('${item.imageUrl}')">
                                <img class="photo" src="${item.imageUrl}" alt="${item.alt}" loading="lazy">
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-date">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${formatDate(item.date)}
                            </div>
                            <div class="info-location">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c-2 0-8-5.5-8-11a8 8 0 0 1 16 0c0 5.5-6 11-8 11z"/><circle cx="12" cy="11" r="3"/></svg>
                                ${item.location}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function openViewer(imageUrl) {
            const viewer = document.getElementById('photoViewer');
            const img = document.getElementById('viewerImg');
            img.src = imageUrl;
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        function closeViewer() {
            const viewer = document.getElementById('photoViewer');
            viewer.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        // 动态导航栏阴影效果（不再覆盖 backdrop-filter）
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
            // 注意：不再动态修改 backdrop-filter，保留 CSS 中的毛玻璃效果
        }
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(updateHeaderShadow);
                ticking = true;
            }
        }
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', () => updateHeaderShadow());
        updateHeaderShadow();
        
        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const displacementLayer = document.querySelector('.displacement-layer');
            if (!headerEl || !displacementLayer) return;
            let tick = false;
            function updateDisplacement() {
                const scrollY = window.scrollY;
                let intensity = 0;
                if (scrollY > 0) intensity = (Math.sin(scrollY * 0.03) + 1) / 2;
                const translateY = 2 + intensity * 3;
                displacementLayer.style.transform = `translateY(${translateY}px)`;
                tick = false;
            }
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(updateDisplacement);
                    tick = true;
                }
            });
            updateDisplacement();
        }
        
        window.onload = () => {
            renderTimeline();
            if (typeof lucide !== 'undefined') lucide.createIcons();
            initEdgeDistortion();
        };
    </script>
</body>

</html>
