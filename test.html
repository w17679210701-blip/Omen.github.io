<html lang="zh-CN">
<head>

    <meta name="apple-mobile-web-app-title" content="HIOMEN">

    <style>
        /* ---------- 基础样式（移动端优先，与原文一致） ---------- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html.is-loading, body.is-loading {
            overflow: hidden !important;
            height: 100% !important;
            width: 100% !important;
            position: fixed;
        }
        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 0 20px 50px 20px;
            transition: background 0.8s ease, color 0.5s ease;
            position: relative;
        }
        /* 背景视频容器（仅PC端显示） */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-video-container video {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            will-change: transform;
        }
        /* 背景渐现动画遮罩 */
        .bg-video-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1;
            animation: bgReveal 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes bgReveal {
            0% { clip-path: inset(0 100% 0 0); }
            100% { clip-path: inset(0 0 0 0); }
        }
        /* 导航栏、公告栏、主容器统一宽度规则（移动端默认） */
        .timeline-header, .notice-bar, .main-container {
            width: 100%;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        /* 导航栏容器（移动端样式保留） */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 101;
            margin-bottom: 20px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }
        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .header-title {
            flex: 1;
            text-align: center;
        }
        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }
        @media (max-width: 768px) {
            body { padding-left: 12px; padding-right: 12px; }
            .timeline-header { top: 12px; margin-bottom: 12px; padding: 8px 16px; border-radius: 28px; }
            .notice-bar { margin-bottom: 12px; }
            .nav-btn { width: 40px; height: 40px; }
            .header-title h1 { font-size: 1.2rem; }
        }
        .flip-wrapper {
            perspective: 1000px;
            cursor: pointer;
        }
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            transform: rotateY(0deg);
        }
        .flip-front, .flip-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
        }
        .flip-back { transform: rotateY(180deg); }
        .notice-bar {
            height: 42px;
            margin-bottom: 20px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow: hidden;
        }
        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 35s linear infinite;
            font-size: 13px;
            color: #1a1a1a !important;
            font-weight: 500;
        }
        @keyframes marquee {
            0% { transform: translateX(25%); }
            100% { transform: translateX(-100%); }
        }
        .main-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 1 !important;
            transform: translateY(20px);
            transition: 0.8s ease;
        }
        .glass-card {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.7) !important;
            color: #1a1a1a !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08) !important;
        }
        .avatar-halo {
            position: relative;
            padding: 3px;
            border-radius: 50%;
            border: 2px solid #900207;
            animation: glowPulse 3s infinite;
            margin-bottom: 20px !important;
        }
        @keyframes glowPulse { 0%,100%{ box-shadow:0 0 10px #900207; } 50%{ box-shadow:0 0 25px #900207; } }
        .avatar-box { width:100px; height:100px; border-radius:50%; overflow:hidden; }
        .avatar-box img { width:100%; height:100%; object-fit:cover; }
        .profile-name {
            font-size:1.8rem; font-weight:bold; margin-bottom:30px; letter-spacing:2px; color:#900207;
        }
        .contact-group {
            display: flex; gap:15px; width:100%; justify-content:center; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;
        }
        .contact-btn {
            width:45px; height:45px; border-radius:50%; background:rgba(255,255,255,0.05);
            display:flex; align-items:center; justify-content:center; transition:0.3s; text-decoration:none; color:inherit;
        }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .clock-card { height: 120px; }
        .status-dot {
            width:6px; height:6px; background:#00ff88; border-radius:50%; box-shadow:0 0 5px #00ff88;
            animation:blink 1.5s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        #loader {
            position:fixed; top:0; left:0; width:100vw; height:100vh; background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1f 50%,#0a0a0a 100%);
            z-index:99999; display:flex; align-items:center; justify-content:center; transition:opacity 0.5s;
        }
        .loader-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            color:#ff4d4d; letter-spacing:8px; font-weight:900; font-size:1.2rem; animation:pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.05);} }
        .dropdown-menu {
            display:none; position:absolute; top:30px; left:0; width:150px; background:rgba(255,255,255,0.85); backdrop-filter:blur(25px);
            border-radius:20px; padding:8px; box-shadow:0 12px 40px rgba(0,0,0,0.15); transform:scale(0.4) translate(-30px,-30px);
            opacity:0; transform-origin:top left; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index:9999;
        }
        .dropdown-menu.active { display:block; transform:scale(1) translate(0,0); opacity:1; }
        .menu-item { display:flex; align-items:center; gap:12px; padding:12px 14px; text-decoration:none; font-size:15px; border-radius:16px; transition:0.2s; color:#1a1a1a; }
        .menu-item:hover { background:rgba(128,128,128,0.1); }
        .mail-modal {
            display:none; position:fixed; bottom:90px; left:50%; transform:translateX(-50%) scale(0.8);
            width:280px; background:rgba(255,255,255,0.95); backdrop-filter:blur(25px); border-radius:24px; padding:12px;
            z-index:3000; opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .mail-modal.active { display:block; transform:translateX(-50%) scale(1); opacity:1; }
        .mail-item {
            display:flex; flex-direction:column; padding:12px 16px; border-radius:16px; cursor:pointer; position:relative;
        }
        .mail-item:active { transform:scale(0.97); }
        .copy-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); width:14px; height:14px; opacity:0.3; }
        .copy-success .mail-address { color:#34c759; }
        .glass-card.profile-card-large {
            position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
            padding:40px 20px 25px 20px !important;
        }
        .glass-card.profile-card-large::after {
            content:""; position:absolute; right:-70px; top:-20px; width:300px; height:300px;
            background:url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/ETGOHOMELOGO.png') no-repeat center;
            background-size:contain; opacity:0.4; pointer-events:none; z-index:1;
        }
        .moments-preview-card {
            background:rgba(255,255,255,0.7) !important; display:block; text-decoration:none; color:inherit;
            padding:20px; margin-top:20px; transition:transform 0.3s ease;
        }
        .moments-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .moments-user { display:flex; align-items:center; gap:10px; }
        .mini-avatar { width:30px; height:30px; border-radius:6px; border:1px solid rgba(255,0,0,0.3); }
        .nickname { font-weight:bold; font-size:14px; color:#900207; }
        .moments-text {
            font-size:14px; line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .content-img { width:100%; max-height:250px; object-fit:cover; border-radius:12px; margin-top:15px; }
        #latest-moment { position:relative; overflow:hidden; }
        #latest-moment::after {
            content:""; position:absolute; top:-95px; left:50px; width:100%; height:100%;
            background:url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/ETLOGOR.png') no-repeat center;
            background-size:200px; opacity:0.4; pointer-events:none; z-index:1;
        }
        .ai-card {
            width:100%; height:140px; border-radius:32px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            margin:0; margin-bottom:-15px; position:relative; overflow:hidden;
            background-image: url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/hxbg.webp'), linear-gradient(#900207, #900207);
            background-size: cover, cover; background-position: center; background-repeat: no-repeat;
            box-shadow:0 8px 20px rgba(144,2,7,0.3);
        }
        .ai-card::before {
            content:""; position:absolute; inset:0; pointer-events:none;
            background-image: radial-gradient(2px 2px at 15% 20%, #fff, transparent), radial-gradient(3px 3px at 70% 45%, #ffd700, transparent),
                radial-gradient(1.5px 1.5px at 85% 80%, #fff, transparent), radial-gradient(2.5px 2.5px at 40% 60%, #ffaa66, transparent),
                radial-gradient(2px 2px at 95% 15%, #fff, transparent), radial-gradient(1.8px 1.8px at 50% 90%, #ffd700, transparent),
                radial-gradient(3px 3px at 5% 55%, #fff, transparent), radial-gradient(2px 2px at 60% 10%, #ffaa66, transparent);
            background-repeat: no-repeat; opacity:0; animation:starTwinkle 2.5s ease-in-out infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity:0.2; background-size:0px,0px,0px,0px,0px,0px,0px,0px; }
            100% { opacity:1; background-size:12px,16px,8px,14px,12px,10px,18px,12px; }
        }
        .ai-text {
            font-size:1.3rem; font-weight:600; white-space:nowrap; color:#fff; letter-spacing:2px; position:relative; z-index:2;
            text-shadow:0 1px 2px rgba(0,0,0,0.3);
        }
        @media (max-width:560px) { .ai-text { font-size:1rem; white-space:normal; text-align:center; padding:0 12px; } }

        /* ========== PC端专属样式 (宽度 >= 1024px) ========== */
        @media (min-width: 1024px) {
            body {
                background: #000;  /* 背景由视频接管 */
                padding: 0;
                align-items: flex-start;  /* 左对齐整体内容 */
            }
            /* 背景视频容器显示 */
            .bg-video-container {
                display: block;
            }
            /* 导航栏和公告栏：居中占满一行 */
            .timeline-header, .notice-bar {
                max-width: 1200px;
                width: 90%;
                margin-left: auto;
                margin-right: auto;
                background: rgba(255, 255, 255, 0.75) !important;
                backdrop-filter: blur(20px);
                border-radius: 48px;
                margin-top: 20px;
            }
            .notice-bar {
                width: 90%;
                max-width: 1200px;
                margin: 20px auto;
            }
            /* 卡片主容器：靠左，固定宽度，开启grid自适应 */
            .main-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 28px;
                width: 85%;
                max-width: 1400px;
                margin-left: 5%;
                margin-right: auto;
                transform: none;
                opacity: 1;
            }
            /* 所有直接卡片以及 grid-row 内部卡片强制宽高比，并允许滚动 */
            .main-container > *,
            .grid-row > * {
                aspect-ratio: 4 / 3;
                overflow-y: auto;
                overflow-x: hidden;
            }
            /* 特定卡片使用 1:1 比例 */
            .ai-card,
            .clock-card,
            .grid-row > a[href="photo.html"],
            a.glass-card[onclick*="askAndRecordName"] {
                aspect-ratio: 1 / 1 !important;
            }
            /* 个人名片特殊处理：保持4:3，内容滚动 */
            .profile-card-large {
                aspect-ratio: 4 / 3;
                padding: 20px !important;
            }
            /* 朋友圈预览卡片同时适用4:3 */
            .moments-preview-card {
                aspect-ratio: 4 / 3;
                overflow-y: auto;
            }
            /* grid-row 本身不设比例，其子项单独控制 */
            .grid-row {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            /* 为所有卡片添加入场轮盘滚动动画 */
            .main-container > * {
                animation: wheelRollIn 0.7s cubic-bezier(0.23, 1, 0.32, 1) backwards;
                opacity: 0;
                animation-fill-mode: forwards;
            }
            /* 错落延迟 */
            .main-container > *:nth-child(1) { animation-delay: 0.05s; }
            .main-container > *:nth-child(2) { animation-delay: 0.15s; }
            .main-container > *:nth-child(3) { animation-delay: 0.25s; }
            .main-container > *:nth-child(4) { animation-delay: 0.35s; }
            .main-container > *:nth-child(5) { animation-delay: 0.45s; }
            .main-container > *:nth-child(6) { animation-delay: 0.55s; }
            .main-container > *:nth-child(7) { animation-delay: 0.65s; }
            @keyframes wheelRollIn {
                0% {
                    opacity: 0;
                    transform: translateX(-80px) rotate(-8deg);
                    filter: blur(6px);
                }
                100% {
                    opacity: 1;
                    transform: translateX(0) rotate(0deg);
                    filter: blur(0);
                }
            }
            /* 卡片内滚动条美化 */
            .main-container > *::-webkit-scrollbar,
            .grid-row > *::-webkit-scrollbar {
                width: 4px;
                background: rgba(0,0,0,0.1);
                border-radius: 4px;
            }
            .main-container > *::-webkit-scrollbar-thumb {
                background: #900207;
                border-radius: 4px;
            }
            /* 移动端隐藏背景视频容器（避免干扰） */
            .bg-video-container {
                display: block;
            }
        }

        @media (max-width: 1023px) {
            /* 移动端隐藏背景视频 */
            .bg-video-container {
                display: none;
            }
            /* 恢复移动端原有卡片比例（无强制aspect-ratio） */
            .main-container > *,
            .grid-row > * {
                aspect-ratio: auto;
                overflow: visible;
            }
        }
    </style>
</head>

    <script>

        function handleFlip(el) {
            const inner = el.querySelector('.flip-inner');
            let rotation = parseInt(el.getAttribute('data-rotation')) || 0;
            rotation += 180;
            inner.style.transform = `rotateY(${rotation}deg)`;
            el.setAttribute('data-rotation', rotation);
        }
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('active'); }
        function toggleMailModal(e) { e.stopPropagation(); document.getElementById('mail-modal').classList.toggle('active'); }
        function toggleWechatModal(e) { e.stopPropagation(); document.getElementById('wechat-modal').classList.toggle('active'); }
        async function copyText(text, element) {
            try {
                await navigator.clipboard.writeText(text);
                element.classList.add('copy-success');
                const addrEl = element.querySelector('.mail-address');
                const orig = addrEl.innerText;
                addrEl.innerText = "已复制到剪贴板！";
                setTimeout(() => { element.classList.remove('copy-success'); addrEl.innerText = orig; }, 1500);
            } catch(err) { alert('复制失败'); }
        }
        const showPage = () => {
            const loader = document.getElementById('loader');
            if(loader) { loader.classList.add('fade-out'); setTimeout(()=>{ loader.style.display='none'; },300); }
            document.documentElement.classList.remove('is-loading');
            document.body.classList.remove('is-loading');
            const main = document.getElementById('main-content');
            if(main) { main.style.opacity = "1"; main.style.transform = "translateY(0)"; }
        };
        function updateRuntime() {
            const startDate = new Date(2026,2,24,13,30,0);
            const diff = new Date() - startDate;
            const days = Math.floor(diff/864e5);
            const hours = Math.floor((diff%864e5)/36e5);
            const minutes = Math.floor((diff%36e5)/6e4);
            const seconds = Math.floor((diff%6e4)/1e3);
            const el = document.getElementById('runtime-timer');
            if(el) el.innerHTML = `${days}天 ${String(hours).padStart(2,'0')}时 ${String(minutes).padStart(2,'0')}分 ${String(seconds).padStart(2,'0')}秒`;
        }
        function timeAgo(date) { /* 原样保留 */ const sec = Math.floor((new Date()-date)/1000); if(sec<0) return '刚刚'; const intervals=[{label:'年',secs:31536000},{label:'月',secs:2592000},{label:'天',secs:86400},{label:'小时',secs:3600},{label:'分钟',secs:60},{label:'秒',secs:1}]; for(let i of intervals) if(sec>=i.secs) return `${Math.floor(sec/i.secs)}${i.label}前`; return '刚刚'; }
        async function loadLatestMoment() {
            if(!window.db) return;
            try {
                const { data } = await window.db.from('moments').select('*').order('created_at',{ascending:false}).limit(1).single();
                if(data) {
                    document.getElementById('moment-text').innerText = data.content || '暂无动态';
                    document.getElementById('moment-time').innerText = timeAgo(new Date(data.created_at));
                    const media = document.getElementById('moment-media');
                    if(data.video_url) media.innerHTML = `<video src="${data.video_url}" controls preload="metadata" style="width:100%; max-height:200px; border-radius:12px;"></video>`;
                    else if(data.images?.length) media.innerHTML = `<img src="${data.images[0]}" style="width:100%; border-radius:12px;">`;
                    else if(data.image_url) media.innerHTML = `<img src="${data.image_url}" style="width:100%; border-radius:12px;">`;
                    else media.innerHTML = '';
                }
            } catch(e) { console.error(e); }
        }
        window.customPrompt = window.customPrompt || ((msg)=>Promise.resolve(prompt(msg)));
        window.customAlert = window.customAlert || ((msg)=>{ alert(msg); return Promise.resolve(); });
        async function askAndRecordName(event) {
            event.preventDefault();
            const name = prompt("📝 欢迎进入时光照相馆\n\n请问你是谁？");
            if(name === null) return;
            if(name.trim() === "") { alert("名字不能为空，请重新输入～"); return; }
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            try {
                await supabase.from('timeline_visitors').insert([{ name: name.trim(), visited_at: new Date().toISOString() }]);
            } catch(e) { console.error(e); alert("记录失败，但您仍可进入相册"); }
            window.location.href = "timeline.html";
        }
        async function updateVisitCount() {
            if(!window.db) return;
            try {
                const { data } = await window.db.rpc('increment_pv');
                if(data) document.getElementById('visit-count').innerText = data;
                else {
                    const { data: cur } = await window.db.from('site_stats').select('pv').eq('id',1).single();
                    if(cur) { await window.db.from('site_stats').update({ pv: cur.pv+1 }).eq('id',1); document.getElementById('visit-count').innerText = cur.pv+1; }
                }
            } catch(e) { document.getElementById('visit-count').innerText = '--'; }
        }
        async function loadSiteConfig() {
            if(!window.db) return;
            const { data } = await window.db.from('site_config').select('key,value');
            if(data) {
                const config = {};
                data.forEach(c=>config[c.key]=c.value);
                const navSub = document.querySelector('.timeline-header .header-title .sub');
                if(navSub) navSub.innerText = config.home_subtitle || '想骑摩托想到发疯';
                const notice = document.getElementById('notice-content');
                if(notice) notice.innerText = config.home_notice || '📢 欢迎来到 OMEN 的空间！';
                const avatar = document.querySelector('.avatar-box img');
                if(avatar) avatar.src = config.home_avatar || 'images/avatar.jpg';
                const name = document.querySelector('.profile-name');
                if(name) name.innerText = config.home_name || 'Omen';
            }
            lucide.createIcons();
        }
        const header = document.getElementById('timelineHeader');
        let ticking=false;
        function updateHeaderShadow() {
            if(!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY*0.02)*0.5+0.5;
            const blur = 12+wave*16;
            const yOffset = 4+wave*8;
            const highlight = 0.7+wave*0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,${highlight}), inset 0 -1px 0 rgba(0,0,0,0.05)`;
            ticking=false;
        }
        window.addEventListener('scroll',()=>{ if(!ticking){ requestAnimationFrame(updateHeaderShadow); ticking=true; } });
        updateHeaderShadow();
        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header'), displace = document.querySelector('.displacement-layer');
            if(!headerEl||!displace) return;
            let tick=false;
            function updateDisplace(){ const y=window.scrollY; const intensity=y>0?(Math.sin(y*0.03)+1)/2:0; displace.style.transform=`translateY(${2+intensity*3}px)`; tick=false; }
            window.addEventListener('scroll',()=>{ if(!tick){ requestAnimationFrame(updateDisplace); tick=true; } });
            updateDisplace();
        }
        initEdgeDistortion();
        window.onload = () => {
            loadSiteConfig();
            const loaderText = document.querySelector('.loader-text');
            if(loaderText) loaderText.style.color = ['#ff69b4','#ff4d4d'][Math.floor(Math.random()*2)];
            lucide.createIcons();
            const clockEl = document.getElementById('live-clock');
            function runLiveTimers(){
                const now=new Date();
                if(clockEl) clockEl.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
                requestAnimationFrame(runLiveTimers);
            }
            runLiveTimers();
            setInterval(updateRuntime,1000);
            updateVisitCount();
            updateRuntime();
            setTimeout(showPage,200);
            loadLatestMoment();
            lucide.createIcons();
        };
        window.onclick = function(e) {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if(menu && trigger && !trigger.contains(e.target) && !menu.contains(e.target)) menu.classList.remove('active');
        };
