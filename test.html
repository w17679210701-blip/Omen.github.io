<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时光相册 · 年轮光影</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 导航栏（毛玻璃效果） */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 20px 20px 20px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        }

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .home-btn,
        .scroll-down-btn,
        .scroll-up-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .home-btn:hover,
        .scroll-up-btn,
        .scroll-down-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .home-btn svg,
        .scroll-up-btn,
        .scroll-down-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        .timeline-content {
            padding: 20px 20px 40px 20px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.05));
            transform: translateX(-50%);
            z-index: 0;
        }

        .timeline-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            z-index: 1;
        }

        .photo-card {
            width: 45%;
            padding: 0;
            background: transparent;
        }

        .photo-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .photo-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info-date svg,
        .info-location svg {
            width: 16px;
            height: 16px;
            stroke: #888;
        }

        .timeline-item.right {
            flex-direction: row-reverse;
        }

        .info-card {
            width: 40%;
            padding: 0;
            background: transparent;
            text-align: center;
        }

        .info-date {
            font-size: 1rem;
            font-weight: 500;
            color: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .info-location {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 下载按钮样式 */
        .photo-viewer .download-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: auto;
            /* 自动宽度 */
            height: 44px;
            /* 固定高度 */
            padding: 0 20px;
            /* 左右内边距 */
            border-radius: 40px;
            /* 椭圆效果 */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            /* 图标与文字间距 */
            cursor: pointer;
            color: white;
            /* 文字和图标颜色 */
            font-size: 14px;
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 480px) {
            .photo-viewer .download-btn {
                padding: 0 16px;
                font-size: 12px;
                white-space: normal;
                /* 允许换行 */
                text-align: center;
                height: auto;
                min-height: 44px;
            }
        }

        .photo-viewer .download-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.02);
        }

        .photo-viewer .download-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
        }

        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: previewFadeIn 0.3s ease-out;
            touch-action: none;
        }

        .photo-viewer img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            animation: previewFadeIn 0.3s ease-out;
            /* transition: transform 0.1s ease-out; */
            /* transform-origin: center center; */
            transform: scale(1);
            transition: filter 0.08s ease-out, opacity 0.2s ease-out, transform 0.2s ease-out;
        }

        /* 底部放大/恢复按钮 */
        .photo-viewer .zoom-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 10001;
        }

        .photo-viewer .zoom-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(-50%) scale(1.05);
        }

        .photo-viewer .zoom-toggle-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
        }

        @keyframes previewFadeIn {
            0% {
                opacity: 0;
                backdrop-filter: blur(0);
            }

            100% {
                opacity: 1;
                backdrop-filter: blur(20px);
            }
        }

        @keyframes previewImageScale {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ========= 手机端专属样式（只改对齐，其他不变） ========= */
        @media (max-width: 768px) {
            .timeline-header {
                top: 12px;
                margin: 0 12px 12px 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .back-btn-inline,
            .home-btn,
            .scroll-up-btn,
            .scroll-down-btn {
                width: 40px;
                height: 40px;
            }

            .photo-card {
                width: 42%;
            }

            .info-card {
                width: 45%;
            }

            .info-date {
                font-size: 0.85rem;
            }

            .info-location {
                font-size: 0.75rem;
                margin-bottom: 0;
            }

            .timeline-item {
                margin-bottom: 32px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }

            .timeline-content {
                padding: 16px 16px 32px 16px;
            }

            /* ----- 核心对齐修改 ----- */
            /* 所有行整体居中，图标通过 flex-direction 靠近中轴线 */
            .timeline-item.left .info-date,
            .timeline-item.left .info-location {
                flex-direction: row-reverse;
                /* 图标移到右边（靠近中轴线） */
                justify-content: center;
                /* 整体居中 */
            }

            .timeline-item.right .info-date,
            .timeline-item.right .info-location {
                flex-direction: row;
                /* 图标在左边（靠近中轴线） */
                justify-content: center;
                /* 整体居中 */
            }

            /* 确保卡片内容也居中（无左右偏移） */
            .timeline-item.left .info-card,
            .timeline-item.right .info-card {
                text-align: center;
            }
        }

        .timeline-content::-webkit-scrollbar {
            width: 4px;
        }

        .timeline-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .timeline-content::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }

        /* 导航菜单按钮样式（与 index 保持一致） */
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        /* 下拉菜单样式 */
        .dropdown-menu {
            display: none;
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 80px);
            left: calc(env(safe-area-inset-left, 20px) + 20px);
            width: 150px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .menu-item i {
            opacity: 0.8;
        }
    </style>
</head>

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [year, month] = dateStr.split('-');
            return `${year}年${parseInt(month)}月`;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            if (!container) return;
            let html = '';
            timelineData.forEach((item, index) => {
                const direction = index % 2 === 0 ? 'left' : 'right';
                html += `
                <div class="timeline-item ${direction}">
                    <div class="photo-card">
                        <div class="photo-wrapper" onclick="openViewer('${item.imageUrl}')">
                            <img class="photo" src="${item.imageUrl}" alt="${item.alt}" loading="lazy">
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-date">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            ${formatDate(item.date)}
                        </div>
                        <div class="info-location">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c-2 0-8-5.5-8-11a8 8 0 0 1 16 0c0 5.5-6 11-8 11z"/><circle cx="12" cy="11" r="3"/></svg>
                            ${item.location}
                        </div>
                    </div>
                </div>
            `;
            });
            container.innerHTML = html;
        }

        // 菜单切换
        function toggleMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('dropdown-menu');
            if (menu) menu.classList.toggle('active');
        }

        // 点击页面其他地方关闭菜单
        window.onclick = function (e) {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if (menu && trigger && !trigger.contains(e.target)) {
                menu.classList.remove('active');
            }
        };

        window.openViewer = function (imageUrl) {
            const viewer = document.getElementById('photoViewer');
            const img = document.getElementById('viewerImg');
            img.src = imageUrl;
            // 查找当前图片索引
            currentPhotoIndex = timelineData.findIndex(item => item.imageUrl === imageUrl);
            if (currentPhotoIndex === -1) currentPhotoIndex = 0;
            // 重置放大状态
            if (isEnlarged) {
                // 强制恢复
                img.style.maxWidth = '90vw';
                img.style.maxHeight = '90vh';
                img.style.width = 'auto';
                img.style.height = 'auto';
                img.style.transform = '';
                dragEnabled = false;
                isEnlarged = false;
                const icon = zoomToggleBtn.querySelector('i');
                if (icon) icon.setAttribute('data-lucide', 'maximize');
                if (zoomToggleBtn) zoomToggleBtn.style.display = 'flex';
            }
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            lucide.createIcons(); // 刷新图标
            touchStartX = 0;
        };

        window.closeViewer = function () {
            const viewer = document.getElementById('photoViewer');
            viewer.style.display = 'none';
            document.body.style.overflow = '';
        };

        // 动态导航栏阴影效果
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(updateHeaderShadow);
                ticking = true;
            }
        }
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', () => updateHeaderShadow());
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const displacementLayer = document.querySelector('.displacement-layer');
            if (!headerEl || !displacementLayer) return;
            let tick = false;
            function updateDisplacement() {
                const scrollY = window.scrollY;
                let intensity = 0;
                if (scrollY > 0) intensity = (Math.sin(scrollY * 0.03) + 1) / 2;
                const translateY = 2 + intensity * 3;
                displacementLayer.style.transform = `translateY(${translateY}px)`;
                tick = false;
            }
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(updateDisplacement);
                    tick = true;
                }
            });
            updateDisplacement();
        }

        function clampDrag(translateX, translateY, img) {
            const w = img.clientWidth;
            const maxX = w * 0.5;
            return {
                x: Math.min(maxX, Math.max(-maxX, translateX)),
                y: 0   // 禁止上下移动
            };
        }
        function applyTransformWithClamp() {
            const img = document.getElementById('viewerImg');
            if (!img) return;
            const clamped = clampDrag(dragTranslateX, dragTranslateY, img);
            dragTranslateX = clamped.x;
            dragTranslateY = clamped.y;
            img.style.transform = `translate(${dragTranslateX}px, ${dragTranslateY}px)`;
        }

        function switchPhoto(direction) {
            if (isEnlarged) return;

            const img = document.getElementById('viewerImg');
            img.style.filter = '';

            let newIndex = currentPhotoIndex;
            if (direction === 'next') {
                newIndex++;
                if (newIndex >= timelineData.length) newIndex = 0;
            } else {
                newIndex--;
                if (newIndex < 0) newIndex = timelineData.length - 1;
            }
            if (newIndex === currentPhotoIndex) return;

            const newPhoto = timelineData[newIndex];

            // 修正方向：向左滑动(next)当前图片向左移出，新图片从右进入
            const currentExitTransform = direction === 'next' ? '-20px' : '20px';
            const newEntryTransform = direction === 'next' ? '20px' : '-20px';

            img.style.opacity = '0';
            img.style.transform = `translateX(${currentExitTransform})`;

            setTimeout(() => {
                img.src = newPhoto.imageUrl;
                currentPhotoIndex = newIndex;
                img.getBoundingClientRect(); // 强制重绘
                img.style.transform = `translateX(${newEntryTransform})`;
                img.style.opacity = '0';
                requestAnimationFrame(() => {
                    img.style.transform = 'translateX(0)';
                    img.style.opacity = '1';
                });

                if (isEnlarged) {
                    img.style.maxWidth = '90vw';
                    img.style.maxHeight = '90vh';
                    img.style.width = 'auto';
                    img.style.height = 'auto';
                    dragEnabled = false;
                    isEnlarged = false;
                    if (zoomToggleBtn) {
                        const icon = zoomToggleBtn.querySelector('i');
                        if (icon) icon.setAttribute('data-lucide', 'maximize');
                        lucide.createIcons();
                    }
                }
                dragTranslateX = 0;
                dragTranslateY = 0;
            }, 150);
        }

        function toggleZoom() {
            const img = document.getElementById('viewerImg');
            if (!isEnlarged) {
                // 放大：高度等于屏幕高度，宽度自适应
                const screenHeight = window.innerHeight;
                const imgNaturalHeight = img.naturalHeight;
                const imgNaturalWidth = img.naturalWidth;
                const scale = screenHeight / imgNaturalHeight;
                const newWidth = imgNaturalWidth * scale;
                // 覆盖原有样式
                img.style.maxWidth = 'none';
                img.style.maxHeight = 'none';
                img.style.width = `${newWidth}px`;
                img.style.height = `${screenHeight}px`;
                img.style.objectFit = 'contain';
                // 启用拖动模式
                dragEnabled = true;
                // 重置偏移量
                dragTranslateX = 0;
                dragTranslateY = 0;
                img.style.transform = `translate(0px, 0px)`;
                isEnlarged = true;
                // 更改按钮图标
                const icon = zoomToggleBtn.querySelector('i');
                if (icon) {
                    icon.setAttribute('data-lucide', 'minimize');
                    lucide.createIcons();
                }
            } else {
                // 恢复原始大小
                img.style.maxWidth = '90vw';
                img.style.maxHeight = '90vh';
                img.style.width = 'auto';
                img.style.height = 'auto';
                img.style.transform = '';
                dragEnabled = false;
                isEnlarged = false;
                // 重置图标
                const icon = zoomToggleBtn.querySelector('i');
                if (icon) {
                    icon.setAttribute('data-lucide', 'maximize');
                    lucide.createIcons();
                }
            }
        }

        function onTouchStartZoom(e) {
            if (!dragEnabled) {
                // 未放大模式：记录触摸起始位置
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    lastTouchX = touchStartX;
                    lastTouchTime = Date.now();
                }
                return;
            }
            // 放大模式：原有逻辑
            e.preventDefault();
            const touch = e.touches[0];
            dragStartX = touch.clientX - dragTranslateX;
            dragStartY = touch.clientY - dragTranslateY;
            isDragging = true;
        }

        function onTouchMoveZoom(e) {
            if (!dragEnabled) {
                // 未放大模式：实时更新模糊效果（根据速度）
                if (e.touches.length === 1 && touchStartX !== 0) {
                    const currentX = e.touches[0].clientX;
                    const now = Date.now();
                    const deltaX = Math.abs(currentX - lastTouchX);
                    const deltaTime = now - lastTouchTime;
                    if (deltaTime > 0) {
                        let speed = deltaX / deltaTime; // 像素/毫秒
                        let blur = Math.min(12, speed * 3);
                        if (blur > 0.3) {
                            document.getElementById('viewerImg').style.filter = `blur(${blur}px)`;
                        }
                    }
                    lastTouchX = currentX;
                    lastTouchTime = now;
                }
                return;
            }
            // 放大模式：拖动逻辑
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            let newX = touch.clientX - dragStartX;
            dragTranslateX = newX;
            dragTranslateY = 0;
            applyTransformWithClamp();
        }

        function onTouchEndZoom(e) {
            if (!dragEnabled) {
                // 未放大模式：清除模糊并判断是否切换照片
                const img = document.getElementById('viewerImg');
                img.style.filter = '';

                if (touchStartX !== 0) {
                    const endX = e.changedTouches[0].clientX;
                    const diffX = endX - touchStartX;
                    if (Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            switchPhoto('prev');
                        } else {
                            switchPhoto('next');
                        }
                    }
                    touchStartX = 0;
                }
                return;
            }
            // 放大模式原有逻辑
            isDragging = false;
        }
        window.onload = () => {
            renderTimeline();
            if (typeof lucide !== 'undefined') lucide.createIcons();
            initEdgeDistortion();

            // 滚动按钮
            const scrollDownBtn = document.getElementById('scrollDownBtn');
            if (scrollDownBtn) {
                scrollDownBtn.addEventListener('click', () => {
                    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
                });
            }
            const scrollUpBtn = document.getElementById('scrollUpBtn');
            if (scrollUpBtn) {
                scrollUpBtn.addEventListener('click', () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            zoomToggleBtn = document.getElementById('zoomToggleBtn');
            if (zoomToggleBtn) {
                // 桌面端使用 click
                zoomToggleBtn.addEventListener('click', toggleZoom);
                // 移动端使用 touchstart 确保立即响应
                zoomToggleBtn.addEventListener('touchstart', function (e) {
                    e.preventDefault();      // 防止触发 click 两次
                    e.stopPropagation();     // 避免冒泡到父级
                    toggleZoom();
                }, { passive: false });
            }

            // 为预览层添加拖动事件（仅在放大模式下生效）
            const viewerImg = document.getElementById('viewerImg');
            const photoViewer = document.getElementById('photoViewer');
            if (photoViewer) {
                photoViewer.addEventListener('touchstart', onTouchStartZoom, { passive: false });
                photoViewer.addEventListener('touchmove', onTouchMoveZoom, { passive: false });
                photoViewer.addEventListener('touchend', onTouchEndZoom);
            }
        };
