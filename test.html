<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>科幻粒子 · 汇聚成卡片边框 + 漂浮缓入（无闪烁）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        .ai-card {
            position: relative;
            width: 360px;
            height: 140px;
            background: transparent;
            /* 完全透明 */
            backdrop-filter: blur(16px);
            /* 毛玻璃模糊 */
            border-radius: 28px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-card::before {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: 26px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        .ai-card:hover {
            border-color: #007aff;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.3);
            transform: scale(1.02);
        }

        .ai-text {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #0ff, #0af);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            letter-spacing: 4px;
            z-index: 2;
            pointer-events: none;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0% {
                text-shadow: 0 0 2px rgba(0, 0, 0, 0.1);
            }

            50% {
                text-shadow: 0 0 12px rgba(0, 122, 255, 0.6), 0 0 4px rgba(0, 122, 255, 0.4);
            }

            100% {
                text-shadow: 0 0 2px rgba(0, 0, 0, 0.1);
            }
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .info {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: rgba(0, 0, 0, 0.5);
            font-size: 11px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 30;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="ai-card" id="aiCard">
        <div class="ai-text">AI</div>
    </div>
    <div class="info">✨ 粒子汇聚成边框 → 漂浮缓入（无闪烁）✨</div>
    <canvas id="particle-canvas"></canvas>

    <script>
        (function () {
            // ========== 可调节参数 ==========
            const PARTICLE_COUNT = 200;
            const CONVERGE_DURATION = 4000;
            const SPEED_MIN = 0.12;
            const SPEED_MAX = 1.8;
            const FLOAT_SPEED = 0.6;
            const BORDER_OFFSET = 6;
            const FLOAT_FADE_DURATION = 800;   // 速度缓入时长(ms)

            // ========== 内部变量 ==========
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let cardRect = { x: 0, y: 0, w: 0, h: 0 };

            let phase = 'converge';
            let convergeStart = null;
            let floatStart = null;
            let particles = [];
            let borderPoints = [];

            function updateCardRect() {
                const rect = document.getElementById('aiCard').getBoundingClientRect();
                cardRect = { x: rect.left, y: rect.top, w: rect.width, h: rect.height };
            }

            function generateBorderPoints() {
                const points = [];
                const totalPoints = PARTICLE_COUNT;
                const radius = 20; // 圆角半径（px），与卡片圆角匹配或稍小
                const left = cardRect.x;
                const right = cardRect.x + cardRect.w;
                const top = cardRect.y;
                const bottom = cardRect.y + cardRect.h;

                // 直线段长度
                const straightW = cardRect.w - 2 * radius;
                const straightH = cardRect.h - 2 * radius;
                // 圆弧长度（每个1/4圆弧 = π*radius/2，四个总长 = 2π*radius）
                const arcLen = 2 * Math.PI * radius;
                const straightLen = 2 * straightW + 2 * straightH;
                const totalLen = straightLen + arcLen;

                // 辅助函数：添加直线段上的点
                function addLine(x1, y1, x2, y2, count) {
                    for (let i = 0; i <= count; i++) {
                        const t = i / count;
                        const x = x1 + (x2 - x1) * t;
                        const y = y1 + (y2 - y1) * t;
                        points.push({ x, y });
                    }
                }

                // 辅助函数：添加圆弧上的点（圆心(cx,cy)，起始角度startRad，结束角度endRad，逆时针方向）
                function addArc(cx, cy, startRad, endRad, count) {
                    for (let i = 0; i <= count; i++) {
                        const t = i / count;
                        const angle = startRad + (endRad - startRad) * t;
                        const x = cx + radius * Math.cos(angle);
                        const y = cy + radius * Math.sin(angle);
                        points.push({ x, y });
                    }
                }

                // 按长度比例分配点数（确保总点数不超过totalPoints，最后补充）
                let remaining = totalPoints;

                // 上边直线段（从左到右）
                let count = Math.max(1, Math.floor(totalPoints * straightW / totalLen));
                addLine(left + radius, top, right - radius, top, count);
                remaining -= (count + 1);

                // 右上圆弧 (角度从 -π/2 到 0)
                count = Math.max(1, Math.floor(totalPoints * (Math.PI * radius / 2) / totalLen));
                addArc(right - radius, top + radius, -Math.PI / 2, 0, count);
                remaining -= (count + 1);

                // 右边直线段（从上到下）
                count = Math.max(1, Math.floor(totalPoints * straightH / totalLen));
                addLine(right, top + radius, right, bottom - radius, count);
                remaining -= (count + 1);

                // 右下圆弧 (角度从 0 到 π/2)
                count = Math.max(1, Math.floor(totalPoints * (Math.PI * radius / 2) / totalLen));
                addArc(right - radius, bottom - radius, 0, Math.PI / 2, count);
                remaining -= (count + 1);

                // 下边直线段（从右到左）
                count = Math.max(1, Math.floor(totalPoints * straightW / totalLen));
                addLine(right - radius, bottom, left + radius, bottom, count);
                remaining -= (count + 1);

                // 左下圆弧 (角度从 π/2 到 π)
                count = Math.max(1, Math.floor(totalPoints * (Math.PI * radius / 2) / totalLen));
                addArc(left + radius, bottom - radius, Math.PI / 2, Math.PI, count);
                remaining -= (count + 1);

                // 左边直线段（从下到上）
                count = Math.max(1, Math.floor(totalPoints * straightH / totalLen));
                addLine(left, bottom - radius, left, top + radius, count);
                remaining -= (count + 1);

                // 左上圆弧 (角度从 π 到 3π/2)
                count = Math.max(1, Math.floor(totalPoints * (Math.PI * radius / 2) / totalLen));
                addArc(left + radius, top + radius, Math.PI, 3 * Math.PI / 2, count);
                remaining -= (count + 1);

                // 如果点数不足，重复填充
                while (points.length < totalPoints) {
                    points.push({ ...points[points.length % points.length] });
                }
                // 如果点数过多，截断
                return points.slice(0, totalPoints);
            }

            function drawParticle(ctx, x, y, size, color, shape, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#0ff';
                ctx.fillStyle = color;
                ctx.beginPath();
                if (shape === 'square') {
                    ctx.fillRect(x - size / 2, y - size / 2, size, size);
                } else if (shape === 'triangle') {
                    const h = size * 0.866;
                    ctx.moveTo(x, y - h / 2);
                    ctx.lineTo(x - size / 2, y + h / 2);
                    ctx.lineTo(x + size / 2, y + h / 2);
                    ctx.fill();
                } else {
                    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function initParticles(points) {
                const pts = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const shape = ['circle', 'square', 'triangle'][Math.floor(Math.random() * 3)];
                    const target = points[i];
                    pts.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        targetX: target.x,
                        targetY: target.y,
                        shape: shape,
                        size: 3 + Math.random() * 4,
                        speed: SPEED_MIN + Math.random() * (SPEED_MAX - SPEED_MIN),
                        startX: 0, startY: 0,
                    });
                }
                return pts;
            }

            function storeStartPositions(pts) {
                for (let p of pts) {
                    p.startX = p.x;
                    p.startY = p.y;
                }
            }

            function updateConverge(pts, elapsed, total) {
                for (let p of pts) {
                    let prog = elapsed / (total * p.speed);
                    if (prog > 1) prog = 1;
                    const t = 1 - Math.pow(1 - prog, 3);
                    p.x = p.startX + (p.targetX - p.startX) * t;
                    p.y = p.startY + (p.targetY - p.startY) * t;
                }
            }

            function allConverged(pts) {
                for (let p of pts) {
                    const dx = p.x - p.targetX;
                    const dy = p.y - p.targetY;
                    if (dx * dx + dy * dy > 4) return false;
                }
                return true;
            }

            function drawParticles(pts, alpha = 1) {
                const now = Date.now();
                for (let p of pts) {
                    const intensity = 0.6 + Math.sin(now * 0.003 + p.x) * 0.3;
                    const color = `rgba(0, 100, 200, ${intensity})`;
                    drawParticle(ctx, p.x, p.y, p.size, color, p.shape, alpha);
                }
            }

            // 漂浮阶段初始化（速度从0开始缓入，透明度保持为1）
            function initFloatParticles(pts) {
                for (let p of pts) {
                    p.vx = 0;
                    p.vy = 0;
                    p.targetVx = (Math.random() - 0.5) * FLOAT_SPEED;
                    p.targetVy = (Math.random() - 0.5) * FLOAT_SPEED;
                    p.homeX = p.targetX;
                    p.homeY = p.targetY;
                    p.alpha = 1;   // 保持完全不透明，避免闪烁
                }
                return pts;
            }

            // 更新漂浮粒子（速度缓入，透明度不变）
            function updateFloatParticles(pts, elapsed, fadeDuration) {
                let fadeProgress = Math.min(1, elapsed / fadeDuration);
                const easeOut = 1 - Math.pow(1 - fadeProgress, 2); // easeOutQuad
                for (let p of pts) {
                    // 速度缓入
                    p.vx = p.targetVx * easeOut;
                    p.vy = p.targetVy * easeOut;
                    p.x += p.vx;
                    p.y += p.vy;
                    // 边界拉回
                    const dx = p.x - p.homeX;
                    const dy = p.y - p.homeY;
                    const dist = Math.hypot(dx, dy);
                    if (dist > BORDER_OFFSET) {
                        const angle = Math.atan2(dy, dx);
                        p.x = p.homeX + Math.cos(angle) * BORDER_OFFSET;
                        p.y = p.homeY + Math.sin(angle) * BORDER_OFFSET;
                        // 随机改变目标速度方向
                        p.targetVx += (Math.random() - 0.5) * 0.3;
                        p.targetVy += (Math.random() - 0.5) * 0.3;
                        const maxSpeed = FLOAT_SPEED;
                        p.targetVx = Math.min(maxSpeed, Math.max(-maxSpeed, p.targetVx));
                        p.targetVy = Math.min(maxSpeed, Math.max(-maxSpeed, p.targetVy));
                    }
                    if (Math.random() < 0.02) {
                        p.targetVx += (Math.random() - 0.5) * 0.2;
                        p.targetVy += (Math.random() - 0.5) * 0.2;
                        const maxSpeed = FLOAT_SPEED;
                        p.targetVx = Math.min(maxSpeed, Math.max(-maxSpeed, p.targetVx));
                        p.targetVy = Math.min(maxSpeed, Math.max(-maxSpeed, p.targetVy));
                    }
                }
            }

            function drawFloatParticles(pts) {
                const now = Date.now();
                for (let p of pts) {
                    const intensity = 0.6 + Math.sin(now * 0.003 + p.x) * 0.3;
                    const color = `rgba(0, 100, 200, ${intensity})`;
                    drawParticle(ctx, p.x, p.y, p.size, color, p.shape, p.alpha);
                }
            }

            let animFrame = null;
            function animate(timestamp) {
                updateCardRect();
                if (phase === 'converge') {
                    if (!convergeStart) {
                        convergeStart = timestamp;
                        storeStartPositions(particles);
                    }
                    const elapsed = timestamp - convergeStart;
                    updateConverge(particles, elapsed, CONVERGE_DURATION);
                    ctx.clearRect(0, 0, width, height);
                    drawParticles(particles, 1);
                    if (allConverged(particles)) {
                        phase = 'float';
                        floatStart = timestamp;
                        particles = initFloatParticles(particles);
                    }
                    animFrame = requestAnimationFrame(animate);
                }
                else if (phase === 'float') {
                    const elapsed = timestamp - floatStart;
                    updateFloatParticles(particles, elapsed, FLOAT_FADE_DURATION);
                    ctx.clearRect(0, 0, width, height);
                    drawFloatParticles(particles);
                    animFrame = requestAnimationFrame(animate);
                }
            }

            function resizeAndReset() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                updateCardRect();
                borderPoints = generateBorderPoints();
                particles = initParticles(borderPoints);
                phase = 'converge';
                convergeStart = null;
                floatStart = null;
                if (animFrame) cancelAnimationFrame(animFrame);
                animFrame = requestAnimationFrame(animate);
            }

            document.getElementById('aiCard').addEventListener('click', () => {
                window.location.href = 'AIBot.html';
            });
            window.addEventListener('resize', resizeAndReset);
            resizeAndReset();
        })();
    </script>
</body>

</html>
