    <style>
        /* ---------- 基础重置 & APP级体验增强 ---------- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            padding: 0 20px 50px 20px;
            transition: background 0.3s ease;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
        }

        /* 统一宽度容器 */
        .timeline-header,
        .notice-bar,
        .main-container {
            width: 100%;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 导航栏毛玻璃强化 */
        .timeline-header {
            position: sticky;
            top: env(safe-area-inset-top, 20px);
            z-index: 101;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(180%);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: box-shadow 0.2s ease;
        }

        /* 触摸反馈 */
        .nav-btn,
        .contact-btn,
        .glass-card,
        .ai-card,
        .menu-item,
        .mail-item {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.05);
        }

        .nav-btn:active,
        .contact-btn:active,
        .menu-item:active,
        .mail-item:active {
            transform: scale(0.96);
            background: rgba(120, 120, 128, 0.25);
        }

        .glass-card:active,
        .ai-card:active {
            transform: scale(0.98);
        }

        .nav-btn,
        .contact-btn {
            background: rgba(120, 120, 128, 0.18);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        /* 公告栏跑马灯 */
        .notice-bar {
            height: 44px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            overflow: hidden;
        }

        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 28s linear infinite;
            font-size: 13px;
            font-weight: 500;
            color: #1c1c1e;
        }

        @keyframes marquee {
            0% {
                transform: translateX(20%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* 主容器入场动画 */
        .main-container {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .main-container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /* 玻璃卡片 */
        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.75) !important;
            border: 0.5px solid rgba(0, 0, 0, 0.08) !important;
            border-radius: 28px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02) !important;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08) !important;
        }

        /* 个人卡片水印 */
        .profile-card-large {
            position: relative;
            overflow: hidden;
            padding: 36px 20px 28px !important;
        }

        .profile-card-large::after {
            content: "";
            position: absolute;
            right: -60px;
            top: -20px;
            width: 240px;
            height: 240px;
            background: url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/ETGOHOMELOGO.png') no-repeat center;
            background-size: contain;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* AI卡片背景优化 */
        .ai-card {
            width: 100%;
            height: 140px;
            background: linear-gradient(125deg, rgba(20, 30, 48, 0.85), rgba(10, 20, 30, 0.8)), url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/aigb.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .ai-text {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0f3ff, #7ac8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        /* 翻转卡片 */
        .flip-wrapper {
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-inner {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        /* 朋友圈预览卡片 */
        .moments-preview-card {
            padding: 18px !important;
            margin-top: 8px;
            transition: all 0.25s ease;
        }

        /* 返回顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s, transform 0.2s;
            z-index: 1000;
            color: #007aff;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:active {
            transform: scale(0.92);
        }

        /* 自定义毛玻璃弹窗 */
        .custom-dialog-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .custom-dialog-mask.active {
            opacity: 1;
            pointer-events: auto;
        }

        .custom-dialog {
            width: 280px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(32px);
            border-radius: 32px;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            transform: scale(0.92);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .custom-dialog.active {
            transform: scale(1);
        }

        .custom-dialog p {
            margin: 0 0 16px;
            font-weight: 500;
            font-size: 16px;
            color: #1c1c1e;
        }

        .custom-dialog input {
            width: 100%;
            padding: 12px 16px;
            border: 0.5px solid rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 44px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
        }

        .dialog-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .dialog-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 44px;
            background: rgba(120, 120, 128, 0.15);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dialog-btn.primary {
            background: #007aff;
            color: white;
        }

        /* 下拉菜单 */
        .dropdown-menu {
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 70px);
            left: 20px;
            width: 200px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(36px);
            border-radius: 28px;
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            transform: scale(0.9) translateY(-12px);
            opacity: 0;
            transition: transform 0.25s ease, opacity 0.2s ease;
            pointer-events: none;
            z-index: 2000;
        }

        .dropdown-menu.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* 邮件/微信弹窗 */
        .mail-modal {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(32px);
            border-radius: 28px;
            border: 0.5px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: none;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            padding: 12px;
            z-index: 3000;
        }

        #wechat-modal {
            bottom: 180px;
            width: 240px;
        }

        .mail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .copy-icon {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        @media (max-width: 560px) {
            body {
                padding-left: 16px;
                padding-right: 16px;
            }

            .back-to-top {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
        }

        /* 保留原有翻转卡片前后样式 */
        .flip-front,
        .flip-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
        }

        .flip-back {
            transform: rotateY(180deg);
        }

        .flip-wrapper .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .clock-card {
            height: 120px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff88;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .avatar-halo {
            margin-bottom: 16px;
        }

        .avatar-box img {
            width: 100%;
            border-radius: 50%;
        }

        .contact-group {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-top: 20px;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
        }
    </style>
</head>

        </svg></div>

    <script>
        // ---------- 全局初始化 ----------
        const supabaseUrl = 'https://hmsovwceyinvwgplgywr.supabase.co';
        const supabaseKey = 'sb_publishable_n4PuuvoT5HLgcKbPM41BkQ_XbKctJtS';
        window.db = supabase.createClient(supabaseUrl, supabaseKey);

        // 自定义弹窗 (替代原生 alert/prompt)
        window.customPrompt = (message) => new Promise((resolve) => {
            let mask = document.querySelector('.custom-dialog-mask');
            if (mask) mask.remove();
            const div = document.createElement('div');
            div.className = 'custom-dialog-mask';
            div.innerHTML = `<div class="custom-dialog"><p>${message}</p><input type="text" id="customPromptInput" placeholder="输入名字" autocomplete="off"><div class="dialog-buttons"><div class="dialog-btn" id="promptCancel">取消</div><div class="dialog-btn primary" id="promptConfirm">确认</div></div></div>`;
            document.body.appendChild(div);
            const input = div.querySelector('#customPromptInput');
            const confirmBtn = div.querySelector('#promptConfirm');
            const cancelBtn = div.querySelector('#promptCancel');
            const dialogDiv = div.querySelector('.custom-dialog');
            setTimeout(() => { div.classList.add('active'); dialogDiv.classList.add('active'); input.focus(); }, 10);
            const cleanup = (val) => { div.classList.remove('active'); setTimeout(() => div.remove(), 200); resolve(val); };
            confirmBtn.onclick = () => cleanup(input.value.trim());
            cancelBtn.onclick = () => cleanup(null);
            input.onkeypress = (e) => { if (e.key === 'Enter') cleanup(input.value.trim()); };
        });
        window.customAlert = (msg) => new Promise((resolve) => {
            let mask = document.querySelector('.custom-dialog-mask');
            if (mask) mask.remove();
            const div = document.createElement('div');
            div.className = 'custom-dialog-mask';
            div.innerHTML = `<div class="custom-dialog"><p>${msg}</p><div class="dialog-buttons"><div class="dialog-btn primary" id="alertOk">好的</div></div></div>`;
            document.body.appendChild(div);
            const okBtn = div.querySelector('#alertOk');
            const dialogDiv = div.querySelector('.custom-dialog');
            setTimeout(() => { div.classList.add('active'); dialogDiv.classList.add('active'); }, 10);
            okBtn.onclick = () => { div.classList.remove('active'); setTimeout(() => div.remove(), 200); resolve(); };
        });

        // 复制文本
        window.copyText = async (text, el) => {
            try {
                await navigator.clipboard.writeText(text);
                const addrSpan = el.querySelector('.mail-address');
                const original = addrSpan.innerText;
                addrSpan.innerText = "已复制";
                setTimeout(() => addrSpan.innerText = original, 1200);
                if (navigator.vibrate) navigator.vibrate(20);
            } catch (e) { customAlert('复制失败'); }
        };

        // 菜单控制
        window.toggleMenu = (e) => { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('active'); };
        window.toggleMailModal = (e) => { e.stopPropagation(); const m = document.getElementById('mail-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; if (m.style.display === 'block') { const close = (ev) => { if (!m.contains(ev.target) && ev.target !== e.currentTarget) { m.style.display = 'none'; document.removeEventListener('click', close); } }; setTimeout(() => document.addEventListener('click', close), 0); } };
        window.toggleWechatModal = (e) => { e.stopPropagation(); const m = document.getElementById('wechat-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; if (m.style.display === 'block') { const close = (ev) => { if (!m.contains(ev.target) && ev.target !== e.currentTarget) { m.style.display = 'none'; document.removeEventListener('click', close); } }; setTimeout(() => document.addEventListener('click', close), 0); } };

        // 卡片翻转
        window.handleFlip = function (el) {
            const inner = el.querySelector('.flip-inner');
            let rot = parseInt(el.getAttribute('data-rotation')) || 0;
            rot += 180;
            inner.style.transform = `rotateY(${rot}deg)`;
            el.setAttribute('data-rotation', rot);
            if (navigator.vibrate) navigator.vibrate(20);
        };

        // 时光照相馆 (保留原功能)
        window.askAndRecordName = async (e) => {
            e.preventDefault();
            const name = await customPrompt("📝 欢迎进入时光照相馆\n\n请问你是谁？");
            if (!name || name.trim() === "") { await customAlert("请输入你的名字～"); return; }
            try {
                await window.db.from('timeline_visitors').insert([{ name: name.trim(), visited_at: new Date().toISOString() }]);
            } catch (err) { console.warn(err); }
            window.location.href = "timeline.html";
        };

        // 加载最新朋友圈预览
        async function loadLatestMoment() {
            try {
                const { data } = await window.db.from('moments').select('*').order('created_at', { ascending: false }).limit(1).single();
                if (data) {
                    document.getElementById('moment-text').innerText = data.content || '暂无动态';
                    const timeAgo = (date) => { let sec = Math.floor((new Date() - new Date(date)) / 1000); if (sec < 0) return '刚刚'; if (sec < 60) return `${sec}秒前`; if (sec < 3600) return `${Math.floor(sec / 60)}分钟前`; if (sec < 86400) return `${Math.floor(sec / 3600)}小时前`; return `${Math.floor(sec / 86400)}天前`; };
                    document.getElementById('moment-time').innerText = timeAgo(data.created_at);
                    const mediaDiv = document.getElementById('moment-media');
                    if (data.video_url) mediaDiv.innerHTML = `<video src="${data.video_url}" style="width:100%; border-radius:16px; margin-top:8px;" controls preload="metadata"></video>`;
                    else if (data.images && data.images.length) mediaDiv.innerHTML = `<img src="${data.images[0]}" style="width:100%; border-radius:16px; margin-top:8px;">`;
                    else if (data.image_url) mediaDiv.innerHTML = `<img src="${data.image_url}" style="width:100%; border-radius:16px;">`;
                    else mediaDiv.innerHTML = '';
                }
            } catch (e) { console.warn(e); }
        }

        // 访问量统计
        async function updateVisitCount() {
            try {
                const { data } = await window.db.rpc('increment_pv');
                if (data) document.getElementById('visit-count').innerText = data;
                else {
                    const { data: cur } = await window.db.from('site_stats').select('pv').eq('id', 1).single();
                    if (cur) document.getElementById('visit-count').innerText = cur.pv + 1;
                }
            } catch (e) { document.getElementById('visit-count').innerText = '128'; }
        }

        // 运行时间
        function updateRuntime() {
            const start = new Date(2026, 2, 24, 13, 30, 0);
            const diff = new Date() - start;
            const days = Math.floor(diff / 864e5);
            const hrs = Math.floor((diff % 864e5) / 36e5);
            const mins = Math.floor((diff % 36e5) / 6e4);
            const secs = Math.floor((diff % 6e4) / 1e3);
            document.getElementById('runtime-timer').innerHTML = `${days}天 ${hrs.toString().padStart(2, '0')}时 ${mins.toString().padStart(2, '0')}分 ${secs.toString().padStart(2, '0')}秒`;
        }
        function updateClock() {
            const d = new Date();
            document.getElementById('live-clock').innerHTML = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}.${d.getMilliseconds().toString().padStart(3, '0')}`;
            requestAnimationFrame(updateClock);
        }
        updateClock();
        setInterval(updateRuntime, 1000);
        updateVisitCount();
        loadLatestMoment();

        // 返回顶部
        const backBtn = document.getElementById('backToTopBtn');
        window.addEventListener('scroll', () => { if (window.scrollY > 300) backBtn.classList.add('visible'); else backBtn.classList.remove('visible'); });
        backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        // 加载配置 (网站标题, 公告等)
        async function loadSiteConfig() {
            const { data } = await window.db.from('site_config').select('key,value');
            if (data) {
                data.forEach(c => {
                    if (c.key === 'home_notice') document.getElementById('notice-content').innerText = c.value;
                    if (c.key === 'home_name') document.querySelector('.profile-name').innerText = c.value;
                    if (c.key === 'home_subtitle') document.querySelector('.timeline-header .sub').innerText = c.value;
                });
            }
            lucide.createIcons();
            document.querySelector('.main-container').classList.add('loaded');
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 300); }
            }, 400);
        }
        loadSiteConfig();

        // 点击外部关闭菜单
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if (menu && trigger && !trigger.contains(e.target) && !menu.contains(e.target)) menu.classList.remove('active');
        });

        // 注册 Service Worker (PWA离线缓存)
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', event => { event.respondWith(fetch(event.request).catch(() => caches.match(event.request))); });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url).catch(e => console.log('sw注册失败', e));
        }

        // 导航栏滚动阴影 (保留原有动态效果)
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        window.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(updateHeaderShadow); ticking = true; } });
        updateHeaderShadow();
    </script>
