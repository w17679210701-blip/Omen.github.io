<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动态详情</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: 90px;
            /* 为悬浮栏留出空间 */
        }

        /* 顶部悬浮栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }

        /* 左侧返回按钮 */
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffcc00;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 中间用户信息 */
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 204, 0, 0.5);
        }

        .user-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        /* 右侧分享按钮 */
        .share-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffcc00;
            transition: 0.2s;
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 内容容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .swiper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .swiper-slide img,
        .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            font-size: 16px;
            line-height: 1.5;
            margin: 16px 0;
        }

        .footer {
            font-size: 12px;
            opacity: 0.6;
        }

        /* 时间叠加层样式 */
        .post-time {
            text-align: right;
            font-size: 12px;
            opacity: 0.7;
            margin-top: 8px;
            /* 与图片保持间距 */
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <!-- 顶部悬浮栏 -->
    <div class="top-bar">
        <button class="back-btn" onclick="history.back()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 48 48" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5.79889 24H41.7989" />
                <path d="M17.7988 36L5.79883 24L17.7988 12" />
            </svg>
        </button>

        <a href="index.html" class="user-info" style="text-decoration: none;">
            <img src="images/avatar.jpg" alt="头像" class="user-avatar">
            <span class="user-name">Omen（Yitong）</span>
        </a>

        <button class="share-btn" onclick="copyPageLink()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
                <polyline points="16 6 12 2 8 6" />
                <line x1="12" y1="2" x2="12" y2="15" />
            </svg>
        </button>
    </div>

    <!-- 动态内容 -->
    <div class="container" id="detail-container">
        <div class="swiper" id="media-swiper">
            <div class="swiper-wrapper" id="swiper-wrapper"></div>
            <div class="swiper-pagination"></div>
        </div>
        <!-- 新增时间叠加层 -->
        <div id="post-time-overlay" class="post-time-overlay"></div>
        <div class="content" id="post-content"></div>
    </div>

    <script>
        const supabaseUrl = 'https://hmsovwceyinvwgplgywr.supabase.co';
        const supabaseKey = 'sb_publishable_n4PuuvoT5HLgcKbPM41BkQ_XbKctJtS';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        let currentPost = null;

        async function loadDetail() {
            if (!postId) return;
            const { data, error } = await supabaseClient.from('moments').select('*').eq('id', postId).single();
            if (error || !data) {
                document.getElementById('detail-container').innerHTML = '<p>动态不存在</p>';
                return;
            }
            currentPost = data;
            document.getElementById('post-content').innerText = data.content || '';
            const formattedTime = new Date(data.created_at).toLocaleString();
            document.getElementById('post-time-overlay').innerText = `发布于：${formattedTime}`;

            const swiperWrapper = document.getElementById('swiper-wrapper');
            if (data.type === 'video' && data.video_url) {
                swiperWrapper.innerHTML = `<div class="swiper-slide"><video src="${data.video_url}" controls autoplay></video></div>`;
                // 视频不需要初始化 Swiper
            } else if (data.images && data.images.length > 0) {
                swiperWrapper.innerHTML = data.images.map(url => `<div class="swiper-slide"><img src="${url}" loading="lazy"></div>`).join('');
                new Swiper('.swiper', {
                    pagination: { el: '.swiper-pagination', clickable: true },
                    loop: data.images.length > 1
                });
            } else {
                swiperWrapper.innerHTML = '<div class="swiper-slide"><div>暂无媒体</div></div>';
            }
        }

        loadDetail();

        // 复制页面链接
        function copyPageLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴板');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }
    </script>
</body>

</html>
