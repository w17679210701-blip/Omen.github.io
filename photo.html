<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEN's GALLERY</title>
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    <style>
        /* --- 1. 基础重置 --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background-color: #0e0e10;
            color: #e5e7eb;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: 3rem;
            overflow-x: hidden;
        }

        /* --- 2. 流动背景 --- */
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-bg-flow {
            background-image: radial-gradient(at 0% 0%, #4040d9 0px, transparent 50%),
                radial-gradient(at 100% 100%, #1bb8b8 0px, transparent 50%),
                radial-gradient(at 80% 20%, #dc9538 0px, transparent 35%);
            background-size: 400% 400%;
            animation: bgFlow 15s ease infinite;
        }

        /* --- 3. 核心布局 --- */
        .container { width: 90%; max-width: 1200px; mx-auto: auto; margin-left: auto; margin-right: auto; }
        
        h1.title {
            text-align: center;
            color: #ffcc00;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }

        /* 相册网格 - 强制一行两个 */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding-bottom: 2.5rem;
        }

        /* 相册卡片样式 */
        .album-card {
            position: relative;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 1.25rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .album-card:active { transform: scale(0.95); }
        .album-card .icon { font-size: 2.5rem; margin-bottom: 0.75rem; filter: grayscale(1); transition: 0.3s; }
        .album-card:hover .icon { filter: grayscale(0); }
        .album-card .name { font-size: 0.875rem; font-weight: bold; color: white; text-transform: uppercase; }
        .album-card .count { font-size: 10px; color: rgba(255, 255, 255, 0.3); margin-top: 4px; }

        /* --- 4. 瀑布流展示 --- */
        .photo-list {
            column-count: 2;
            column-gap: 0.75rem;
            padding-bottom: 5rem;
        }
        .photo-item { break-inside: avoid; margin-bottom: 0.75rem; }
        .photo-item img {
            width: 100%;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: block;
        }

        /* --- 5. 密码弹窗 --- */
        #password-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            padding: 1rem;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 2rem;
            border: 1px solid #ffcc00;
            border-radius: 1.25rem;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }
        #password-input {
            width: 100%;
            background: black;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 8px;
            margin-bottom: 1.5rem;
        }
        #password-input:focus { outline: none; border-color: #ffcc00; }
        .btn-group { display: flex; gap: 1rem; }
        .btn { flex: 1; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: #374151; color: #9ca3af; }
        .btn-confirm { background: #ffcc00; color: black; }

        /* --- 6. 底部返回按钮与流光 --- */
        .back-nav { display: flex; align-items: center; gap: 0.5rem; color: #ffcc00; font-weight: bold; border: 1px solid #ffcc00; padding: 0.5rem 1.25rem; border-radius: 1.25rem; background: none; cursor: pointer; margin-bottom: 2rem; }

        .footer-back-box { grid-column: span 2; display: flex; justify-content: center; padding-top: 2rem; }
        
        @keyframes glowRotate { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .omen-glow-border {
            position: relative;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.25rem;
            text-decoration: none;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }
        .omen-glow-border::before {
            content: ""; position: absolute; inset: 0; padding: 2px;
            background: linear-gradient(270deg, #ffcc00, #fff700, #ffcc00, #a88500);
            background-size: 400% 100%;
            animation: glowRotate 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none;
            border-radius: 1.25rem;
        }

        /* 隐藏逻辑类 */
        .hidden { display: none !important; }
        .block { display: block !important; }
        .flex { display: flex !important; }
    </style>
</head>

<body class="animate-bg-flow">

    <div id="category-view" class="container">
        <h1 class="title">OMEN's GALLERY</h1>
        <div id="album-grid" class="album-grid">
            </div>
    </div>

    <div id="password-modal">
        <div class="modal-content">
            <h3 style="color:#ffcc00; margin-top:0;">请输入访问密码</h3>
            <input type="password" id="password-input" placeholder="******" maxlength="6">
            <div class="btn-group">
                <button onclick="closeModal()" class="btn btn-cancel">取消</button>
                <button onclick="submitPassword()" class="btn btn-confirm">确认</button>
            </div>
        </div>
    </div>

    <div id="photo-viewer" class="container hidden">
        <button onclick="showCategories()" class="back-nav">
            <span>←</span> 返回相册集
        </button>
        <h2 id="current-album-title" style="color:#ffcc00; text-align:center; margin-bottom:2rem;"></h2>
        <div id="photo-list" class="photo-list">
            </div>
    </div>

    <script>
        const CONFIG = {
            SecretId: 'AKID63lERP6XjnhPrAD0XnqdARSFm35sQipi',
            SecretKey: 'g7IFwNXS9algMnytYy70f5E7g5FAqIVS',
            Bucket: 'hiomen-1312408524',
            Region: 'ap-guangzhou',
            s: "OTkwNzAx",
            albumList: ['日常', '猫', '加密相册'],
            lockFolders: ['加密相册', 'hidden', 'private']
        };

        const cos = new COS({ SecretId: CONFIG.SecretId, SecretKey: CONFIG.SecretKey });
        var OMEN_STATE = { currentFolder: "", allPhotos: {} };

        async function loadAlbums() {
            const grid = document.getElementById('album-grid');
            grid.innerHTML = `<p style="grid-column: span 2; text-align:center; opacity:0.5; padding:5rem 0;">正在扫描云端相册...</p>`;

            cos.getBucket({
                Bucket: CONFIG.Bucket,
                Region: CONFIG.Region,
                Prefix: '',
            }, function (err, data) {
                if (err) {
                    grid.innerHTML = `<p style="grid-column: span 2; text-align:center; color:#ef4444;">加载失败：请检查密钥和跨域设置</p>`;
                    return;
                }

                const files = data.Contents || [];
                files.sort((a, b) => new Date(b.LastModified) - new Date(a.LastModified));

                const albumMap = {};
                CONFIG.albumList.forEach(name => albumMap[name] = []);

                files.forEach(item => {
                    if (item.Size > 0) {
                        const parts = item.Key.split('/');
                        const folderName = parts.length > 1 ? parts[0] : '默认相册';
                        const url = `https://${CONFIG.Bucket}.cos.${CONFIG.Region}.myqcloud.com/${item.Key}`;
                        if (!albumMap[folderName]) albumMap[folderName] = [];
                        albumMap[folderName].push(url);
                    }
                });

                OMEN_STATE.allPhotos = albumMap;
                renderAlbumCards(Object.keys(albumMap));
            });
        }

        function renderAlbumCards(folders) {
            const grid = document.getElementById('album-grid');
            const sortedFolders = folders.sort((a, b) => {
                let indexA = CONFIG.albumList.indexOf(a);
                let indexB = CONFIG.albumList.indexOf(b);
                return (indexA === -1 ? 99 : indexA) - (indexB === -1 ? 99 : indexB);
            });

            let html = sortedFolders.map(name => `
                <div onclick="handleEntry('${name}')" class="album-card">
                    <div class="icon">📁</div>
                    <div class="name">${name}</div>
                    <div class="count">${OMEN_STATE.allPhotos[name].length} PHOTOS</div>
                </div>
            `).join('');

            html += `
                <div class="footer-back-box">
                    <a href="index.html" class="omen-glow-border">
                        <span style="color:#ffcc00; font-size:1.5rem; font-weight:bold;">← BACK</span>
                    </a>
                </div>
            `;
            grid.innerHTML = html;
        }

        function showPhotos(folderName) {
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('photo-viewer').classList.remove('hidden');
            document.getElementById('current-album-title').innerText = folderName;
            
            const list = document.getElementById('photo-list');
            const photos = OMEN_STATE.allPhotos[folderName] || [];

            if (photos.length === 0) {
                list.innerHTML = `<div style="text-align:center; opacity:0.2; padding:5rem 0;">空空如也</div>`;
            } else {
                list.innerHTML = photos.map(url => `
                    <div class="photo-item">
                        <img src="${url}" loading="lazy">
                    </div>
                `).join('');
            }
            window.scrollTo(0, 0);
        }

        function handleEntry(name) {
            OMEN_STATE.currentFolder = name;
            const isLocked = CONFIG.lockFolders.some(f => f.toLowerCase() === name.toLowerCase());
            if (isLocked) {
                document.getElementById('password-modal').classList.add('flex');
                document.getElementById('password-input').focus();
            } else {
                showPhotos(name);
            }
        }

        function showCategories() {
            document.getElementById('photo-viewer').classList.add('hidden');
            document.getElementById('category-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function closeModal() {
            document.getElementById('password-modal').classList.remove('flex');
            document.getElementById('password-input').value = "";
        }

        function submitPassword() {
            const val = document.getElementById('password-input').value.trim();
            if (window.btoa(val) === CONFIG.s) {
                closeModal();
                showPhotos(OMEN_STATE.currentFolder);
            } else {
                alert("密码错误！");
                document.getElementById('password-input').value = "";
            }
        }

        window.onload = loadAlbums;
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('password-modal').classList.contains('flex')) submitPassword();
        });
    </script>
</body>

</html>
