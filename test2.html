<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat · 响应式会话切换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e9eef3;
            height: 100vh;
            overflow: hidden;
        }

        /* 主容器 */
        .chat-app {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ========= 左侧会话列表侧边栏 ========= */
        .sidebar {
            width: 280px;
            background-color: #f7f7f7;
            border-right: 1px solid #e2e2e2;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.26s ease-in-out;
            z-index: 20;
        }

        /* 移动端侧边栏默认隐藏 (通过菜单按钮控制) */
        @media (max-width: 767px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 12px rgba(0, 0, 0, 0.2);
                width: 280px;
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        /* 宽屏始终显示侧边栏 */
        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0) !important;
                position: relative;
            }

            .mobile-menu-overlay {
                display: none !important;
            }

            .menu-toggle {
                display: none !important;
            }
        }

        /* 遮罩层(仅移动端) */
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0s 0.2s;
        }

        .mobile-menu-overlay.active {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.2s, visibility 0s 0s;
        }

        /* 个人资料区 */
        .profile-panel {
            background: #f7f7f7;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e2e2;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #d9e1e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
            color: #1e1e1e;
        }

        /* 搜索框 */
        .search-bar {
            padding: 12px 16px;
            background: #f7f7f7;
        }

        .search-inner {
            background: #e9eef3;
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9a9ea4;
            font-size: 13px;
        }

        .search-inner span:first-child {
            font-size: 14px;
        }

        .search-inner input {
            background: transparent;
            border: none;
            outline: none;
            flex: 1;
            font-size: 13px;
        }

        /* 会话列表 */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }

        .chat-item.active {
            background-color: #e3e7ed;
        }

        .chat-item:hover {
            background-color: #f0f2f5;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: #d9e1e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 14px;
            font-weight: 500;
            color: #1f2c38;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 12px;
            color: #8c8f94;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            font-size: 10px;
            color: #9a9ea4;
            flex-shrink: 0;
        }

        /* ========= 右侧聊天主区域 ========= */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
        }

        /* 聊天头部 (包含移动端菜单按钮) */
        .chat-header {
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e9eef3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-toggle {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #2c3e4e;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-name {
            font-weight: 600;
            font-size: 16px;
            color: #111;
        }

        .header-actions span {
            font-size: 20px;
            margin-left: 18px;
            color: #7f858d;
            cursor: default;
        }

        /* 消息区域 */
        .message-area {
            flex: 1;
            overflow-y: auto;
            background: #f4f5f7;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            max-width: 80%;
        }

        .message-row.self {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            background: #d9e1e8;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .bubble {
            max-width: 280px;
            background: white;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.45;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.05);
            word-wrap: break-word;
        }

        .message-row.self .bubble {
            background: #95ec69;
            color: #111;
        }

        .msg-time {
            font-size: 10px;
            color: #aaafb6;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
            align-self: flex-end;
        }

        /* 输入栏 */
        .input-area {
            background: #ffffff;
            border-top: 1px solid #eaeef2;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .input-icons {
            display: flex;
            gap: 14px;
            color: #7c838b;
            font-size: 22px;
            cursor: default;
        }

        .input-box {
            flex: 1;
            background: #f4f5f7;
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: #95ec69;
            padding: 6px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            color: #1e1e1e;
            cursor: default;
            opacity: 0.8;
        }

        /* 默认 PC 端：显示文字，隐藏图标 */
        .send-icon {
            display: none;
        }

        .send-text {
            display: inline;
        }

        /* 移动端：显示图标，隐藏文字，并调整按钮内边距 */
        @media (max-width: 767px) {
            .send-text {
                display: none;
            }

            .send-icon {
                display: inline;
                font-size: 18px;
                line-height: 1;
            }

            .send-btn {
                padding: 6px 14px;
                /* 略微缩小内边距，使图标居中 */
            }
        }

        /* 滚动条 */
        .chat-list::-webkit-scrollbar,
        .message-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: #cbd0d8;
            border-radius: 10px;
        }

        /* 移动端头像缩小适配 */
        @media (max-width: 480px) {
            .message-row {
                max-width: 90%;
            }

            .bubble {
                max-width: 220px;
            }
        }
    </style>
</head>

<body>
    <div class="chat-app">
        <!-- 遮罩 (移动端) -->
        <div class="mobile-menu-overlay" id="menuOverlay"></div>

        <!-- 左侧会话列表 -->
        <div class="sidebar" id="sidebar">
            <div class="profile-panel">
                <div class="user-info">
                    <div class="avatar">🐧</div>
                    <div class="user-name">林川</div>
                </div>
                <div class="action-icons">⋯</div>
            </div>
            <div class="search-bar">
                <div class="search-inner">
                    <span>🔍</span>
                    <input type="text" placeholder="搜索">
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <!-- 会话列表数据将由js动态生成并绑定事件，以便切换 -->
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggleBtn">☰</button>
                    <div class="contact-info">
                        <div class="contact-name" id="activeContactName">陈雅</div>
                    </div>
                </div>
                <div class="header-actions">
                    <span>⋮</span>
                </div>
            </div>
            <div class="message-area" id="messageArea">
                <!-- 动态渲染当前会话的消息 -->
            </div>
            <div class="input-area">
                <div class="input-icons"><span>😊</span><span>➕</span></div>
                <input class="input-box" type="text" placeholder="输入消息...">
                <div class="send-btn">
                    <span class="send-text">发送</span>
                    <span class="send-icon">↵</span> <!-- 或 ⏎ / ↩️ -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- 模拟数据：会话列表 & 每个会话的消息记录 ----------
        const conversations = {
            '陈雅': {
                id: 'chenya',
                name: '陈雅',
                avatar: '🌸',
                preview: '明天下午一起去看电影吗？',
                time: '15:28',
                messages: [
                    { type: 'received', text: '你今天有空吗？想聊聊周末的计划～', time: '14:20' },
                    { type: 'sent', text: '有的呀，你要去哪里？', time: '14:22' },
                    { type: 'received', text: '要不周六下午去看新上映的电影？听说评分很高！', time: '14:24' },
                    { type: 'sent', text: '好主意！那就周六下午三点？IMAX厅怎么样', time: '14:25' },
                    { type: 'received', text: '可以呀，我看了下排片，三点二十有一场，正好看完晚饭', time: '14:27' },
                    { type: 'sent', text: '完美！我这就买票🎟️', time: '14:28' },
                    { type: 'received', text: '好滴～等你消息😊', time: '14:30' }
                ]
            },
            '张明远': {
                id: 'zhangmy',
                name: '张明远',
                avatar: '👨‍💻',
                preview: '好的，文档我收到了',
                time: '11:02',
                messages: [
                    { type: 'received', text: '林川，最新项目文档发你邮箱了', time: '10:45' },
                    { type: 'sent', text: '收到！我马上看下', time: '10:52' },
                    { type: 'received', text: '需要调整的地方告诉我', time: '10:58' },
                    { type: 'sent', text: '好的，文档我收到了', time: '11:02' }
                ]
            },
            '设计小分队': {
                id: 'design',
                name: '设计小分队',
                avatar: '📱',
                preview: '[图片] 这个效果不错！',
                time: '昨天',
                messages: [
                    { type: 'received', text: '大家看看新拟态风格的设计稿', time: '昨天 18:20' },
                    { type: 'sent', text: '我觉得圆角可以再大一点', time: '昨天 18:35' },
                    { type: 'received', text: '已调整，再来看看', time: '昨天 19:02' },
                    { type: 'sent', text: '[图片] 这个效果不错！', time: '昨天 19:20' }
                ]
            },
            '李雨桐': {
                id: 'liyt',
                name: '李雨桐',
                avatar: '🐱',
                preview: '周末聚会记得带伞哦☔️',
                time: '昨天',
                messages: [
                    { type: 'received', text: '周末天气好像不太好', time: '昨天 09:12' },
                    { type: 'sent', text: '嗯嗯，我会带伞的', time: '昨天 09:30' },
                    { type: 'received', text: '记得咱们约在咖啡厅见', time: '昨天 09:45' },
                    { type: 'sent', text: '周末聚会记得带伞哦☔️', time: '昨天 10:00' }
                ]
            }
        };

        // 会话顺序列表 (为了保持顺序)
        const chatOrder = ['陈雅', '张明远', '设计小分队', '李雨桐'];

        let currentContact = '陈雅';   // 当前活跃联系人

        // 渲染会话列表 (左侧)
        function renderChatList() {
            const chatListContainer = document.getElementById('chatList');
            if (!chatListContainer) return;
            chatListContainer.innerHTML = '';
            chatOrder.forEach(contactName => {
                const chat = conversations[contactName];
                if (!chat) return;
                const isActive = (currentContact === contactName);
                const chatItem = document.createElement('div');
                chatItem.className = `chat-item ${isActive ? 'active' : ''}`;
                chatItem.setAttribute('data-contact', contactName);
                chatItem.innerHTML = `
                <div class="chat-avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name}</div>
                    <div class="chat-preview">${chat.preview}</div>
                </div>
                <div class="chat-meta">${chat.time}</div>
            `;
                chatItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    switchConversation(contactName);
                    // 移动端点击任意会话后，关闭侧边栏
                    if (window.innerWidth < 768) {
                        closeSidebar();
                    }
                });
                chatListContainer.appendChild(chatItem);
            });
        }

        // 切换会话并重新渲染右侧消息区域
        function switchConversation(contactName) {
            if (!conversations[contactName]) return;
            currentContact = contactName;
            // 更新头部显示名称
            const contactNameSpan = document.getElementById('activeContactName');
            if (contactNameSpan) contactNameSpan.innerText = contactName;
            // 重新渲染消息区域
            renderMessages();
            // 更新左侧激活样式
            const allChatItems = document.querySelectorAll('.chat-item');
            allChatItems.forEach(item => {
                const contact = item.getAttribute('data-contact');
                if (contact === currentContact) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 渲染右侧消息区域 (依据当前会话)
        function renderMessages() {
            const messageContainer = document.getElementById('messageArea');
            if (!messageContainer) return;
            const chatData = conversations[currentContact];
            if (!chatData) return;

            messageContainer.innerHTML = '';
            chatData.messages.forEach(msg => {
                const isSelf = (msg.type === 'sent');
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row ${isSelf ? 'self' : ''}`;
                // 头像
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'msg-avatar';
                avatarDiv.innerText = isSelf ? '🐧' : chatData.avatar;
                // 气泡包装
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'bubble';
                bubbleDiv.innerText = msg.text;
                const timeSpan = document.createElement('div');
                timeSpan.className = 'msg-time';
                timeSpan.innerText = msg.time;
                rowDiv.appendChild(avatarDiv);
                rowDiv.appendChild(bubbleDiv);
                rowDiv.appendChild(timeSpan);
                messageContainer.appendChild(rowDiv);
            });
            // 滚动到底部
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        // ---------- 移动端侧边栏控制 ----------
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menuOverlay');
        const menuToggle = document.getElementById('menuToggleBtn');

        function openSidebar() {
            if (window.innerWidth >= 768) return; // 大屏不需要
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            if (window.innerWidth >= 768) return;
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleSidebar() {
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        }

        // 点击遮罩关闭
        if (overlay) {
            overlay.addEventListener('click', closeSidebar);
        }
        if (menuToggle) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSidebar();
            });
        }

        // 监听窗口大小变化：当宽度从小于768变为大于等于768时，确保侧边栏显示且移除内联显示问题
        function handleResize() {
            if (window.innerWidth >= 768) {
                // 确保侧边栏可见并关闭遮罩
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                // 移动端模式，侧边栏初始隐藏（如果因为resize从PC变手机，关掉侧边栏）
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        window.addEventListener('resize', handleResize);
        // 初始化
        function init() {
            renderChatList();
            renderMessages();
            handleResize(); // 确保初始状态正确
            // 点击聊天区域空白处可关闭侧边栏（可选增强用户体验）
            document.querySelector('.chat-main')?.addEventListener('click', (e) => {
                // 避免点击头部菜单按钮误关闭，由菜单单独控制；这里只处理点击主体内容关闭
                if (window.innerWidth < 768 && sidebar.classList.contains('open')) {
                    // 只有侧边栏打开时才关闭，而且不干扰菜单按钮 （菜单按钮已经调用toggle）
                    // 避免与toggle冲突：若目标不是菜单按钮区域，可关闭。但更好体验：用户点击聊天区域就收起侧边栏
                    if (!e.target.closest('.menu-toggle')) {
                        closeSidebar();
                    }
                }
            });
        }

        init();
    </script>
</body>

</html>
