<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEN'S MOMENTS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* 默认浅色模式 (Light Mode) */
            --bg-color: #f2f2f7;
            --container-bg: #ffffff;
            --text-color: #1c1c1e;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --accent: #ffcc00;
            --btn-bg: #ffffff;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        /* 深色模式 (Dark Mode) */
        [data-theme="dark"] {
            --bg-color: #000000;
            --container-bg: #1c1c1e;
            --text-color: #ffffff;
            --glass-bg: rgba(28, 28, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --btn-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            transition: all 0.4s ease; min-height: 100vh;
        }

        /* --- 顶部导航 --- */
        header {
            padding: 44px 24px 12px 24px;
            max-width: 440px; margin: 0 auto;
        }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

        .nav-group { display: flex; gap: 10px; }

        .nav-btn { 
            cursor: pointer; width: 42px; height: 42px; 
            display: flex; align-items: center; justify-content: center;
            background: var(--btn-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-md); transition: 0.2s;
            box-shadow: var(--card-shadow); color: var(--text-color);
            text-decoration: none; /* 针对 <a> 标签 */
        }
        .nav-btn:active { transform: scale(0.92); opacity: 0.8; }
        .nav-btn i { width: 20px; height: 20px; stroke-width: 2.2; }

        /* --- 标题与公告 --- */
        .title-group { text-align: left; margin: 10px 0 24px 0; }
        .title-main { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.8px; }
        .title-sub { font-size: 15px; opacity: 0.5; margin-top: 5px; }

        .announcement {
            background: var(--btn-bg); border: 1px solid var(--glass-border);
            padding: 10px 16px; border-radius: 40px; font-size: 13px; 
            overflow: hidden; white-space: nowrap; margin-bottom: 28px;
            box-shadow: var(--card-shadow);
        }
        .announcement-text { display: inline-block; animation: scroll 18s linear infinite; }

        /* --- 动态卡片 --- */
        .container { max-width: 440px; margin: 0 auto; padding: 0 24px; box-sizing: border-box; }
        
        .moment-card {
            background: var(--btn-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.5s ease;
        }

        .moment-content { line-height: 1.5; font-size: 16px; margin-bottom: 12px; font-weight: 400; }
        .moment-image { 
            width: 100%; border-radius: 14px; cursor: zoom-in; 
            border: 1px solid var(--glass-border); display: block;
        }
        .moment-time { font-size: 12px; opacity: 0.35; margin-top: 16px; font-weight: 500; }

        /* --- 弹窗逻辑 --- */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-content {
            width: 88%; max-width: 350px; background: var(--container-bg);
            border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: scale(0.8); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }
        .modal-overlay.active .modal-content { transform: scale(1); opacity: 1; }

        textarea {
            width: 100%; background: var(--bg-color); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 15px; color: var(--text-color); font-size: 16px;
            resize: none; box-sizing: border-box; margin-bottom: 20px; outline: none;
        }

        .action-btn {
            background: var(--text-color); color: var(--container-bg); border: none; 
            padding: 14px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer;
        }

        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; align-items: center; justify-content: center; }
        .viewer img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>

<body>
    <header>
        <div class="nav-bar">
            <a href="index.html" class="nav-btn"><i data-lucide="arrow-left"></i></a>
            <div class="nav-group">
                <div class="nav-btn" onclick="openPublish()"><i data-lucide="plus"></i></div>
                <div class="nav-btn" onclick="toggleTheme()"><i data-lucide="moon" id="theme-icon"></i></div>
            </div>
        </div>
        <div class="title-group">
            <h1 class="title-main">Moments</h1>
            <p class="title-sub">捕捉生活中的美好瞬息</p>
        </div>
        <div class="announcement">
            <span class="announcement-text">💡 提示：点击左上角箭头返回主页，点击右上角加号发布你的动态。</span>
        </div>
    </header>

    <main class="container">
        <div id="moments-list"></div>
    </main>

    <div class="modal-overlay" id="post-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size: 22px; text-align:center">新动态</h2>
            <textarea id="post-text" placeholder="此时此刻的想法..." rows="4"></textarea>
            <input type="file" id="post-file" accept="image/*" style="margin-bottom: 20px; font-size: 12px; width: 100%;">
            <button class="action-btn" onclick="handlePublish()">发 布</button>
            <p style="text-align:center; font-size:14px; opacity:0.4; cursor:pointer; margin-top:20px;" onclick="closeModal()">取消</p>
        </div>
    </div>

    <div class="viewer" id="viewer" onclick="this.style.display='none'">
        <img id="viewer-img">
    </div>

    <script>
        // Supabase 配置
        const PROJECT_URL = 'https://hmsovwceyinvwgplgywr.supabase.co';
        const ANON_KEY = 'sb_publishable_n4PuuvoT5HLgcKbPM41BkQ_XbKctJtS';
        const client = supabase.createClient(PROJECT_URL, ANON_KEY);

        // 1. 主题切换逻辑
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            if (isDark) {
                body.removeAttribute('data-theme');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // 2. 弹窗控制
        function openPublish() {
            const pw = prompt("请输入发布密码:");
            if (pw === "990701") {
                document.getElementById('post-modal').classList.add('active');
            } else if (pw !== null) {
                alert("密码错误");
            }
        }

        function closeModal() {
            document.getElementById('post-modal').classList.remove('active');
        }

        // 3. 数据加载与发布 (保持之前修复后的逻辑)
        async function loadMoments() {
            const { data, error } = await client.from('moments').select('*').order('created_at', { ascending: false });
            if (error) return;
            const list = document.getElementById('moments-list');
            list.innerHTML = data.map(m => `
                <div class="moment-card">
                    <div class="moment-content">${m.content || ''}</div>
                    ${m.image_url ? `<img src="${m.image_url}" class="moment-image" onclick="viewImg('${m.image_url}')">` : ''}
                    <div class="moment-time">${new Date(m.created_at).toLocaleString('zh-CN')}</div>
                </div>
            `).join('');
        }

        async function handlePublish() {
            const content = document.getElementById('post-text').value;
            const file = document.getElementById('post-file').files[0];
            let url = "";
            if (!content && !file) return;
            try {
                if (file) {
                    const fileName = `${Date.now()}.${file.name.split('.').pop()}`;
                    await client.storage.from('moment-files').upload(fileName, file);
                    url = client.storage.from('moment-files').getPublicUrl(fileName).data.publicUrl;
                }
                await client.from('moments').insert([{ content, image_url: url }]);
                location.reload();
            } catch (e) { alert("发布失败"); }
        }

        function viewImg(url) {
            document.getElementById('viewer-img').src = url;
            document.getElementById('viewer').style.display = 'flex';
        }

        window.onload = () => {
            loadMoments();
            lucide.createIcons();
        };
    </script>
</body>
</html>
