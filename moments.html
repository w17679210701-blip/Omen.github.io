<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEN的朋友圈</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="supabase.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>

    <style>
        /* --- 全局基础样式（浅色背景）--- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            padding: 0 16px 50px 16px;

        }

        /* --- 导航栏 --- */
        .timeline-header {
            position: sticky;
            top: 0;
            z-index: 200;
            margin: -200px 0 20px 0;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        /* 封面图容器 */
        .cover-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
            /* 封面高度，可按需调整 */
            background-color: #f0f0f0;
            margin-bottom: 20px;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            background-image: url('images/HeaderImage.jpg');
            /* 替换为您的封面图路径 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 封面昵称（显示在头像左侧） */
        .cover-nickname {
            position: absolute;
            bottom: 25px;
            /* 与头像垂直对齐（头像底部-30px，一半在外，所以取25px使其在封面内） */
            right: 100px;
            /* 头像宽度70px + 间距30px，显示在头像左侧 */
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            /* 防止换行 */
            z-index: 10;
            pointer-events: none;
            /* 避免干扰点击 */
        }

        /* 右下角头像 */
        .cover-avatar {
            position: absolute;
            bottom: -25px;
            right: 20px;
            width: 75px;
            height: 75px;
            border-radius: 10%;
            /* border: 3px solid #ffffff; */
            background-color: #ffffff;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .cover-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        /* .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        } */

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.9;
            display: block;
            margin-top: 4px;
            color: #333;
        }

        @media (max-width: 768px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }

            .cover-container {
                height: 350px;
                /* 手机端封面高度降低 */
            }

            .cover-nickname {
                font-size: 25px;
                bottom: 8px;
                right: 105px;
            }

            .timeline-header {
                margin-top: -150px;
                top: 12px;
                margin-bottom: 16px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .back-btn-inline,
            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }
        }

        /* 下拉菜单 */
        .dropdown-menu {
            display: none;
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 80px);
            left: calc(env(safe-area-inset-left, 20px) + 20px);
            width: 150px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        /* 朋友圈卡片样式 + 高度限制 */
        .moments-list {
            max-width: 600px;
            margin: 500px auto 0 auto;
        }

        .moment-item {
            max-height: 480px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .moment-item::-webkit-scrollbar {
            width: 4px;
        }

        .moment-item::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 4px;
        }

        .moment-item::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 4px;
        }

        .moment-header {
            display: flex;
            gap: 12px;
        }

        .moment-avatar {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: #e1e1e1;
        }

        .moment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .moment-content {
            flex: 1;
        }

        .moment-nickname {
            font-weight: 600;
            font-size: 16px;
            color: #2c2c2e;
            margin-bottom: 4px;
        }

        .moment-text {
            font-size: 15px;
            line-height: 1.45;
            color: #1a1a1a;
            margin-bottom: 8px;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .moment-media {
            margin: 8px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .moment-media img {
            width: 100%;
            display: block;
            cursor: zoom-in;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
        }

        .moment-media video {
            width: 100%;
            display: block;
            max-height: 300px;
            object-fit: contain;
            background: #000;
            border-radius: 12px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin: 8px 0;
            max-height: 260px;
            overflow-y: auto;
        }

        .image-grid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: zoom-in;
            border-radius: 8px;
        }

        .moment-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 8px;
        }

        .moment-time {
            font-size: 11px;
            color: #8e8e93;
            margin-right: auto;
        }

        /* 点赞按钮 - 纯 CSS 动画，无数字 */
        .like-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            padding: 4px;
            transition: transform 0.2s ease;
            color: #8e8e93;
        }

        .like-btn i {
            width: 22px;
            height: 22px;
            transition: all 0.2s;
        }

        /* 已点赞状态 */
        .like-btn.liked {
            color: #ff3b30;
        }

        .like-btn.liked i {
            fill: #ff3b30;
            stroke: #ff3b30;
        }

        /* 点击动画：心跳脉冲 + 缩放 */
        .like-btn-animate {
            animation: heartBeat 0.4s ease-in-out;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.3);
            }

            60% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }
        }

        /* 删除模式 */
        body.delete-mode .moment-item {
            cursor: pointer;
            opacity: 0.8;
            filter: grayscale(0.3);
        }

        .moment-item.selected {
            outline: 3px solid #ff4d4d;
            filter: grayscale(0) !important;
            opacity: 1 !important;
        }

        #delete-mode-btn.active {
            background: #ff4d4d;
            color: white;
        }

        #delete-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 60px;
        }

        #delete-bar {
            background: #ff4d4d;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        #cancel-delete {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            width: 88%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 28px;
            padding: 28px;
            color: #1a1a1a;
        }

        textarea,
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            padding: 14px 16px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }

        .action-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.6);
            border-radius: 40px;
            padding: 12px 0;
            font-weight: 600;
            color: #ffcc00;
            width: 100%;
            cursor: pointer;
            text-align: center;
        }

        .cancel-btn {
            margin-top: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
        }

        .viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .viewer img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .media-type-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .image-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .image-preview-grid img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        #video-preview {
            max-width: 100%;
            max-height: 200px;
        }

        /* Canvas 全屏特效容器 */
        #canvas-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

    <script>
        const PROJECT_URL = 'https://hmsovwceyinvwgplgywr.supabase.co';
        const ANON_KEY = 'sb_publishable_n4PuuvoT5HLgcKbPM41BkQ_XbKctJtS';
        const _supabase = supabase.createClient(PROJECT_URL, ANON_KEY);

        // 导航栏动态阴影
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        window.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(updateHeaderShadow); ticking = true; } });
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const layer = document.querySelector('.displacement-layer');
            if (!headerEl || !layer) return;
            let tick = false;
            window.addEventListener('scroll', () => {
                if (!tick) { requestAnimationFrame(() => { const i = (Math.sin(window.scrollY * 0.03) + 1) / 2; layer.style.transform = `translateY(${2 + i * 3}px)`; tick = false; }); tick = true; }
            });
        }
        initEdgeDistortion();

        // 菜单
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('active'); }
        window.onclick = (e) => { const m = document.getElementById('dropdown-menu'); const t = document.getElementById('menu-trigger'); if (m && t && !t.contains(e.target)) m.classList.remove('active'); };

        // 发布相关
        async function openPublish() {
            const pw = prompt("请输入发布密码:");
            if (!pw) return;
            const { data: ok } = await _supabase.rpc('verify_admin', { input_pw: pw });
            if (ok) document.getElementById('post-modal').classList.add('active');
            else alert("密码错误");
        }
        function closeModal() { document.getElementById('post-modal').classList.remove('active'); }

        // 获取已点赞的动态ID列表（本地存储）
        function getLikedMoments() {
            const stored = localStorage.getItem('liked_moments_no_stat');
            return stored ? JSON.parse(stored) : [];
        }
        function saveLikedMoments(list) {
            localStorage.setItem('liked_moments_no_stat', JSON.stringify(list));
        }
        function isLiked(momentId) {
            return getLikedMoments().includes(momentId);
        }

        // 点赞/取消点赞（仅前端动画+本地存储，不调用后端）
        function toggleLikeFrontend(btnElement, momentId) {
            const liked = isLiked(momentId);
            let list = getLikedMoments();
            if (liked) {
                // 取消点赞
                list = list.filter(id => id !== momentId);
                btnElement.classList.remove('liked');
            } else {
                // 点赞
                list.push(momentId);
                btnElement.classList.add('liked');
            }
            saveLikedMoments(list);
            // 播放动画
            btnElement.classList.add('like-btn-animate');
            setTimeout(() => {
                btnElement.classList.remove('like-btn-animate');
            }, 400);
        }

        // 高性能 Canvas 爱心雨（圆形替代 Emoji，限制总粒子数）
        let canvas = null, ctx = null;
        let particles = [];
        let animationId = null;
        const MAX_PARTICLES = 60;  // 全局最大粒子数

        function initCanvas() {
            if (canvas) return;
            canvas = document.createElement('canvas');
            canvas.id = 'canvas-effects';
            canvas.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;';
            document.body.appendChild(canvas);
            ctx = canvas.getContext('2d');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        }

        function showLikeEffect(x, y) {
            initCanvas();
            const heartCount = 15;  // 减少到15个，流畅度大幅提升
            // 如果当前粒子数超过限制，移除最早的 10 个
            if (particles.length + heartCount > MAX_PARTICLES) {
                particles.splice(0, heartCount);
            }
            for (let i = 0; i < heartCount; i++) {
                const angle = (Math.random() - 0.5) * Math.PI / 2.5;
                const speed = 2 + Math.random() * 3;
                const vx = Math.sin(angle) * speed + (Math.random() - 0.5) * 1.2;
                const vy = -Math.cos(angle) * speed - 1.2;
                particles.push({
                    x: x + (Math.random() - 0.5) * 50,
                    y: y,
                    vx: vx,
                    vy: vy,
                    size: 8 + Math.random() * 14,
                    alpha: 0.9,
                    color: `hsl(${Math.random() * 40 + 340}, 80%, 65%)`,
                    life: 1.0,
                    decay: 0.012 + Math.random() * 0.015
                });
            }
            if (!animationId) {
                function animate() {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let anyAlive = false;
                    for (let i = 0; i < particles.length; i++) {
                        const p = particles[i];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.12; // 重力
                        p.life -= p.decay;
                        if (p.life <= 0 || p.y > canvas.height + 80 || p.x < -80 || p.x > canvas.width + 80) {
                            particles.splice(i, 1);
                            i--;
                            continue;
                        }
                        anyAlive = true;
                        ctx.save();
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = 'rgba(255, 80, 120, 0.5)';
                        // 绘制圆形渐变代替 ❤️，性能极佳且不依赖字体
                        const gradient = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, p.size / 2);
                        gradient.addColorStop(0, p.color);
                        gradient.addColorStop(1, `rgba(255, 100, 100, ${p.life * 0.5})`);
                        ctx.globalAlpha = p.life * 0.85;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                        // 可选：在圆形上画一个小高光
                        ctx.beginPath();
                        ctx.arc(p.x - p.size / 6, p.y - p.size / 6, p.size / 8, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.life * 0.6})`;
                        ctx.fill();
                        ctx.restore();
                    }
                    if (anyAlive) {
                        animationId = requestAnimationFrame(animate);
                    } else {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                }
                animate();
            }
        }

        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}天前`;
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function renderImages(images) {
            if (!images || images.length === 0) return '';
            if (images.length === 1) return `<div class="moment-media"><img src="${images[0]}" onclick="viewImg('${images[0]}')"></div>`;
            let grid = '<div class="image-grid">';
            images.forEach(img => { grid += `<img src="${img}" onclick="viewImg('${img}')">`; });
            grid += '</div>';
            return grid;
        }

        async function loadMoments() {
            const { data, error } = await _supabase.from('moments').select('*').order('created_at', { ascending: false });
            if (error) return;
            renderMoments(data);
        }

        function renderMoments(data) {
            const container = document.getElementById('moments-container');
            const avatarUrl = 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/avatar.jpg';
            const nickname = 'Omen';
            container.innerHTML = data.map(m => {
                const mediaHtml = m.type === 'video' && m.video_url ? `<div class="moment-media"><video src="${m.video_url}" controls preload="metadata"></video></div>` :
                    (m.images && m.images.length) ? renderImages(m.images) :
                        (m.image_url ? `<div class="moment-media"><img src="${m.image_url}" onclick="viewImg('${m.image_url}')"></div>` : '');
                const date = new Date(m.created_at);
                const likedClass = isLiked(m.id) ? 'liked' : '';
                return `
                    <div class="moment-item" data-id="${m.id}" onclick="cardClick('${m.id}', this)">
                        <div class="moment-header">
                            <div class="moment-avatar"><img src="${avatarUrl}" alt="avatar"></div>
                            <div class="moment-content">
                                <div class="moment-nickname">${nickname}</div>
                                <div class="moment-text">${escapeHtml(m.content || '')}</div>
                                ${mediaHtml}
                                <div class="moment-footer">
                                    <span class="moment-time">${formatTime(date)}</span>
                                    <button class="like-btn ${likedClass}" data-id="${m.id}" onclick="event.stopPropagation(); handleLikeClick(this, '${m.id}', event)">
                                        <i data-lucide="heart" size="20"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        window.handleLikeClick = function (btnElement, momentId, event) {
            // 获取点击坐标（兼容鼠标和触摸）
            let clientX, clientY;
            if (event && event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event && event.clientX !== undefined) {
                clientX = event.clientX;
                clientY = event.clientY;
            } else {
                // 保底：取按钮中心
                const rect = btnElement.getBoundingClientRect();
                clientX = rect.left + rect.width / 2;
                clientY = rect.top + rect.height / 2;
            }
            showLikeEffect(clientX, clientY);   // 播放全屏特效
            toggleLikeFrontend(btnElement, momentId);
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function viewImg(url) {
            document.getElementById('viewer-img').src = url;
            document.getElementById('viewer').style.display = 'flex';
        }

        // 删除模式
        let isDeleteMode = false;
        let selectedIds = new Set();
        function toggleDeleteMode() {
            isDeleteMode = !isDeleteMode;
            const btn = document.getElementById('delete-mode-btn');
            const controls = document.getElementById('delete-controls');
            if (isDeleteMode) {
                document.body.classList.add('delete-mode');
                btn.classList.add('active');
                selectedIds.clear();
                updateDeleteBar();
                controls.style.display = 'flex';
            } else {
                document.body.classList.remove('delete-mode');
                btn.classList.remove('active');
                controls.style.display = 'none';
                document.querySelectorAll('.moment-item').forEach(el => el.classList.remove('selected'));
            }
        }
        function cardClick(id, element) {
            if (isDeleteMode) {
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                    element.classList.remove('selected');
                } else {
                    selectedIds.add(id);
                    element.classList.add('selected');
                }
                updateDeleteBar();
            }
        }
        function updateDeleteBar() { document.getElementById('delete-count').innerText = selectedIds.size; }
        function cancelDeleteMode() { toggleDeleteMode(); }
        async function executeDelete() {
            const pw = prompt(`确定删除 ${selectedIds.size} 条动态？请输入管理密码:`);
            if (!pw) return;
            const { data: ok } = await _supabase.rpc('verify_admin', { input_pw: pw });
            if (ok) {
                const ids = Array.from(selectedIds);
                const { error } = await _supabase.from('moments').delete().in('id', ids);
                if (!error) { alert('删除成功'); location.reload(); }
                else alert('删除失败');
            } else alert('密码错误');
        }

        // COS上传
        const CONFIG = { Bucket: 'hiomen-1312408524', Region: 'ap-guangzhou' };
        const cos = new COS({ SecretId: 'AKID63lERP6XjnhPrAD0XnqdARSFm35sQipi', SecretKey: 'g7IFwNXS9algMnytYy70f5E7g5FAqIVS' });

        async function handlePublish() {
            const content = document.getElementById('post-text').value.trim();
            const mediaType = document.querySelector('input[name="mediaType"]:checked').value;
            const btn = document.getElementById('publish-btn');
            btn.disabled = true;
            btn.innerText = "上传中...";
            let imageUrls = [], videoUrl = null;
            try {
                if (mediaType === 'image') {
                    const files = Array.from(document.getElementById('post-images').files);
                    if (files.length === 0) throw new Error('请至少选择一张图片');
                    const uploads = files.map(f => new Promise((res, rej) => {
                        const key = `moments/${Date.now()}_${f.name}`;
                        cos.uploadFile({ Bucket: CONFIG.Bucket, Region: CONFIG.Region, Key: key, Body: f }, (err, data) => err ? rej(err) : res(`https://${data.Location}`));
                    }));
                    imageUrls = await Promise.all(uploads);
                } else if (mediaType === 'video') {
                    const file = document.getElementById('post-video').files[0];
                    if (!file) throw new Error('请选择视频');
                    const key = `moments/${Date.now()}_${file.name}`;
                    const result = await new Promise((res, rej) => cos.uploadFile({ Bucket: CONFIG.Bucket, Region: CONFIG.Region, Key: key, Body: file }, (err, data) => err ? rej(err) : res(`https://${data.Location}`)));
                    videoUrl = result;
                }
                const insert = { content, images: imageUrls, video_url: videoUrl, type: mediaType, created_at: new Date().toISOString() };
                const { error } = await _supabase.from('moments').insert([insert]);
                if (error) throw error;
                alert('发布成功');
                location.reload();
            } catch (err) { alert('发布失败：' + err.message); }
            finally { btn.disabled = false; btn.innerText = "发布"; }
        }

        window.onload = () => {
            loadMoments();
            lucide.createIcons();
            // 媒体切换
            const radios = document.querySelectorAll('input[name="mediaType"]');
            const imageArea = document.getElementById('image-upload-area');
            const videoArea = document.getElementById('video-upload-area');
            const imageInput = document.getElementById('post-images');
            const videoInput = document.getElementById('post-video');
            const imagePreview = document.getElementById('image-preview');
            const videoPreview = document.getElementById('video-preview');
            radios.forEach(r => r.addEventListener('change', (e) => {
                if (e.target.value === 'image') { imageArea.style.display = 'block'; videoArea.style.display = 'none'; }
                else { imageArea.style.display = 'none'; videoArea.style.display = 'block'; }
            }));
            imageInput.addEventListener('change', () => {
                imagePreview.innerHTML = '';
                Array.from(imageInput.files).forEach(f => {
                    const reader = new FileReader();
                    reader.onload = (e) => { const img = document.createElement('img'); img.src = e.target.result; imagePreview.appendChild(img); };
                    reader.readAsDataURL(f);
                });
            });
            videoInput.addEventListener('change', () => {
                const file = videoInput.files[0];
                if (file) { videoPreview.src = URL.createObjectURL(file); videoPreview.style.display = 'block'; }
                else videoPreview.style.display = 'none';
            });
            document.getElementById('publish-btn').onclick = handlePublish;
        };
    </script>
