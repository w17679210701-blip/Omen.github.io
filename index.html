<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HI OMEN</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes bgFlow {
            0% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }

            50% {
                background-position: 100% 100%;
                filter: hue-rotate(8deg);
            }

            100% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }
        }

        html.is-loading,
        body.is-loading {
            overflow: hidden !important;
            height: 100% !important;
            width: 100% !important;
            position: fixed;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 100px 20px 50px 20px;
            transition: background 0.8s ease, color 0.5s ease;

            background-color: #1a1a1b;
            background-image:
                linear-gradient(135deg,
                    #0f0f10 0%,
                    #232326 25%,
                    #161618 50%,
                    #2a2a2e 75%,
                    #0f0f10 100%);

            background-size: 400% 400%;
            background-attachment: fixed;
            animation: bgFlow 20s linear infinite;
            /* 放慢动画，减少视觉干扰 */
            color: #e2e2e4;
        }

        body.light-mode {
            background-color: #f5f5f7;
            background-image:
                linear-gradient(135deg,
                    #ededf0 0%,
                    #fbfbfd 25%,
                    #e2e2e7 50%,
                    #f5f5f7 75%,
                    #ededf0 100%);
            background-size: 400% 400%;
            color: #1d1d1f;
        }

        /* --- 2. 核心翻转容器 (去掉了所有 .is-flipped 逻辑) --- */
        .flip-wrapper {
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            /* 初始状态强制设为 0 */
            transform: rotateY(0deg);
        }

        .flip-front,
        .flip-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .flip-back {
            transform: rotateY(180deg);
        }

        /* --- 3. UI 组件 (保持你原有的) --- */
        .floating-btn {
            position: fixed;
            top: 25px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            color: inherit;
        }

        body.light-mode .floating-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .btn-left {
            left: 20px;
        }

        .btn-right {
            right: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .sub-title {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.6);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        .notice-bar {
            width: 100%;
            max-width: 440px;
            height: 42px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow: hidden;
        }

        body.light-mode .notice-bar {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-size: 13px;
            color: #ffcc00;
            font-weight: 500;
        }

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .main-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s ease;
        }

        /* 1. 基础结构（不含颜色） */
        .glass-card {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. 暗色模式下的卡片 (Body 默认状态) */
        body .glass-card {
            background: rgba(45, 45, 50, 0.45);
            /* 调亮暗色卡片，增加钛灰感 */
            border: 1px solid rgba(255, 255, 255, 0.18);
            /* 强化高光边框 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.9);
        }

        /* 3. 浅色模式下的卡片 (由 .light-mode 类控制) */
        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.85);
            /* 纯白透亮 */
            border: 1px solid rgba(255, 255, 255, 1);
            /* 亮白实边 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            /* 极淡阴影 */
            color: #1a1a1a;
        }

        .profile-card-large {
            padding: 40px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        

        
        .avatar-halo {
            padding: 3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 0, 0.3);
            animation: glowPulse 3s infinite;
            margin-bottom: 20px;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            }
        }

        .avatar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .contact-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .contact-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            transition: 0.3s;
            text-decoration: none;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .clock-card {
            height: 120px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff88;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .video-card-full {
            width: 100%;
            aspect-ratio: 1 / 1;
            margin-top: 15px;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            z-index: 99999;
            margin: 0;
            padding: 0;
            display: block;
        }

        .loader-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            letter-spacing: 8px;
            font-weight: 900;
            font-size: 1.2rem;
            text-align: center;
            white-space: nowrap;
            animation: pulse 1.5s infinite;
            padding-left: 8px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: 0.6s ease;
        }

        /* 导航容器 */
        .nav-container-left {
            position: absolute;
            /* 改用绝对定位，固定在 header 的左侧 */
            left: 24px;
            /* 对应 header 的 padding 距离 */
            top: 44px;
            /* 对应 header 的 padding-top 距离 */
            z-index: 2001;
            line-height: 0;
        }

        /* 展开菜单基础样式 */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 30px;
            left: 0;
            /* 此时 left: 0 会严格对齐按钮左侧 */
            width: 150px;
            /* 明确宽度 */
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);

            /* 动画准备 */
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        /* 激活状态 */
        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        /* 菜单选项样式 */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .menu-item i {
            opacity: 0.8;
        }

        /* 浅色模式适配微调 */
        [data-theme="light"] .menu-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* 邮件弹窗基础 */
        .mail-modal {
            display: none;
            position: fixed;
            bottom: 90px;
            /* 位于联系栏上方 */
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px;
            box-shadow: var(--card-shadow);
            z-index: 3000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mail-modal.active {
            display: block;
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        /* 单条邮件项 */
        .mail-item {
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            margin-bottom: 4px;
        }

        .mail-item:last-child {
            margin-bottom: 0;
        }

        .mail-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .mail-item:active {
            transform: scale(0.97);
        }

        .mail-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 2px;
        }

        .mail-address {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
        }

        .copy-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            opacity: 0.3;
        }

        /* 复制成功后的提示效果 */
        .copy-success .mail-address {
            color: #34c759;
        }
    </style>
</head>

    <script>
        const html = document.documentElement;
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');

        // 核心翻转逻辑：固定一个方向旋转，不再依赖 class 切换
        function handleFlip(el) {
            const inner = el.querySelector('.flip-inner');
            // 获取当前存的角度，没有就从0开始
            let rotation = parseInt(el.getAttribute('data-rotation')) || 0;
            rotation += 180;
            inner.style.transform = `rotateY(${rotation}deg)`;
            el.setAttribute('data-rotation', rotation);
        }

        if (!window.matchMedia('(prefers-color-scheme: dark)').matches) body.classList.add('light-mode');

        window.onload = () => {
            themeToggle.innerHTML = body.classList.contains('light-mode') ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
            lucide.createIcons();

            const showPage = () => {
                const loader = document.getElementById('loader');
                if (loader) loader.classList.add('fade-out');
                html.classList.remove('is-loading');
                body.classList.remove('is-loading');
                const main = document.getElementById('main-content');
                if (main) {
                    main.style.opacity = "1";
                    main.style.transform = "translateY(0)";
                }
                initTimers();
            };

            const videos = document.querySelectorAll('.pure-video');
            let loadedCount = 0;
            if (videos.length > 0) {
                videos.forEach(v => {
                    if (v.readyState >= 3) { loadedCount++; }
                    else {
                        v.addEventListener('loadeddata', () => {
                            loadedCount++;
                            if (loadedCount >= videos.length) showPage();
                        });
                    }
                });
                if (loadedCount >= videos.length) showPage();
            } else { showPage(); }
            setTimeout(showPage, 500);

            function updateRuntime() {
                // 1. 设置你的建站日期（年，月-1，日，时，分，秒）
                // 注意：月份是从 0 开始的，比如 2月要写 1
                const startDate = new Date(2026, 2, 24, 13, 30, 0);
                const now = new Date();
                const diff = now - startDate; // 毫秒差

                // 2. 计算天、时、分、秒
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                // 3. 格式化并显示
                document.getElementById('runtime-timer').innerHTML =
                    `${days}天 ${String(hours).padStart(2, '0')}时 ${String(minutes).padStart(2, '0')}分 ${String(seconds).padStart(2, '0')}秒`;
            }

            // 每秒更新一次
            setInterval(updateRuntime, 1000);
            // 初始化执行一次避免空白
            updateRuntime();
        };

        function initTimers() {
            const clock = document.getElementById('live-clock');
            const countdown = document.getElementById('countdown-timer');
            const target = new Date("2026-03-24T13:00:00").getTime();
            function update() {
                const now = new Date();
                if (clock) clock.textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0') + "." + now.getMilliseconds().toString().padStart(3, '0');
                if (countdown) {
                    const diff = target - now.getTime();
                    if (diff > 0) {
                        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                        const ms = (diff % 1000).toString().padStart(3, '0');
                        countdown.textContent = `${h}:${m}:${s}.${ms}`;
                    } else { countdown.textContent = "TIME UP!"; }
                }
                requestAnimationFrame(update);
            }
            update();
        }

        themeToggle.onclick = function () {
            body.classList.toggle('light-mode');
            this.innerHTML = body.classList.contains('light-mode') ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
            lucide.createIcons();
        };

        function toggleMenu(event) {
            // 阻止事件冒泡，防止触发 window 的点击关闭逻辑
            event.stopPropagation();
            const menu = document.getElementById('dropdown-menu');
            menu.classList.toggle('active');
        }

        // 点击页面其他位置自动收起菜单
        window.addEventListener('click', function (e) {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');

            if (!trigger.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // 确保在页面加载后执行图标渲染
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // 切换邮件弹窗显示/隐藏
        function toggleMailModal(event) {
            event.stopPropagation();
            const modal = document.getElementById('mail-modal');
            modal.classList.toggle('active');
        }

        // 复制文字功能
        async function copyText(text, element) {
            try {
                await navigator.clipboard.writeText(text);

                // 视觉反馈
                element.classList.add('copy-success');
                const originalText = element.querySelector('.mail-address').innerText;
                element.querySelector('.mail-address').innerText = "已复制到剪贴板！";

                setTimeout(() => {
                    element.classList.remove('copy-success');
                    element.querySelector('.mail-address').innerText = originalText;
                    // 复制后自动关窗（可选）
                    // document.getElementById('mail-modal').classList.remove('active');
                }, 1500);
            } catch (err) {
                alert('复制失败，请手动输入');
            }
        }

        // 点击外部关闭弹窗
        window.addEventListener('click', function (e) {
            const modal = document.getElementById('mail-modal');
            if (!modal.contains(e.target)) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>

</html>
