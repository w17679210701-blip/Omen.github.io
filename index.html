<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HI OMEN</title>
    <!-- 应用图标 -->
    <link rel="apple-touch-icon"
        href="https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png">
    <!-- 应用标题 -->
    <meta name="apple-mobile-web-app-title" content="HIOMEN">
    <!-- 全屏模式 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 设置状态栏样式（全屏模式下有效） -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 启动页面 -->
    <link rel="apple-touch-startup-image"
        href="https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png">

    <link rel="stylesheet" href="css/common.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html.is-loading,
        body.is-loading {
            overflow: hidden !important;
            height: 100% !important;
            width: 100% !important;
            position: fixed;
        }

        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 0 20px 50px 20px;
            /* 左右统一留白 20px */
            transition: background 0.8s ease, color 0.5s ease;
        }

        /* 导航栏、公告栏、主容器统一宽度规则 */
        .timeline-header,
        .notice-bar,
        .main-container {
            width: 100%;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 导航栏容器 */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 101;
            margin-bottom: 20px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        /* .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        } */

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        /* 导航栏按钮（通用） */
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        /* 标题区域 */
        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }

            .timeline-header {
                top: 12px;
                margin-bottom: 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .notice-bar {
                margin-bottom: 12px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }
        }

        /* --- 2. 核心翻转容器 --- */
        .flip-wrapper {
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            transform: rotateY(0deg);
        }

        .flip-front,
        .flip-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .flip-back {
            transform: rotateY(180deg);
        }

        .btn-left {
            left: 20px;
        }

        .btn-right {
            right: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .sub-title {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.6);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        .notice-bar {
            height: 42px;
            margin-bottom: 20px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.6) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow: hidden;
            position: relative;
            z-index: 100;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 35s linear infinite;
            font-size: 13px;
            color: #1a1a1a !important;
            font-weight: 500;
        }

        @keyframes marquee {
            0% {
                transform: translateX(25%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 1 !important;
            transform: translateY(20px);
            transition: 0.8s ease;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body .glass-card {
            background: rgba(255, 255, 255, 0.7) !important;
            color: #1a1a1a !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08) !important;
        }

        .avatar-halo {
            position: relative;
            padding: 3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 0, 0.3);
            animation: glowPulse 3s infinite;
            margin-top: 0 !important;
            z-index: 5 !important;
            flex-shrink: 0 !important;
            margin-bottom: 20px !important;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            }
        }

        .avatar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .contact-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .contact-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            transition: 0.3s;
            text-decoration: none;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .clock-card {
            height: 120px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff88;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .video-card-full {
            width: 100%;
            aspect-ratio: 1 / 1;
            margin-top: 15px;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1f 50%, #0a0a0a 100%);
            z-index: 99999;
            margin: 0;
            padding: 0;
            display: block;
        }

        .loader-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4d4d;
            letter-spacing: 8px;
            font-weight: 900;
            font-size: 1.2rem;
            text-align: center;
            white-space: nowrap;
            animation: pulse 1.5s infinite;
            padding-left: 8px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: 0.6s ease;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 30px;
            left: 0;
            width: 150px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .menu-item i {
            opacity: 0.8;
        }

        /* 邮件弹窗 */
        .mail-modal {
            display: none;
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px;
            box-shadow: var(--card-shadow);
            z-index: 3000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #wechat-modal {
            left: 19%;
            transform: scale(0.8);
            bottom: auto;
            margin-top: 310px;
            background: var(--glass-bg);
        }

        #wechat-modal.active {
            transform: scale(1);
        }

        .mail-modal.active {
            display: block;
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        .mail-item {
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            margin-bottom: 4px;
        }

        .mail-item:last-child {
            margin-bottom: 0;
        }

        .mail-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .mail-item:active {
            transform: scale(0.97);
        }

        .mail-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 2px;
        }

        .mail-address {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
        }

        .copy-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            opacity: 0.3;
        }

        .copy-success .mail-address {
            color: #34c759;
        }

        /* 个人卡片水印 */
        .glass-card.profile-card-large {
            position: relative !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: flex-start !important;
            padding: 40px 20px 25px 20px !important;
        }

        .glass-card.profile-card-large::after {
            content: "" !important;
            position: absolute !important;
            right: -70px;
            top: -20px;
            width: 300px;
            height: 300px;
            background: url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/ETGOHOMELOGO.png') no-repeat center !important;
            background-repeat: no-repeat;
            background-size: contain !important;
            background-position: center;
            opacity: 0.4;
            filter: contrast(110%) brightness(105%);
            mix-blend-mode: normal;
            pointer-events: none;
            z-index: 1 !important;
        }

        .glass-card.profile-card-large>*:not(::after):not(::before) {
            position: relative !important;
            z-index: 2 !important;
            flex-shrink: 0 !important;
        }

        .profile-name,
        .contact-group {
            position: relative;
            z-index: 2;
        }

        .profile-card-large {
            padding: 40px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 朋友圈预览卡片 */
        .moments-preview-card {
            background: rgba(255, 255, 255, 0.7) !important;
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 20px;
            margin-top: 20px;
            transition: transform 0.3s ease, background 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moments-preview-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .moments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px !important;
        }

        .moments-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-avatar {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .nickname {
            font-weight: bold;
            font-size: 14px;
            color: #e71212;
            display: inline-block;
            margin-top: 15px;
        }

        .moments-time {
            font-size: 11px;
            opacity: 0.6;
        }

        .moments-text {
            font-size: 14px;
            margin-top: 0 !important;
            line-height: 1.4;
            margin-bottom: 8px !important;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .moments-media .content-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moments-footer {
            margin-top: 15px;
            text-align: right;
        }

        .view-detail {
            font-size: 12px;
            color: #ffcc00;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .moments-preview-card {
            animation: fadeIn 0.8s ease forwards;
            margin-top: 0 !important;
            padding-top: 10px !important;
            padding-bottom: 15px !important;
            margin-top: 15px !important;
        }

        .content-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #latest-moment {
            position: relative !important;
            overflow: hidden !important;
        }

        #latest-moment::after {
            content: "" !important;
            position: absolute !important;
            top: -95px;
            left: 50px;
            width: 100%;
            height: 100%;
            z-index: 1 !important;
            pointer-events: none;
            background: url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/ETLOGOR.png') no-repeat !important;
            background-position: center !important;
            background-size: 200px !important;
            mix-blend-mode: normal !important;
            opacity: 0.4;
        }

        #latest-moment>* {
            position: relative !important;
            z-index: 2 !important;
        }

        @media (max-width: 480px) {
            .modal-content {
                width: 85%;
                padding: 20px;
            }
        }

        #loader {
            transition: opacity 0.5s ease, visibility 0.5s ease !important;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(5px);
        }

        #loader.fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        #dropdown-menu {
            position: fixed !important;
            top: calc(env(safe-area-inset-top, 20px) + 80px) !important;
            left: calc(env(safe-area-inset-left, 20px) + 20px) !important;
            z-index: 2147483646 !important;
        }

        .ai-card {
            width: 100%;
            height: 140px;
            /* background-image: url('https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/aigb.jpg'); */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* 背景固定 */
            border-radius: 28px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 确保没有 backdrop-filter 和额外背景 */
            margin-bottom: -15px;
        }

        .ai-card::before {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: 26px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        .ai-card:hover {
            border-color: #007aff;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.3);
            transform: scale(1.02);
        }

        .ai-text {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #0ff, #0af);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            letter-spacing: 4px;
            z-index: 2;
            pointer-events: none;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0% {
                text-shadow: 0 0 2px rgba(0, 0, 0, 0.1);
            }

            50% {
                text-shadow: 0 0 12px rgba(0, 122, 255, 0.6), 0 0 4px rgba(0, 122, 255, 0.4);
            }

            100% {
                text-shadow: 0 0 2px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>

<body class="is-loading">
    <div class="timeline-header" id="timelineHeader">
        <button class="nav-btn" id="menu-trigger" onclick="toggleMenu(event)">
            <i data-lucide="menu"></i>
        </button>
        <div class="header-title">
            <h1>主页</h1>

        function updateRuntime() {
            const startDate = new Date(2026, 2, 24, 13, 30, 0);
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);
            const el = document.getElementById('runtime-timer');
            if (el) el.innerHTML = `${days}天 ${String(hours).padStart(2, '0')}时 ${String(minutes).padStart(2, '0')}分 ${String(seconds).padStart(2, '0')}秒`;
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 0) return '刚刚';
            const intervals = [
                { label: '年', seconds: 31536000 },
                { label: '月', seconds: 2592000 },
                { label: '天', seconds: 86400 },
                { label: '小时', seconds: 3600 },
                { label: '分钟', seconds: 60 },
                { label: '秒', seconds: 1 }
            ];
            for (const interval of intervals) {
                const count = Math.floor(seconds / interval.seconds);
                if (count >= 1) return `${count}${interval.label}前`;
            }
            return '刚刚';
        }

        async function loadLatestMoment() {
            if (!window.db) return;
            try {
                const { data, error } = await window.db
                    .from('moments')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single();
                if (data) {
                    document.getElementById('moment-text').innerText = data.content || '暂无动态';
                    const postDate = new Date(data.created_at);
                    const relativeTime = timeAgo(postDate);
                    document.getElementById('moment-time').innerText = relativeTime;
                    const mediaContainer = document.getElementById('moment-media');
                    if (data.video_url) {
                        mediaContainer.innerHTML = `<div style="position: relative;"><video src="${data.video_url}" class="content-img" preload="metadata" style="width:100%; max-height:200px; object-fit:cover;"></video><div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.6); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px;">▶</div></div>`;
                        mediaContainer.style.display = 'block';
                    } else if (data.images && data.images.length > 0) {
                        const firstImage = data.images[0];
                        const moreCount = data.images.length - 1;
                        mediaContainer.innerHTML = `<div style="position: relative;"><img src="${firstImage}" class="content-img" style="width:100%; max-height:200px; object-fit:cover;">${moreCount > 0 ? `<div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px;">+${moreCount}</div>` : ''}</div>`;
                        mediaContainer.style.display = 'block';
                    } else if (data.image_url) {
                        mediaContainer.innerHTML = `<img src="${data.image_url}" class="content-img">`;
                        mediaContainer.style.display = 'block';
                    } else {
                        mediaContainer.style.display = 'none';
                    }
                }
            } catch (err) { console.error('动态加载失败', err); }

                    if (current) {
                        const newPv = current.pv + 1;
                        await window.db.from('site_stats').update({ pv: newPv }).eq('id', 1);
                        document.getElementById('visit-count').innerText = newPv;
                    }
                } else {
                    document.getElementById('visit-count').innerText = data;
                }
            } catch (err) {
                console.error('访问量更新失败', err);
                document.getElementById('visit-count').innerText = '--';
            }
        }

        async function loadSiteConfig() {
            if (!window.db) return;
            const { data, error } = await window.db.from('site_config').select('key, value');
            if (error) {
                console.error('加载配置失败', error);
                return;
            }
            const config = {};
            data.forEach(item => config[item.key] = item.value);
            const titleEl = document.querySelector('.main-title');
            if (titleEl) titleEl.innerText = config.home_title || '个人博客';
            const subtitleEl = document.querySelector('.sub-title');
            if (subtitleEl) subtitleEl.innerText = config.home_subtitle || '一人 丨 一猫 丨 一首歌';
            const noticeEl = document.getElementById('notice-content');
            if (noticeEl) noticeEl.innerText = config.home_notice || '📢 欢迎来到 OMEN 的空间！';
            const avatarEl = document.querySelector('.avatar-box img');
            if (avatarEl) avatarEl.src = config.home_avatar || 'images/avatar.jpg';
            const nameEl = document.querySelector('.profile-name');
            if (nameEl) nameEl.innerText = config.home_name || 'Omen';
        }

        // 导航栏动态阴影
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(updateHeaderShadow);
                ticking = true;
            }
        }
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', () => updateHeaderShadow());
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const displacementLayer = document.querySelector('.displacement-layer');
            if (!headerEl || !displacementLayer) return;
            let tick = false;
            function updateDisplacement() {
                const scrollY = window.scrollY;
                let intensity = 0;
                if (scrollY > 0) intensity = (Math.sin(scrollY * 0.03) + 1) / 2;
                const translateY = 2 + intensity * 3;
                displacementLayer.style.transform = `translateY(${translateY}px)`;
                tick = false;
            }
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(updateDisplacement);
                    tick = true;
                }
            });
            updateDisplacement();
        }
        initEdgeDistortion();

        window.onload = () => {
            loadSiteConfig();
            const loaderText = document.querySelector('.loader-text');
            if (loaderText) {
                const randomColor = loadingColors[Math.floor(Math.random() * loadingColors.length)];
                loaderText.style.color = randomColor;
            }
            lucide.createIcons();
            const clockEl = document.getElementById('live-clock');
            const countdownEl = document.getElementById('countdown-timer');
            const targetTime = new Date("2026-03-24T13:00:00").getTime();
            function runLiveTimers() {
                const now = new Date();
                if (clockEl) {
                    const h = String(now.getHours()).padStart(2, '0'),
                        m = String(now.getMinutes()).padStart(2, '0'),
                        s = String(now.getSeconds()).padStart(2, '0'),
                        ms = String(now.getMilliseconds()).padStart(3, '0');
                    clockEl.textContent = `${h}:${m}:${s}.${ms}`;
                }
                if (countdownEl) {
                    const diff = targetTime - now.getTime();
                    if (diff > 0) {
                        const h = String(Math.floor(diff / 3600000)).padStart(2, '0'),
                            m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0'),
                            s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0'),
                            ms = String(diff % 1000).padStart(3, '0');
                        countdownEl.textContent = `${h}:${m}:${s}.${ms}`;
                    } else { countdownEl.textContent = "TIME UP!"; }
                }
                requestAnimationFrame(runLiveTimers);
            }
            runLiveTimers();
            setInterval(updateRuntime, 1000);
            updateVisitCount();
            updateRuntime();
            setTimeout(showPage, 200);
            if (typeof loadLatestMoment === 'function') loadLatestMoment();
            lucide.createIcons();
        };

        window.onclick = function (e) {
            const menu = document.getElementById('dropdown-menu');
            if (menu && !document.getElementById('menu-trigger').contains(e.target)) {
                menu.classList.remove('active');
            }
        };
    </script>
</body>

</html>
