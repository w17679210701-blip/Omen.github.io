<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEN | 个人博客</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 核心动画：升级版动态流体 --- */
        @keyframes bgFlow {
            0% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }

            50% {
                background-position: 100% 100%;
                filter: hue-rotate(8deg);
            }

            100% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 100px 20px 50px 20px;
            transition: background 0.8s ease, color 0.5s ease;
            background-color: #050505;
            background-image:
                radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.25) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(168, 133, 0, 0.2) 0px, transparent 50%),
                linear-gradient(135deg, #050505 0%, #1a1a1f 50%, #050505 100%);
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: bgFlow 12s ease-in-out infinite;
            color: rgba(255, 255, 255, 0.9);
        }

        body.light-mode {
            background-color: #ffffff;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.18) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 40%),
                linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            color: #1a1a1a;
        }

        /* --- 2. 悬浮导航按钮 --- */
        .floating-btn {
            position: fixed;
            top: 25px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
            color: inherit;
        }

        body.light-mode .floating-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .btn-left {
            left: 20px;
        }

        .btn-right {
            right: 20px;
        }

        /* --- 3. 顶部标题区 --- */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .sub-title {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.6);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        body.light-mode .main-title {
            color: #1a1a1a;
        }

        /* --- 4. 滚动公告栏 --- */
        .notice-bar {
            width: 100%;
            max-width: 440px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body.light-mode .notice-bar {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-size: 13px;
            color: #ffcc00;
        }

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* --- 5. 核心布局容器 --- */
        .main-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        /* --- 6. 玻璃卡片 --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.3s ease, background 0.5s ease;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .profile-card-large {
            padding: 40px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-halo {
            padding: 3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 0, 0.3);
            animation: glowPulse 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
                border-color: rgba(255, 204, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
                border-color: rgba(255, 204, 0, 0.7);
            }
        }

        .avatar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .contact-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        body.light-mode .contact-group {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .contact-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            transition: 0.3s;
            text-decoration: none;
        }

        .contact-btn:hover {
            background: rgba(255, 204, 0, 0.2);
            transform: translateY(-3px);
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* --- 重点修改：载入页面背景 --- */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 2000;
            /* 使用白粉渐变，加入微弱的流动感动画 */
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 75%, #fff0f5 100%);
            background-size: 400% 400%;
            animation: loaderBgFlow 4s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes loaderBgFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 载入文字调整，确保在浅色背景下清晰且保持风格 */
        .loader-text {
            color: #ff69b4;
            letter-spacing: 8px;
            font-weight: 900;
            animation: pulse 1.5s infinite;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
            /* 消失时带一点放大感 */
        }

        /* 3D 翻转基础配置 */
        .flip-card {
            perspective: 1000px;
            height: 120px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* 闪烁呼吸灯效果 */
        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff88;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="loader-text">LOADING</div>
    </div>

    <div class="floating-btn btn-left"><i data-lucide="menu" size="20"></i></div>
    <div class="floating-btn btn-right" id="theme-toggle"><i data-lucide="moon" size="20"></i></div>

    <div class="header-section">
        <h1 class="main-title">个人博客</h1>
        <div class="sub-title">一人 丨 一猫 丨 一首歌</div>
    </div>

    <div class="notice-bar">
        <div class="notice-content">
            📢 欢迎来到 OMEN 的空间！ · 祝JAY新专辑《太阳之子》大卖！ · 目前处于测试阶段 · 本站由GitHub、腾讯云提供云服务。
        </div>
    </div>

    <div id="main-content" class="main-container">
        <div class="glass-card profile-card-large">
            <div class="avatar-halo">
                <div class="avatar-box">
                    <img src="images/avatar.jpg" alt="Avatar">
                </div>
            </div>
            <div class="profile-name">Omen</div>
            <div class="contact-group">
                <a href="https://t.me/OmenG82_Pro" target="_blank" class="contact-btn">
                    <i data-lucide="send" size="20"></i>
                </a>

                <a href="https://instagram.com/OmenYi701" target="_blank" class="contact-btn">
                    <i data-lucide="instagram" size="20"></i>
                </a>

                <a href="mailto:w17679210701@gmail.com" class="contact-btn">
                    <i data-lucide="mail" size="20"></i>
                </a>
            </div>
        </div>

        <div class="grid-row">
            <a href="photo.html" class="glass-card"
                style="height: 120px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:inherit; gap:10px;">
                <i data-lucide="image" color="#ffcc00"></i>
                <span style="font-size:12px; letter-spacing:2px;">作品相册</span>
            </a>
            <div class="flip-card" onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner">

                    <div class="flip-card-front glass-card"
                        style="height: 120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; margin:0;">
                        <span style="font-size:10px; opacity:0.5; letter-spacing:1px;">当前时间</span>
                        <div id="live-clock"
                            style="font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);">
                            00:00:00.000</div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="status-dot"></div>
                            <span style="font-size:12px;">系统运行中</span>
                        </div>
                    </div>

                    <div class="flip-card-back glass-card"
                        style="height: 120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; margin:0;">
                        <span style="font-size:10px; opacity:0.5; letter-spacing:1px;">距离《太阳之子》发布还有</span>
                        <div id="countdown-timer"
                            style="font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);">
                            00:00:00.000</div>
                        <span style="font-size:9px; opacity:0.4; margin-top:5px;">ps：发布会时间</span>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (!prefersDark) {
            body.classList.add('light-mode');
        }

        // --- 修改这里：在 window.onload 内部启动计时器 ---
        window.onload = () => {
            const isLight = body.classList.contains('light-mode');
            themeToggle.innerHTML = isLight ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
            lucide.createIcons();

            const loader = document.getElementById('loader');
            const main = document.getElementById('main-content');

            setTimeout(() => {
                loader.classList.add('fade-out');
                main.style.opacity = "1";
                main.style.transform = "translateY(0)";
            }, 800);

            // 关键：在这里点火！
            initTimers();
        };

        function initTimers() {
            const clock = document.getElementById('live-clock');
            const countdown = document.getElementById('countdown-timer');
            // 目标时间：2027年元旦
            const target = new Date("2026-03-24T13:00:00").getTime();

            function update() {
                const now = new Date();

                // 实时时间刷新
                if (clock) {
                    const timeStr = now.getHours().toString().padStart(2, '0') + ":" +
                        now.getMinutes().toString().padStart(2, '0') + ":" +
                        now.getSeconds().toString().padStart(2, '0') + "." +
                        now.getMilliseconds().toString().padStart(3, '0');
                    clock.textContent = timeStr;
                }

                // 倒计时刷新
                if (countdown) {
                    const diff = target - now.getTime();
                    if (diff > 0) {
                        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                        const ms = (diff % 1000).toString().padStart(3, '0');
                        countdown.textContent = `${h}:${m}:${s}.${ms}`;
                    } else {
                        countdown.textContent = "TIME UP!";
                    }
                }
                requestAnimationFrame(update);
            }
            update();
        }

        themeToggle.onclick = function () {
            body.classList.toggle('light-mode');
            const isLightNow = body.classList.contains('light-mode');
            this.innerHTML = isLightNow ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
            lucide.createIcons();
        };
    </script>
</body>

</html>
