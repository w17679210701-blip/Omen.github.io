<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEN OMEN | OMEN OMEN</title>
    <link rel="stylesheet" href="index.css?v=4.0">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
   <div id="loader-wrapper">
    <div class="sun-halo"></div>
    <div class="global-sweep-light"></div>
    <div class="particle-container" id="particle-box"></div>

    <div class="loader-content">
        <h1 class="loader-logo">HI OMEN</h1>
        <div class="shimmer-layer">HI OMEN</div>
    </div>
</div>
</div>
</div>
    <div class="container" id="main-container">

        <div class="bento-item profile-card" onclick="flipAllCards()">
            <div class="bento-inner">
                <div class="bento-front">
                    <div class="avatar"><img src="images/avatar.jpg" alt="头像"></div>
                    <div class="info-text">
                        <h1>OMEN丨个人博客</h1>
                        <p class="description">预祝我哥新专《太阳之子》大卖！！！</p>
                    </div>
                </div>
                <div class="bento-back">
                    <h2 style="color:var(--accent)">控制中心</h2>
                    <p>点击返回首页</p>
                </div>
            </div>
        </div>

        <div class="bento-item video-card" onclick="switchVideo(this)">
            <div class="bento-inner">
                <div class="bento-front">
                    <video id="video-a" webkit-playsinline playsinline x5-video-player-type="h5-page"
                        x5-video-orientation="portrait" preload="metadata" autoplay muted loop class="bg-video"
                        style="object-fit: cover;">
                        <source src="videos/jayvideo1.MP4" type="video/mp4">
                    </video>
                </div>
                <div class="bento-back" style="padding:0 !important; background:#000;">
                    <video id="video-b" muted loop playsinline class="bg-video">
                        <source src="" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>

        <div class="bento-item sales-card">
            <div class="bento-inner">
                <div class="bento-front">
                    <div class="sales-header">
                        <i data-lucide="trending-up" class="icon-small"></i>
                        <h3>实时销量（QQ音乐）</h3>
                    </div>
                    <p id="sales-count">loading...</p>
                    <div class="sales-badge">LIVE</div>
                </div>
                <div class="bento-back">
                    <h3>实时数据源</h3>
                    <p>每 2.5s 同步</p>
                </div>
            </div>
        </div>

    <div class="bento-item link-card">
    <a href="https://c6.y.qq.com/base/fcgi-bin/u?__=lcfibEzma6aR" target="_blank" class="card-anchor">
        <div class="bento-inner">
            <div class="bento-front sos-cover"></div>
            <div class="bento-back sos-cover"></div>
        </div>
    </a>
</div>

       <a href="photo.html" style="text-decoration: none; color: inherit; display: block;">
    <div class="bento-item link-card">
        <div class="bento-inner">
            <div class="bento-front">
                <i data-lucide="camera" class="icon"></i> <span>私人影像馆</span>
            </div>
            <div class="bento-back">
                <p>Upyun / 密码访问</p>
            </div>
        </div>
    </div>
</a>


<div class="bento-item github-card" onclick="toggleExpand(this)">
    <div class="bento-inner">
        <div class="bento-front">
            <div id="bento-clock" style="font-size: 2rem; font-weight: bold; color: var(--gold); font-family: monospace;">00:00:00</div>
            <span style="font-size: 0.8rem; opacity: 0.6;">CURRENT TIME</span>
        </div>
        
        <div class="bento-back">
            <div id="weather-info">
                <div id="weather-temp" style="font-size: 1.8rem; font-weight: bold; color: var(--gold);">--°C</div>
                <div id="weather-desc" style="font-size: 0.9rem; opacity: 0.8;">加载中...</div>
            </div>
        </div>
    </div>

    <div class="expanded-detail" style="display: none;">
        <i data-lucide="cloud-sun" style="width: 48px; height: 48px; color: var(--gold);"></i>
        <h2 style="margin: 20px 0 10px;">Status Board</h2>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 25px;">实时时间与气象数据同步中</p>
    </div>
</div>

       <div class="bento-item status-card">
    <div class="bento-inner">
        <div class="bento-front">
            <span class="dot"></span>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <p id="user-ip" style="font-family: monospace; font-size: 1.1rem; color: var(--gold); margin: 5px 0;">加载中...</p>
                <span style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 1px;">YOUR IP ADDRESS</span>
            </div>
        </div>
        
        <div class="bento-back">
            <div style="text-align: center;">
                <p id="busuanzi_container_site_pv" style="display:none; margin: 0;">
                    <span id="busuanzi_value_site_pv" style="font-family: monospace; font-size: 1.5rem; font-weight: bold; color: var(--gold);">--</span>
                </p>
                <span style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px;">TOTAL VISITS</span>
            </div>
        </div>
    </div>
</div>
    </div>
    <script src="index.js"></script>
</body>

</html>
