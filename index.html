<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEN | 个人博客</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 核心动画：升级版动态流体 --- */
        @keyframes bgFlow {
            0% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }

            50% {
                background-position: 100% 100%;
                filter: hue-rotate(8deg);
                /* 细微的色偏，增加动态层次 */
            }

            100% {
                background-position: 0% 0%;
                filter: hue-rotate(0deg);
            }
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 100px 20px 50px 20px;
            transition: background 0.8s ease, color 0.5s ease;

            /* --- 深色模式：暗夜极光 --- */
            background-color: #050505;
            /* 提高光晕的 Alpha 值至 0.25 和 0.2，对比度更强 */
            background-image:
                radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.25) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(168, 133, 0, 0.2) 0px, transparent 50%),
                linear-gradient(135deg, #050505 0%, #1a1a1f 50%, #050505 100%);
            background-size: 200% 200%;
            /* 尺寸缩小，流动感更明显 */
            background-attachment: fixed;
            animation: bgFlow 12s ease-in-out infinite;
            color: rgba(255, 255, 255, 0.9);
        }

        /* --- 浅色模式：梦幻冰川 --- */
        body.light-mode {
            background-color: #ffffff;
            /* 浅色模式通过对比冷色与暖色来增强视觉效果 */
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.18) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 40%),
                linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            background-size: 200% 200%;
            background-attachment: fixed;
            animation: bgFlow 12s ease-in-out infinite;
            color: #1a1a1a;
        }

        /* --- 2. 悬浮导航按钮 --- */
        .floating-btn {
            position: fixed;
            top: 25px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
            color: inherit;
        }

        body.light-mode .floating-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .btn-left {
            left: 20px;
        }

        .btn-right {
            right: 20px;
        }

        /* --- 3. 顶部标题区 --- */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
        }

        .sub-title {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.6);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        body.light-mode .main-title {
            color: #1a1a1a;
        }

        /* --- 4. 滚动公告栏 --- */
        .notice-bar {
            width: 100%;
            max-width: 440px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body.light-mode .notice-bar {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .notice-content {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-size: 13px;
            color: #ffcc00;
        }

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* --- 5. 核心布局容器 --- */
        .main-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        /* --- 6. 玻璃卡片 --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.3s ease, background 0.5s ease;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        /* --- 7. 个人名片特化 --- */
        .profile-card-large {
            padding: 40px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-halo {
            padding: 3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 0, 0.3);
            animation: glowPulse 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
                border-color: rgba(255, 204, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
                border-color: rgba(255, 204, 0, 0.7);
            }
        }

        .avatar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .contact-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        body.light-mode .contact-group {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .contact-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            transition: 0.3s;
            text-decoration: none;
        }

        body.light-mode .contact-btn {
            background: rgba(0, 0, 0, 0.04);
        }

        .contact-btn:hover {
            background: rgba(255, 204, 0, 0.2);
            transform: translateY(-3px);
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 加载层 */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #0a0a0c;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.6s;
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div style="color:#ffcc00; letter-spacing:5px; animation: pulse 1s infinite;">LOADING...</div>
    </div>

    <div class="floating-btn btn-left"><i data-lucide="menu" size="20"></i></div>
    <div class="floating-btn btn-right" id="theme-toggle"><i data-lucide="moon" size="20"></i></div>

    <div class="header-section">
        <h1 class="main-title">个人博客</h1>
        <div class="sub-title">一人 丨 一猫 丨 一首歌</div>
    </div>

    <div class="notice-bar">
        <div class="notice-content">
            📢 欢迎来到 OMEN 的空间！ · 新专辑《太阳之子》即将发布 · 系统已持续运行 1024 小时 · Stay Hungry, Stay Foolish...
        </div>
    </div>

    <div id="main-content" class="main-container">
        <div class="glass-card profile-card-large">
            <div class="avatar-halo">
                <div class="avatar-box">
                    <img src="images/avatar.jpg" alt="Avatar">
                </div>
            </div>
            <div class="profile-name">Omen</div>

            <div class="contact-group">
                <a href="#" class="contact-btn"><i data-lucide="send" size="20"></i></a>
                <a href="#" class="contact-btn"><i data-lucide="instagram" size="20"></i></a>
                <a href="#" class="contact-btn"><i data-lucide="mail" size="20"></i></a>
            </div>
        </div>

        <div class="grid-row">
            <a href="photo.html" class="glass-card"
                style="height: 120px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:inherit; gap:10px;">
                <i data-lucide="image" color="#ffcc00"></i>
                <span style="font-size:12px; letter-spacing:2px;">作品相册</span>
            </a>
            <div class="glass-card"
                style="height: 120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;">
                <span style="font-size:10px; opacity:0.5">SYSTEM STATUS</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <div
                        style="width:6px; height:6px; background:#00ff88; border-radius:50%; box-shadow:0 0 10px #00ff88;">
                    </div>
                    <span style="font-size:12px;">ACTIVE</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    // 1. 初始化判断（放在最前面，防止闪烁）
    const body = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    // 自动检测逻辑：如果系统不是深色模式，则应用浅色
    if (!prefersDark) {
        body.classList.add('light-mode');
    }

    window.onload = () => {
        // 初始化图标（根据当前 body 状态设置正确图标）
        const isLight = body.classList.contains('light-mode');
        themeToggle.innerHTML = isLight ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
        lucide.createIcons();

        // 处理 Loader 和内容入场
        const loader = document.getElementById('loader');
        const main = document.getElementById('main-content');
        
        setTimeout(() => {
            loader.classList.add('fade-out');
            main.style.opacity = "1";
            main.style.transform = "translateY(0)";
        }, 600);
    };

    // 2. 点击切换逻辑
    themeToggle.onclick = function() {
        body.classList.toggle('light-mode');
        const isLightNow = body.classList.contains('light-mode');
        
        // 更新图标并重绘
        this.innerHTML = isLightNow ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
        lucide.createIcons();
    };
</script>
</body>

</html>
