<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HI OMEN · 智能跳转</title>
    <style>
        /* 极简加载提示，避免白屏 */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .loader {
            text-align: center;
            color: #1a1a1a;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 3px solid #ddd;
            border-top-color: #900207;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        (function() {
            // 1. 获取当前路径（避免无限循环）
            var currentPath = window.location.pathname;
            // 已经是指定版本页面，不再重定向
            if (currentPath.endsWith('index-mobile.html') || currentPath.endsWith('index-pc.html')) {
                return;
            }

            // 2. 判断是否为移动端
            // 规则：屏幕宽度 < 1024px 或者 UA 匹配移动设备关键字
            var isMobile = false;
            if (window.innerWidth < 1024) {
                isMobile = true;
            } else {
                var ua = navigator.userAgent || '';
                var mobileKeywords = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
                if (mobileKeywords.test(ua)) {
                    isMobile = true;
                }
            }

            // 3. 确定目标页面
            var target = isMobile ? 'index-mobile.html' : 'index-pc.html';

            // 4. 执行跳转（replace 避免产生历史记录）
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div>正在为您加载最适合的版本…</div>
    </div>
</body>
</html>
