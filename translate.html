<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>二筒 · 对话式翻译机器人</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 全局基础样式（浅色背景，与其他页面一致）--- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            /* 禁用页面滚动 */
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* --- 导航栏（改为普通块级，不再sticky）--- */
        .timeline-header {
            flex-shrink: 0;
            margin: 16px 16px 0 16px;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        /* .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        } */

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        /* 右侧按钮组（与左侧保持对称） */
        .nav-group {
            min-width: 88px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .nav-btn-text {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            padding: 0 16px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-btn-text:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .nav-btn-text svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        @media (max-width: 768px) {
            .timeline-header {
                margin: 12px 12px 0 12px;
                padding: 8px 16px;
                border-radius: 28px;
            }

            .nav-btn-text {
                padding: 0 12px;
                height: 40px;
                font-size: 0.75rem;
            }

            .back-btn-inline,
            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }

            .nav-group {
                min-width: 92px;
            }
        }

        /* 下拉菜单（与之前相同） */
        .dropdown-menu {
            display: none;
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 80px);
            left: calc(env(safe-area-inset-left, 20px) + 20px);
            width: 150px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        /* 主容器 — 占据剩余高度，内部 flex 列 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 16px 16px 16px 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 配置栏 — 三个下拉框 */
        .config-bar {
            flex-shrink: 0;
            padding: 8px 24px;
            background: rgba(0, 0, 0, 0.02);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: nowrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .custom-select {
            position: relative;
            display: block;
            flex: 1;
            min-width: 0;
        }

        .custom-select-trigger {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            padding: 6px 30px 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1a1a1a;
            white-space: nowrap;
            position: relative;
        }

        .custom-select-trigger::after {
            content: '▼';
            font-size: 8px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .custom-select-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 6px 0;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .custom-select.open .custom-select-dropdown {
            opacity: 1;
            visibility: visible;
        }

        .custom-select-option {
            padding: 8px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #1a1a1a;
        }

        .custom-select-option:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .hidden-native {
            display: none;
        }

        /* 消息区域 — 可滚动 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* 气泡样式保持不变 */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: rgba(230, 160, 23, 0.2);
        }

        .message.assistant .avatar {
            background: rgba(0, 0, 0, 0.05);
        }

        .bubble {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .message.user .bubble {
            background: #e6f4ff;
            border-color: rgba(230, 160, 23, 0.2);
        }

        .message.assistant .bubble {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .bubble-text {
            flex: 1;
            word-break: break-word;
            color: #1a1a1a;
        }

        .copy-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .copy-btn svg {
            width: 16px;
            height: 16px;
            stroke: #e6a017;
        }

        /* 输入区域 — 固定在底部 */
        .input-area {
            flex-shrink: 0;
            padding: 16px 24px 24px 24px;
            background: rgba(0, 0, 0, 0.02);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .input-wrapper {
            background: #ffffff;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 36px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #e6a017;
            box-shadow: 0 0 0 2px rgba(230, 160, 23, 0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #1a1a1a;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            padding: 12px 0;
        }

        textarea::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            background: #e6a017;
            border: none;
            border-radius: 36px;
            padding: 8px 24px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #cc8b0e;
            transform: scale(0.96);
        }

        /* 滚动条浅色 */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #e6a017;
        }

        @media (max-width: 640px) {
            .chat-container {
                margin: 12px 12px 12px 12px;
            }

            .message {
                max-width: 95%;
            }

            .config-bar {
                padding: 8px 16px;
                gap: 8px;
            }

            .custom-select-trigger {
                font-size: 0.75rem;
                padding: 4px 24px 4px 12px;
            }

            .input-area {
                padding: 12px 16px 20px;
            }

            .bubble {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

    <script>
        // 导航栏动态阴影
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        window.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(updateHeaderShadow); ticking = true; } });
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const layer = document.querySelector('.displacement-layer');
            if (!headerEl || !layer) return;
            let tick = false;
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(() => {
                        const i = (Math.sin(window.scrollY * 0.03) + 1) / 2;
                        layer.style.transform = `translateY(${2 + i * 3}px)`;
                        tick = false;
                    });
                    tick = true;
                }
            });
        }
        initEdgeDistortion();

        // 菜单切换
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dropdown-menu').classList.toggle('active');
        }
        window.onclick = (e) => {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if (menu && trigger && !trigger.contains(e.target)) {
                menu.classList.remove('active');
            }
        };

        // ====================== 配置硅基流动 API ======================
        const SILICONFLOW_API_KEY = 'sk-iahhchqxzvphecyejdjbaglhvoopfrzreuuvrnqeqtlwbmxm';
        const SILICONFLOW_API_URL = 'https://api.siliconflow.cn/v1/chat/completions';

        // 模型名称映射：将前端选择的 deepseek-chat/reasoner 转换为硅基流动支持的模型 ID
        function getModelId(selectedModel) {
            if (selectedModel === 'deepseek-reasoner') {
                return 'deepseek-ai/DeepSeek-R1';  // 如果硅基流动支持 R1，否则可改为 V3.2
            }
            return 'deepseek-ai/DeepSeek-V3.2';    // 默认使用 V3.2
        }

        const messagesArea = document.getElementById('messagesArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const targetLangSelect = document.getElementById('targetLangSelect');
        const styleSelect = document.getElementById('styleSelect');
        const modelSelect = document.getElementById('modelSelect');

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            const img = document.createElement('img');
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '50%';
            img.src = role === 'user'
                ? 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/avatar.jpg'
                : 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png';
            avatar.appendChild(img);
            messageDiv.appendChild(avatar);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const textSpan = document.createElement('div');
            textSpan.className = 'bubble-text';
            textSpan.innerHTML = content.replace(/\n/g, '<br>');
            bubble.appendChild(textSpan);

            if (role === 'assistant') {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.title = '复制翻译结果';
                copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(content);
                });
                bubble.appendChild(copyBtn);
            }
            messageDiv.appendChild(bubble);
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        let thinkingMsg = null;
        function showThinking() {
            if (thinkingMsg) thinkingMsg.remove();
            const tempDiv = document.createElement('div');
            tempDiv.className = 'message assistant';

            // 创建头像（图片）
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            const img = document.createElement('img');
            img.src = 'https://hiomen-1312408524.cos.ap-guangzhou.myqcloud.com/%E7%B4%A0%E6%9D%90/logo.png';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '50%';
            avatarDiv.appendChild(img);

            // 创建气泡
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.style.opacity = '0.7';
            bubbleDiv.innerText = '⏳ AI 思考中...';

            tempDiv.appendChild(avatarDiv);
            tempDiv.appendChild(bubbleDiv);
            messagesArea.appendChild(tempDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            thinkingMsg = tempDiv;
        }
        function hideThinking() {
            if (thinkingMsg) { thinkingMsg.remove(); thinkingMsg = null; }
        }

        async function translateWithSiliconFlow(text, targetLang, style, modelValue) {
            const styleMap = {
                '标准': '自然的、标准的翻译',
                '口语': '口语化的、日常交流的风格，使用轻松的表达方式',
                '正式': '正式的、商务场合的风格，用词严谨礼貌',
                '学术': '学术论文风格，用词专业、结构清晰',
                '文学': '文学性的、富有文采的风格，可以适当使用修辞',
                '幽默': '幽默诙谐的风格，翻译时加入一点趣味性',
                '简洁': '简洁明了、通俗易懂的风格，避免复杂词汇'
            };
            const styleInstruction = styleMap[style] || styleMap['标准'];
            let targetLangDisplay = targetLang;
            if (targetLang === '英语（美式）') targetLangDisplay = '美式英语';
            const systemPrompt = `你是一个专业的翻译助手。请将用户提供的文本翻译成${targetLangDisplay}。翻译要求：${styleInstruction}。只输出翻译结果，不要添加额外解释、不要输出原文、不要输出任何标记。`;
            const userMessage = `请翻译：${text}`;

            const modelId = getModelId(modelValue);
            const response = await fetch(SILICONFLOW_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SILICONFLOW_API_KEY}`
                },
                body: JSON.stringify({
                    model: modelId,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            if (!data.choices?.[0]?.message) throw new Error('API 返回异常');
            return data.choices[0].message.content.trim();
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            userInput.value = '';
            const targetLang = targetLangSelect.value;
            const style = styleSelect.value;
            const model = modelSelect.value;
            showThinking();
            try {
                const translated = await translateWithSiliconFlow(text, targetLang, style, model);
                hideThinking();
                addMessage('assistant', translated);
            } catch (err) {
                hideThinking();
                console.error(err);
                let errorMsg = '翻译失败：';
                if (err.message.includes('401')) errorMsg += 'API Key 无效，请检查';
                else if (err.message.includes('429')) errorMsg += '请求过于频繁，请稍后再试';
                else if (err.message.includes('fetch')) errorMsg += '网络请求失败，请检查网络';
                else errorMsg += err.message;
                addMessage('assistant', errorMsg);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function initCustomSelects() {
            document.querySelectorAll('.custom-select').forEach(customSelect => {
                const trigger = customSelect.querySelector('.custom-select-trigger');
                const dropdown = customSelect.querySelector('.custom-select-dropdown');
                const hiddenSelectId = customSelect.getAttribute('data-select-id');
                const hiddenSelect = document.getElementById(hiddenSelectId);
                if (!hiddenSelect) return;
                const selectedOption = hiddenSelect.options[hiddenSelect.selectedIndex];
                if (selectedOption) trigger.innerText = selectedOption.text;

                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.custom-select.open').forEach(el => {
                        if (el !== customSelect) el.classList.remove('open');
                    });
                    customSelect.classList.toggle('open');
                });
                dropdown.querySelectorAll('.custom-select-option').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const value = opt.getAttribute('data-value');
                        const text = opt.innerText;
                        for (let i = 0; i < hiddenSelect.options.length; i++) {
                            if (hiddenSelect.options[i].value === value) {
                                hiddenSelect.selectedIndex = i;
                                break;
                            }
                        }
                        trigger.innerText = text;
                        const changeEvent = new Event('change', { bubbles: true });
                        hiddenSelect.dispatchEvent(changeEvent);
                        customSelect.classList.remove('open');
                    });
                });
            });
        }
        document.addEventListener('click', () => {
            document.querySelectorAll('.custom-select.open').forEach(el => el.classList.remove('open'));
        });
        initCustomSelects();

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 1500);
            }).catch(() => alert('复制失败，请手动复制'));
        }

        // 初始化 Lucide 图标
        lucide.createIcons();
    </script>
</body>
