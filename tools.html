<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实用工具 · 合集</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 全局基础样式（浅色背景，与其他页面一致）--- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            padding: 0 16px 50px 16px;
        }

        /* --- 导航栏（与 moments 完全一致）--- */
        .timeline-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 0 24px 0;
            background: transparent;
            backdrop-filter: blur(30px) saturate(120%) brightness(0.9);
            border-radius: 34px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .displacement-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.15) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 100%);
            pointer-events: none;
            transition: transform 0.05s linear;
            z-index: 2;
            border-radius: 0 0 34px 34px;
        }

        .displacement-layer::before,
        .displacement-layer::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, transparent 80%);
            pointer-events: none;
        }

        .displacement-layer::before {
            left: 0;
            border-radius: 34px 0 0 0;
        }

        .displacement-layer::after {
            right: 0;
            border-radius: 0 34px 0 0;
        }

        /* .timeline-header:hover {
            transform: perspective(400px) rotateX(1deg) rotateY(0.5deg);
        } */

        .timeline-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: overlay;
            pointer-events: none;
            transform: translateZ(-1px) scale(1.02);
        }

        .back-btn-inline,
        .nav-btn {
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            flex-shrink: 0;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .back-btn-inline:hover,
        .nav-btn:hover {
            background: rgba(120, 120, 128, 0.35);
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .back-btn-inline svg,
        .nav-btn svg {
            stroke: currentColor;
            width: 22px;
            height: 22px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-title .sub {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            color: #666;
        }

        /* 右侧按钮组（与左侧保持对称） */
        .nav-group {
            min-width: 88px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        @media (max-width: 768px) {
            body {
                padding-left: 12px;
                padding-right: 12px;
            }
            .timeline-header {
                top: 12px;
                margin-bottom: 32px;
                padding: 8px 16px;
                border-radius: 28px;
            }
            .back-btn-inline,
            .nav-btn {
                width: 40px;
                height: 40px;
            }
            .header-title h1 {
                font-size: 1.2rem;
            }
            .nav-group {
                min-width: 92px;
            }
        }

        /* 下拉菜单 */
        .dropdown-menu {
            display: none;
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 80px);
            left: calc(env(safe-area-inset-left, 20px) + 20px);
            width: 150px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            transform: scale(0.4) translate(-30px, -30px);
            opacity: 0;
            transform-origin: top left;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }
        .dropdown-menu.active {
            display: block;
            transform: scale(1) translate(0, 0);
            opacity: 1;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 15px;
            border-radius: 16px;
            transition: 0.2s;
        }
        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        /* 工具卡片区域 - 单列居中 */
        .tools-grid {
            max-width: 600px;
            margin: 20px auto 0 auto;
            display: flex;
            justify-content: center;
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 28px;
            padding: 24px 20px;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
        }
        .tool-card:hover {
            transform: translateY(-6px);
            border-color: #ffcc00;
            background: rgba(255, 255, 255, 0.85);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }
        .card-header svg {
            width: 32px;
            height: 32px;
            stroke: #ffcc00;
            stroke-width: 1.5;
            flex-shrink: 0;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
        }
        .card-desc {
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.4;
            margin: 8px 0 0;
        }

        @media (max-width: 640px) {
            .card-title {
                font-size: 1.1rem;
            }
            .card-header svg {
                width: 28px;
                height: 28px;
            }
        }

        .footer-note {
            margin-top: 50px;
            font-size: 12px;
            opacity: 0.5;
            text-align: center;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="timeline-header" id="timelineHeader">
        <button class="nav-btn" id="menu-trigger" onclick="toggleMenu(event)"><i data-lucide="menu"></i></button>
        <button class="back-btn-inline" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>
        <div class="header-title">
            <h1>工具箱</h1>
            <span class="sub">Efficient tools</span>
        </div>
        <div class="nav-group">
            <!-- 右侧留白，保持与左侧对称 -->
        </div>
        <div class="displacement-layer"></div>
    </div>

    <!-- 下拉菜单 -->
    <div class="dropdown-menu" id="dropdown-menu">
        <a href="index.html" class="menu-item"><i data-lucide="home" size="18"></i>主页</a>
        <a href="moments.html" class="menu-item">
            <svg width="25" height="25" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M24 44C35.0457 44 44 35.0457 44 24C44 12.9543 35.0457 4 24 4C12.9543 4 4 12.9543 4 24C4 35.0457 12.9543 44 24 44Z" />
                <path d="M31 7V24" />
                <path d="M16.6357 6.63599L30.7779 20.7781" />
                <path d="M7 17H24" />
                <path d="M20.3643 17.636L6.22212 31.7781" />
                <path d="M17 25V42" />
                <path d="M17.6357 27.636L31.7779 41.7781" />
                <path d="M24 31L42 31" />
                <path d="M42.3643 16.636L28.2221 30.7781" />
                <path d="M24 31C27.866 31 31 27.866 31 24C31 20.134 27.866 17 24 17C20.134 17 17 20.134 17 24C17 27.866 20.134 31 24 31Z" />
            </svg>
            朋友圈
        </a>
        <a href="photo.html" class="menu-item"><i data-lucide="image" size="18"></i>相册</a>
        <a href="about.html" class="menu-item"><i data-lucide="user" size="18"></i>关于我</a>
        <a href="admin.html" class="menu-item"><i data-lucide="settings" size="18"></i>后台管理</a>
        <a href="links.html" class="menu-item"><i data-lucide="link" size="18"></i>友情链接</a>
        <a href="test.html" class="menu-item"><i data-lucide="flask-conical" size="18"></i>TEST</a>
    </div>

    <!-- 工具卡片（仅保留“二筒翻译官”） -->
    <div class="tools-grid">
        <a href="translate.html" class="tool-card">
            <div class="card-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 8h11M9 15h7M12 3v2m0 10v2M8 7l-2 5h4L8 7zM17 12l2 5h-4l2-5z"/>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
                <h3 class="card-title">二筒翻译官</h3>
            </div>
            <p class="card-desc">依托AI大模型打造的定制对话式AI翻译，支持多语言与风格定制，实时交互。</p>
        </a>
    </div>

    <div class="footer-note">
        更多工具持续更新中 · 敬请期待
    </div>

    <script>
        // 导航栏动态阴影
        const header = document.getElementById('timelineHeader');
        let ticking = false;
        function updateHeaderShadow() {
            if (!header) return;
            const scrollY = window.scrollY;
            const wave = Math.sin(scrollY * 0.02) * 0.5 + 0.5;
            const blur = 12 + wave * 16;
            const yOffset = 4 + wave * 8;
            const highlight = 0.7 + wave * 0.3;
            header.style.boxShadow = `0 ${yOffset}px ${blur}px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, ${highlight}), inset 0 -1px 0 rgba(0, 0, 0, 0.05)`;
            ticking = false;
        }
        window.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(updateHeaderShadow); ticking = true; } });
        updateHeaderShadow();

        function initEdgeDistortion() {
            const headerEl = document.querySelector('.timeline-header');
            const layer = document.querySelector('.displacement-layer');
            if (!headerEl || !layer) return;
            let tick = false;
            window.addEventListener('scroll', () => {
                if (!tick) {
                    requestAnimationFrame(() => {
                        const i = (Math.sin(window.scrollY * 0.03) + 1) / 2;
                        layer.style.transform = `translateY(${2 + i * 3}px)`;
                        tick = false;
                    });
                    tick = true;
                }
            });
        }
        initEdgeDistortion();

        // 菜单切换
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dropdown-menu').classList.toggle('active');
        }
        window.onclick = (e) => {
            const menu = document.getElementById('dropdown-menu');
            const trigger = document.getElementById('menu-trigger');
            if (menu && trigger && !trigger.contains(e.target)) {
                menu.classList.remove('active');
            }
        };

        // 初始化 Lucide 图标
        lucide.createIcons();
    </script>
</body>
</html>
